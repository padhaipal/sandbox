<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PadhaiPal — Educator Network (force-graph demo)</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/react-force-graph-2d"></script>            <!-- VIEW 1: force graph -->
  <link rel="stylesheet" href="https://unpkg.com/reactflow@11/dist/style.css" /> <!-- VIEW 2: tree -->
  <script src="https://unpkg.com/reactflow@11/dist/umd/index.js"></script>
  <script src="https://unpkg.com/d3@7"></script>                              <!-- VIEW 3: UP district map -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { font-family: Arial, Helvetica, sans-serif; background: #fafafa; color: #18181b; }
    @keyframes livedot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
    .live-dot { animation: livedot 1.4s ease-in-out infinite; }
    /* VIEW 2 (React Flow) card chrome */
    .react-flow__node-card { background: transparent; border: none; padding: 0; width: auto; }
    .react-flow__handle { background: #a1a1aa; width: 6px; height: 6px; border: none; }
    .react-flow__attribution { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect, useCallback, useRef } = React;

    // #####################################################################
    // ## VIEW 1 — Force-directed radial graph (react-force-graph-2d).     ##
    // ## Fully self-contained in this IIFE; exported as <ForceGraphApp/>. ##
    // #####################################################################
    const ForceGraphApp = (function () {
    const ForceGraph2D = window.ForceGraph2D.default || window.ForceGraph2D;
    const clamp01 = (x) => (x < 0 ? 0 : x > 1 ? 1 : x);

    // =====================================================================
    //  Config
    // =====================================================================
    const CURRENT_USER_ID = "r";                                   // signed-in DGSE / org root (same as the tree view)
    const LEVELS = ["DGSE", "BSA", "BEO", "Head Teacher", "Teacher", "Student"];
    const SHORT  = { DGSE: "DGSE", BSA: "BSA", BEO: "BEO", "Head Teacher": "HT", Teacher: "Tchr", Student: "Std" };
    const FANOUT = [[75, 75], [8, 14], [120, 150], [2, 7], [12, 28]]; // children-per-node range, by level
    const FACE_COUNT = { adult: 300, child: 50 };                   // local FairFace subset sizes

    // layout geometry (every node is the same size — a child's radius from its parent is fixed by score)
    const NODE_R = 8;                                  // node radius
    const HIT_MULT = 2.6;                              // collide / hit radius and parent-gap, as a multiple of NODE_R
    const INNER = HIT_MULT * 2 * NODE_R;               // closest a child can sit to its parent without overlap
    const FOOT  = NODE_R * HIT_MULT;                   // a child's collision radius
    const PACK = 0.6;                                  // annulus packing fraction (smaller => looser ring)
    const SELECTED_GAP = 1.5625;                       // a selected node sits this × beyond (peer ring + child ring)

    // forces & settle
    const SIBLING_REPEL = -480, REPEL_RANGE = 600;     // peers (siblings) are the only repulsion
    const COLLIDE_STRENGTH = 0.9, COLLIDE_ITERS = 3;
    const SETTLE = { cooldownTicks: 60, alphaDecay: 0.2, velocityDecay: 0.45 };

    // search
    const SEARCH_MAX_RESULTS = 40, SEARCH_MAX_SCAN = 3000;

    // colours
    const ACCENT = "37, 99, 235";                      // brand blue (glow + "YOU" badge)

    // =====================================================================
    //  Procedural population (≈10.1M users, generated on demand from ids)
    //  ids are dotted paths: "r" -> "r.2" -> "r.2.5" …; level = number of dots.
    // =====================================================================
    function hashStr(s) {
      let h1 = 0xdeadbeef ^ s.length, h2 = 0x41c6ce57 ^ s.length;
      for (let i = 0; i < s.length; i++) {
        const ch = s.charCodeAt(i);
        h1 = Math.imul(h1 ^ ch, 2654435761); h2 = Math.imul(h2 ^ ch, 1597334677);
      }
      h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
      h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
      return (h1 >>> 0);
    }
    const levelOf = (id) => id.split(".").length - 1;
    const baseParentOf = (id) => { const i = id.lastIndexOf("."); return i < 0 ? null : id.slice(0, i); };
    const baseChildCount = (id) => {
      const lvl = levelOf(id);
      if (lvl >= FANOUT.length) return 0;
      const [mn, mx] = FANOUT[lvl];
      return mn === mx ? mn : mn + (hashStr("fan:" + id) % (mx - mn + 1));
    };

    const FIRST = ["Aarav","Diya","Kabir","Ishaan","Ananya","Riya","Aditya","Rohan","Saanvi","Arjun",
      "Priya","Myra","Vivaan","Kiara","Reyansh","Anvi","Tara","Dev","Ira","Yuvan","Sara","Krish",
      "Anil","Meena","Vikram","Sita","Deepak","Asha","Ravi","Neha","Manish","Geeta","Pooja","Rahul",
      "Sunil","Kavita","Pramod","Rajesh","Om","Nisha","Sanjay","Rekha","Amit","Sunita","Vijay","Lata",
      "Mohan","Usha","Suresh","Gita"];
    const LAST = ["Sharma","Gupta","Singh","Yadav","Joshi","Verma","Pal","Rao","Lal","Bose","Kumar",
      "Prakash","Devi","Mishra","Tiwari","Pandey","Chauhan","Saxena","Nair","Reddy"];

    // ov = { deleted:Set, moved:Map<child,parent>, movedInto:Map<parent,Set<child>> } — edits over the base tree
    const parentOf = (id, ov) => (ov.moved.get(id) ?? baseParentOf(id));

    function genUser(id, ov) {
      const lvl = levelOf(id);
      const type = lvl === LEVELS.length - 1 ? "student" : "educator";
      const h = hashStr("u:" + id);
      const first = FIRST[h % FIRST.length];
      return {
        id,
        name: type === "student" ? first : first + " " + LAST[(h >>> 9) % LAST.length],
        phone: "+9198" + String(1000000 + (h % 9000000)),
        designation: LEVELS[lvl], type, parentId: parentOf(id, ov), perf: (h % 1000) / 1000,
      };
    }
    function childIdsOf(id, ov) {
      const ids = [];
      const n = baseChildCount(id);
      for (let k = 0; k < n; k++) {
        const c = id + "." + k;
        if (ov.deleted.has(c)) continue;
        if ((ov.moved.get(c) ?? baseParentOf(c)) !== id) continue; // moved elsewhere
        ids.push(c);
      }
      ov.movedInto.get(id)?.forEach((c) => { if (!ov.deleted.has(c)) ids.push(c); }); // moved in
      return ids;
    }
    const isAncestorOf = (anc, id, ov) => {
      for (let c = parentOf(id, ov); c; c = parentOf(c, ov)) if (c === anc) return true;
      return false;
    };
    function rankOf(id, ov) {
      const p = parentOf(id, ov); if (!p) return null;
      const sibs = childIdsOf(p, ov).map((c) => ({ c, perf: genUser(c, ov).perf })).sort((a, b) => b.perf - a.perf);
      const i = sibs.findIndex((s) => s.c === id);
      return i < 0 ? null : { pos: i + 1, total: sibs.length };
    }
    const matchUser = (u, q) => {
      const ql = q.toLowerCase();
      return u.name.toLowerCase().includes(ql) || u.phone.includes(q) ||
             u.designation.toLowerCase().includes(ql) || SHORT[u.designation].toLowerCase().includes(ql);
    };

    // =====================================================================
    //  Visuals (score colour, faces, demo metrics)
    // =====================================================================
    const lerp = (a, b, t) => a.map((v, i) => v + (b[i] - v) * t);
    function scoreRGB(p) {                              // red(0) -> yellow(.5) -> green(1)
      const red = [239, 68, 68], yellow = [234, 179, 8], green = [34, 197, 94];
      return (p < 0.5 ? lerp(red, yellow, p / 0.5) : lerp(yellow, green, (p - 0.5) / 0.5)).map((v) => v | 0);
    }
    const scoreColor = (p) => `rgb(${scoreRGB(p).join(",")})`;
    const textOn = (p) => { const [r, g, b] = scoreRGB(p); return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.62 ? "#1c1917" : "#ffffff"; };

    // deterministic Indian face per user, from a local FairFace subset (DEMO ONLY).
    const faceUrl = (u) => {
      const bucket = u.type === "student" ? "child" : "adult";
      return `faces/${bucket}/${hashStr("face:" + u.id) % FACE_COUNT[bucket]}.jpg`;
    };

    function metricsFor(u) {
      const p = u.perf;
      if (u.type === "student") {
        const letters = ["क","ख","ग","अ","आ","इ","म","प","र","स","ल","न"];
        const voice = Array.from({ length: 6 }, (_, i) => ({
          word: letters[(i * 5 + Math.round(p * 10)) % letters.length],
          dur: (1 + ((i * 7 + Math.round(p * 9)) % 2)) + "s",
          when: ["just now","2h ago","yesterday","2d ago","3d ago","5d ago"][i],
        }));
        return { isStudent: true, stats: [
          ["Letters learnt", Math.round(p * 46) + " / 46"], ["Lessons done", Math.round(p * 120)],
          ["Active (7d)", Math.round(p * 100) + "%"], ["Last active", ["today","yesterday","2d ago","4d ago"][Math.round(p * 3)]],
        ], voice };
      }
      return { isStudent: false, stats: [
        ["Students reached", Math.round(40 + p * 160)], ["Active (7d)", Math.round(p * 100) + "%"],
        ["Lessons", Math.round(200 + p * 1400)], ["Avg score", Math.round(p * 100)],
        ["Letters taught", Math.round(10 + p * 36)],
        ["Reports below", u.designation === "BEO" ? "100s" : u.designation === "Head Teacher" ? "10s" : "few"],
      ] };
    }

    // =====================================================================
    //  Layout — what's visible and where each node is locked to its parent.
    //
    //  Children fan out around their parent on a ring. A child's distance is
    //  set by its score (top score -> inner edge, score 0 -> outer edge), with
    //  the ring's outer radius sized so all N children fit (equal-area packing).
    //  A *selected* node pops out past both its peer ring and its own child ring.
    // =====================================================================
    function collectVisible(ov, expanded, viewRootId) {
      const order = [], seen = new Set();
      const walk = (id) => {
        if (seen.has(id)) return;
        seen.add(id); order.push(id);
        if (id === viewRootId || expanded.has(id)) childIdsOf(id, ov).forEach(walk);
      };
      walk(viewRootId);
      return { order, seen };
    }

    const ringOuter = (n) => Math.sqrt(INNER * INNER + (n * FOOT * FOOT) / PACK);
    const bandRadius = (outer, frac) => Math.sqrt(INNER * INNER + frac * (outer * outer - INNER * INNER));

    function computeLayout(ov, expanded, viewRootId) {
      const { order, seen } = collectVisible(ov, expanded, viewRootId);

      // one peer group per visible parent
      const groups = new Map(); // parentId -> { children:[{id,perf}] sorted high->low, outer }
      const rank = new Map();   // id -> { pos, total }
      for (const p of new Set(order.map((id) => parentOf(id, ov)).filter(Boolean))) {
        const children = childIdsOf(p, ov).map((id) => ({ id, perf: genUser(id, ov).perf })).sort((a, b) => b.perf - a.perf);
        children.forEach((c, i) => rank.set(c.id, { pos: i + 1, total: children.length }));
        groups.set(p, { children, outer: ringOuter(children.length) });
      }

      // fixed distance from each child to its parent
      const lockR = new Map();
      for (const g of groups.values()) {
        const maxPerf = g.children[0]?.perf || 1;
        for (const { id, perf } of g.children) {
          if (expanded.has(id)) {
            const own = groups.get(id);                       // this node's own child ring (if open)
            lockR.set(id, (g.outer + (own ? own.outer : 0)) * SELECTED_GAP);
          } else {
            lockR.set(id, bandRadius(g.outer, maxPerf > 0 ? clamp01(1 - perf / maxPerf) : 0));
          }
        }
      }
      return { order, seen, lockR, rank };
    }

    // place a brand-new node at its locked radius, at an even angle around its parent
    function spawnNode(id, map, ov, lockR) {
      const n = { id };  // the view root is pinned at the centre in the build pass (its parent isn't in view)
      const pid = parentOf(id, ov), parent = map.get(pid);
      if (parent && parent.x != null) {
        const sibs = childIdsOf(pid, ov);
        const idx = Math.max(0, sibs.indexOf(id)), count = Math.max(1, sibs.length);
        const angle = (hashStr("ang:" + pid) % 360) * Math.PI / 180 + (idx / count) * 2 * Math.PI;
        const r = lockR.get(id) ?? INNER;
        n.x = parent.x + Math.cos(angle) * r;
        n.y = parent.y + Math.sin(angle) * r;
      }
      return n;
    }

    // =====================================================================
    //  Custom d3 forces (the react-force-graph UMD bundle doesn't expose these)
    // =====================================================================
    const eachPair = (nodes, fn) => {                  // every unordered pair with a position
      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i]; if (a.x == null) continue;
        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j]; if (b.x == null) continue;
          fn(a, b);
        }
      }
    };
    const makeForce = (run) => { let nodes; const f = () => nodes && run(nodes); f.initialize = (n) => { nodes = n; }; return f; };
    const arePeers = (a, b) => a.u && b.u && a.u.parentId != null && a.u.parentId === b.u.parentId;

    // resolve overlaps by moving POSITIONS directly (several iterations) so dense
    // clusters separate even with a fast settle; pinned nodes (fx/fy) don't move.
    // PEERS ONLY — non-peer nodes must exert no force on each other.
    const makeCollide = (radiusFn, strength, iterations) => makeForce((nodes) => {
      for (let it = 0; it < iterations; it++) eachPair(nodes, (a, b) => {
        if (!arePeers(a, b)) return;
        const rmin = radiusFn(a) + radiusFn(b);
        const dx = b.x - a.x, dy = b.y - a.y, d2 = dx * dx + dy * dy;
        if (d2 < 1e-6) { if (a.fx == null) a.x += 0.5; else if (b.fx == null) b.x -= 0.5; return; }
        if (d2 >= rmin * rmin) return;
        const d = Math.sqrt(d2), push = (rmin - d) * strength * 0.5, ux = dx / d * push, uy = dy / d * push;
        if (a.fx == null) a.x -= ux; if (a.fy == null) a.y -= uy;
        if (b.fx == null) b.x += ux; if (b.fy == null) b.y += uy;
      });
    });

    // repulsion that acts ONLY between siblings (same parent) — with the radial
    // lock below, this just spreads peers apart along their shared ring.
    const makeSiblingRepel = (strength, maxDist) => { const max2 = maxDist * maxDist; return makeForce((nodes) =>
      eachPair(nodes, (a, b) => {
        if (!arePeers(a, b)) return;
        let dx = b.x - a.x, dy = b.y - a.y, d2 = dx * dx + dy * dy;
        if (d2 === 0) { a.vx += 0.5; return; }
        if (d2 > max2) return;
        const k = strength / Math.max(1, d2);
        a.vx += dx * k; a.vy += dy * k; b.vx -= dx * k; b.vy -= dy * k;
      })
    ); };

    // hard-pin every child to its fixed lockR from its parent, keeping whatever
    // ANGLE the other forces produced — so length is absolute, only angle animates.
    // Runs last. A selected (open) node is locked straight DOWN from its parent.
    function makeRadialLock() {
      let nodes, byId;
      const f = () => {
        if (!nodes) return;
        for (const n of nodes) {
          if (n.lockR == null || n.fx != null || n.x == null) continue; // skip the pinned root
          const p = byId.get(n.u?.parentId);
          if (!p || p.x == null) continue;
          if (n.expanded) { n.x = p.x; n.y = p.y + n.lockR; continue; }
          let dx = n.x - p.x, dy = n.y - p.y, d = Math.sqrt(dx * dx + dy * dy);
          if (d < 1e-6) { dx = 1; dy = 0; d = 1; }
          n.x = p.x + dx / d * n.lockR; n.y = p.y + dy / d * n.lockR;
        }
      };
      f.initialize = (n) => { nodes = n; byId = new Map(n.map((x) => [x.id, x])); };
      return f;
    }

    // =====================================================================
    //  Search — scoped to the user's parent + peers + own downline (capped BFS)
    // =====================================================================
    function searchNetwork(ov, rootId, query) {
      const q = query.trim();
      if (!q) return [];
      const out = [], seen = new Set();
      const consider = (id) => {
        if (seen.has(id) || out.length >= SEARCH_MAX_RESULTS) return;
        seen.add(id);
        const u = genUser(id, ov);
        if (matchUser(u, q)) out.push(u);
      };
      const parent = parentOf(rootId, ov);
      if (parent) { consider(parent); childIdsOf(parent, ov).forEach(consider); } // parent + peers
      consider(rootId);
      let frontier = [rootId], scanned = 0;             // BFS down the subtree
      while (frontier.length && scanned < SEARCH_MAX_SCAN && out.length < SEARCH_MAX_RESULTS) {
        const next = [];
        scan: for (const id of frontier)
          for (const c of childIdsOf(id, ov)) {
            consider(c); scanned++; next.push(c);
            if (scanned >= SEARCH_MAX_SCAN || out.length >= SEARCH_MAX_RESULTS) break scan;
          }
        frontier = next;
      }
      return out;
    }

    // =====================================================================
    //  Canvas node rendering
    // =====================================================================
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);         ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }
    const truncate = (s, n) => (s.length > n ? s.slice(0, n - 1) + "…" : s);
    const circle = (ctx, x, y, r) => { ctx.beginPath(); ctx.arc(x, y, r, 0, 2 * Math.PI); };

    const nodeBox = (node) => {
      const w = NODE_R * 3.8, h = NODE_R * 2.1;
      return { w, h, x: node.x - w / 2, y: node.y + NODE_R * 0.1 };
    };

    function drawGlow(ctx, node, box, passes) {           // blue halo: current user + search-hover
      ctx.save();
      ctx.fillStyle = `rgba(${ACCENT},1)`;
      ctx.shadowColor = `rgba(${ACCENT},0.95)`; ctx.shadowBlur = NODE_R * 2.2;
      for (let i = 0; i < passes; i++) {                 // extra passes => denser glow
        roundRect(ctx, box.x, box.y, box.w, box.h, NODE_R * 0.32); ctx.fill();
        circle(ctx, node.x, node.y, NODE_R); ctx.fill();
      }
      ctx.restore();
    }
    function fittedText(ctx, text, x, y, maxW, fontPx, bold) {
      const font = (px) => `${bold ? "bold " : ""}${px}px Arial`;
      ctx.font = font(fontPx);
      const w = ctx.measureText(text).width;
      if (w > maxW) ctx.font = font(fontPx * maxW / w);  // shrink so it never overflows the box
      ctx.fillText(text, x, y);
    }
    function drawCard(ctx, node, box, col) {              // coloured box + two text lines
      roundRect(ctx, box.x, box.y, box.w, box.h, NODE_R * 0.32);
      ctx.fillStyle = col; ctx.fill();
      ctx.fillStyle = textOn(node.u.perf); ctx.textAlign = "center"; ctx.textBaseline = "top";
      const maxW = box.w - NODE_R * 0.5;
      fittedText(ctx, truncate(node.u.name, 16), node.x, node.y + NODE_R * 1.12, maxW, NODE_R * 0.5, true);
      const rank = node.rank ? `  ·  #${node.rank.pos}/${node.rank.total}` : "";
      fittedText(ctx, `${SHORT[node.u.designation]}  ·  ${node.score}${rank}`, node.x, node.y + NODE_R * 1.7, maxW, NODE_R * 0.42, false);
    }
    function drawFace(ctx, node, col, img) {              // brightened photo, clipped to a circle + matching border
      ctx.save();
      circle(ctx, node.x, node.y, NODE_R); ctx.clip();
      if (img.complete && img.naturalWidth) { ctx.filter = "brightness(1.18)"; ctx.drawImage(img, node.x - NODE_R, node.y - NODE_R, NODE_R * 2, NODE_R * 2); }
      else { ctx.fillStyle = col; ctx.fillRect(node.x - NODE_R, node.y - NODE_R, NODE_R * 2, NODE_R * 2); }
      ctx.restore();
      circle(ctx, node.x, node.y, NODE_R);
      ctx.lineWidth = Math.max(0.6, NODE_R * 0.16); ctx.strokeStyle = col; ctx.stroke();
    }
    function drawSelectionRing(ctx, node) {
      circle(ctx, node.x, node.y, NODE_R * 1.22);
      ctx.lineWidth = NODE_R * 0.16; ctx.strokeStyle = "#18181b"; ctx.stroke();
    }
    function drawYouBadge(ctx, node) {
      const w = NODE_R * 1.5, h = NODE_R * 0.72, x = node.x - w / 2, y = node.y - NODE_R - h - NODE_R * 0.28;
      roundRect(ctx, x, y, w, h, h * 0.5);
      ctx.fillStyle = `rgb(${ACCENT})`; ctx.fill();
      ctx.fillStyle = "#fff"; ctx.font = `bold ${NODE_R * 0.42}px Arial`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("YOU", node.x, y + h / 2);
    }

    // =====================================================================
    //  React: small hooks
    // =====================================================================
    function useSize() {
      const ref = useRef(null);
      const [size, setSize] = useState({ width: 800, height: 600 });
      useEffect(() => {
        if (!ref.current) return;
        const ro = new ResizeObserver(([e]) => setSize({ width: Math.max(1, e.contentRect.width), height: Math.max(1, e.contentRect.height) }));
        ro.observe(ref.current);
        return () => ro.disconnect();
      }, []);
      return [ref, size];
    }

    // cache face images; coalesce a redraw (one per frame) as they finish loading
    function useFaceImages() {
      const cache = useRef(new Map());
      const pending = useRef(false);
      const [tick, setTick] = useState(0);
      const get = useCallback((url) => {
        if (cache.current.has(url)) return cache.current.get(url);
        const img = new Image();
        img.onload = () => {
          if (pending.current) return;
          pending.current = true;
          requestAnimationFrame(() => { pending.current = false; setTick((t) => t + 1); });
        };
        img.src = url;
        cache.current.set(url, img);
        return img;
      }, []);
      return [get, tick];
    }

    function buildOverrides(deleted, moved) {
      const movedInto = new Map();
      moved.forEach((parent, child) => {
        if (!movedInto.has(parent)) movedInto.set(parent, new Set());
        movedInto.get(parent).add(child);
      });
      return { deleted, moved, movedInto };
    }

    // =====================================================================
    //  React: presentation components
    // =====================================================================
    const stop = (e) => e.stopPropagation();

    function NetworkHeader({ user }) {
      return (
        <header className="border-b border-zinc-200 bg-white px-6 py-4">
          <div className="mb-3 flex items-center justify-between">
            <div>
              <h1 className="text-lg font-semibold text-zinc-900">Your Network · force graph</h1>

    // =====================================================================
    //  App
    // =====================================================================
    function App() {
      const [deleted, setDeleted] = useState(() => new Set());
      const [moved, setMoved] = useState(() => new Map());
      const ov = useMemo(() => buildOverrides(deleted, moved), [deleted, moved]);

      const viewRootId = useMemo(() => parentOf(CURRENT_USER_ID, ov) || CURRENT_USER_ID, [ov]);
      const currentUser = useMemo(() => genUser(CURRENT_USER_ID, ov), [ov]);

      const [expanded, setExpanded] = useState(() => new Set([CURRENT_USER_ID]));
      const [selectedId, setSelectedId] = useState(CURRENT_USER_ID);
      const [query, setQuery] = useState("");
      const [highlightId, setHighlightId] = useState(null);

      const fgRef = useRef(null);
      const nodesRef = useRef(new Map());
      const [containerRef, size] = useSize();
      const [getImg, imgTick] = useFaceImages();

      // ---- graph (reuses node objects across renders so positions persist) ----
      const { graphData, visibleIds } = useMemo(() => {
        const { order, seen, lockR, rank } = computeLayout(ov, expanded, viewRootId);
        const map = nodesRef.current;
        const nodes = order.map((id) => {
          const u = genUser(id, ov);
          const n = map.get(id) || spawnNode(id, map, ov, lockR);
          map.set(id, n);
          n.u = u;
          n.isCurrent = id === CURRENT_USER_ID;
          n.expanded = expanded.has(id);
          n.rank = rank.get(id) || null;
          n.lockR = lockR.get(id) ?? INNER;
          n.score = Math.round(u.perf * 100);
          // pin the view root at the centre; everything fans out from it (the signed-in user
          // is just a YOU-badged node among their peers, not necessarily the root).
          if (id === viewRootId) { n.x = 0; n.y = 0; n.fx = 0; n.fy = 0; }
          // expanded nodes pop straight down (mirrors the radial lock); snap them HERE, before
          // their children are spawned below, so children fan evenly 360° around the final spot
          // rather than bunching where the parent sat before it popped out.
          if (n.expanded && id !== viewRootId) {
            const p = map.get(u.parentId);
            if (p && p.x != null) { n.x = p.x; n.y = p.y + n.lockR; n.vx = n.vy = 0; }
          }
          return n;
        });
        for (const id of [...map.keys()]) if (!seen.has(id)) map.delete(id); // prune nodes that left view
        const links = order.filter((id) => id !== viewRootId)
          .map((id) => ({ source: parentOf(id, ov), target: id }))
          .filter((l) => seen.has(l.source));
        return { graphData: { nodes, links }, visibleIds: order };
      }, [ov, expanded, viewRootId]);

      // ---- forces (the radial lock fixes every distance; only angles animate) ----
      useEffect(() => {
        const fg = fgRef.current; if (!fg) return;
        fg.d3Force("link").distance((l) => l.target?.lockR ?? INNER).strength(0); // no parent->child pull; radial lock fixes distance
        fg.d3Force("charge", null);  // the only repulsion is between siblings (below)
        fg.d3Force("center", null);  // the pinned root is the anchor, not the centroid
        fg.d3Force("sibrepel", makeSiblingRepel(SIBLING_REPEL, REPEL_RANGE));
        fg.d3Force("collide", makeCollide(() => NODE_R * HIT_MULT, COLLIDE_STRENGTH, COLLIDE_ITERS));
        fg.d3Force("radial", makeRadialLock());
      }, [graphData]);

      // ---- on every graph change, fit all nodes then back off ~25% ----
      useEffect(() => {
        const raf = requestAnimationFrame(() => {
          const fg = fgRef.current; if (!fg) return;
          fg.zoomToFit(0, 60);
          fg.zoom(fg.zoom() * 0.75, 400);
        });
        return () => cancelAnimationFrame(raf);
      }, [graphData]);

      // ---- edits ----
      const removeUser = useCallback((id) => {
        setDeleted((s) => new Set(s).add(id));
        setExpanded((e) => { const n = new Set(e); n.delete(id); return n; });
        setSelectedId((cur) => (cur === id ? null : cur));
      }, []);
      const reattachUser = useCallback((id, parent) => setMoved((m) => new Map(m).set(id, parent)), []);

      // ---- selection: accordion (one open node per level; opening prunes deeper) ----
      const selectNode = useCallback((node) => {
        const id = node.id, depth = levelOf(id);
        const keepAncestors = (e) => [...e].filter((x) => levelOf(x) < depth);
        if (expanded.has(id)) { setExpanded((e) => new Set(keepAncestors(e))); setSelectedId(parentOf(id, ov)); }
        else { setExpanded((e) => new Set([...keepAncestors(e), id])); setSelectedId(id); }
      }, [expanded, ov]);

      // reveal a (possibly off-screen) node by opening its whole ancestor path
      const navigateTo = useCallback((id) => {
        const chain = [];
        for (let c = id, i = 0; c && i < 40; c = parentOf(c, ov), i++) { chain.push(c); if (c === viewRootId) break; }
        setExpanded(new Set(chain));
        setSelectedId(id);
      }, [ov, viewRootId]);

      // ---- drag is disabled: click OR click-drag just selects; the node never moves ----
      const dragHome = useRef(new Map());
      const onNodeDrag = useCallback((node) => {
        const home = dragHome.current.get(node.id) || (dragHome.current.set(node.id, { x: node.x, y: node.y }), dragHome.current.get(node.id));
        Object.assign(node, { fx: home.x, fy: home.y, x: home.x, y: home.y, vx: 0, vy: 0 });
      }, []);
      const onNodeDragEnd = useCallback((node) => {
        const home = dragHome.current.get(node.id);
        if (home) { node.x = home.x; node.y = home.y; dragHome.current.delete(node.id); }
        if (node.id !== viewRootId) { node.fx = undefined; node.fy = undefined; }  // keep the centre anchored
        selectNode(node);
      }, [selectNode, viewRootId]);

      // ---- search ----
      const visibleSet = useMemo(() => new Set(visibleIds), [visibleIds]);
      const results = useMemo(() => searchNetwork(ov, CURRENT_USER_ID, query), [ov, query]);

      // ---- rendering ----
      const drawNode = useCallback((node, ctx) => {
        const col = scoreColor(node.u.perf), box = nodeBox(node);
        const glow = (node.isCurrent ? 3 : 0) + (node.id === highlightId ? 3 : 0);
        if (glow) drawGlow(ctx, node, box, glow);
        drawCard(ctx, node, box, col);
        drawFace(ctx, node, col, getImg(faceUrl(node.u)));
        if (node.id === selectedId) drawSelectionRing(ctx, node);
        if (node.isCurrent) drawYouBadge(ctx, node);
      }, [selectedId, highlightId, imgTick, getImg]);

      const drawHit = useCallback((node, color, ctx) => {
        ctx.fillStyle = color; circle(ctx, node.x, node.y, NODE_R * HIT_MULT); ctx.fill();
      }, []);

      const panelActions = useMemo(() => ({
        close: () => setSelectedId(null),
        message: (u) => window.open("https://wa.me/" + u.phone.replace(/\D/g, ""), "_blank"),
        openDashboard: (u) => alert("Would open the existing dashboard at /user/" + u.id),
        remove: removeUser,
        reattach: reattachUser,
      }), [removeUser, reattachUser]);

      return (
        <div className="flex h-full flex-col">
          <NetworkHeader user={currentUser} />
          <div ref={containerRef} className="relative flex-1 overflow-hidden bg-white">
            <SearchPanel
              value={query} onChange={setQuery}
              results={results} isInView={(id) => visibleSet.has(id)}
              onHover={setHighlightId}
              onPick={(id) => { navigateTo(id); setHighlightId(id); }} />

            <ForceGraph2D
              ref={fgRef}
              width={size.width} height={size.height}
              graphData={graphData}
              backgroundColor="#ffffff"
              nodeRelSize={5}
              nodeLabel={(n) => `${n.u.name} · ${SHORT[n.u.designation]} · score ${n.score}`}
              nodeCanvasObject={drawNode}
              nodePointerAreaPaint={drawHit}
              linkColor={() => "#d4d4d8"}
              linkWidth={0.6}
              linkDirectionalArrowLength={2.4}
              linkDirectionalArrowRelPos={1}
              cooldownTicks={SETTLE.cooldownTicks}
              d3AlphaDecay={SETTLE.alphaDecay}
              d3VelocityDecay={SETTLE.velocityDecay}
              enableNodeDrag={true}
              onNodeDrag={onNodeDrag}
              onNodeDragEnd={onNodeDragEnd}
              onNodeClick={selectNode}
              onBackgroundClick={() => setSelectedId(null)} />

            <DetailPanel id={selectedId} ov={ov} visibleIds={visibleIds} actions={panelActions} />
          </div>
        </div>
      );
    }

    return App;
    })();

    // #####################################################################
    // ## VIEW 2 — Expandable accordion TREE (React Flow v11).             ##
    // ## Fully self-contained in this IIFE; exported as <TreeFlowApp/>.   ##
    // #####################################################################
    const TreeFlowApp = (function () {
    const RFLib = window.ReactFlow;
    const ReactFlow = RFLib.default || RFLib.ReactFlow;
    const { Background, Controls, MiniMap, Handle, Position, useNodesState, useEdgesState, MarkerType } = RFLib;

    // =====================================================================
    //  Procedural population — models ≈10.1M users WITHOUT materializing them.
    //  ids are dotted paths: "r" -> "r.2" -> "r.2.5" … ; level = number of dots.
    // =====================================================================
    const ROOT_ID = "r";
    const LEVELS = ["DGSE", "BSA", "BEO", "Head Teacher", "Teacher", "Student"];
    const FANOUT = [[75, 75], [8, 14], [120, 150], [2, 7], [12, 28]];

    // the logged-in user is the DGSE / org root (level 0); the tree roots on them
    const CURRENT_USER_ID = "r";

    function hashStr(s) { // cyrb53-ish -> uint32
      let h1 = 0xdeadbeef ^ s.length, h2 = 0x41c6ce57 ^ s.length;
      for (let i = 0; i < s.length; i++) {
        const ch = s.charCodeAt(i);
        h1 = Math.imul(h1 ^ ch, 2654435761);
        h2 = Math.imul(h2 ^ ch, 1597334677);
      }
      h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
      h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
      return (h1 >>> 0);
    }

    const levelOf = (id) => id.split(".").length - 1;
    const baseParentOf = (id) => { const i = id.lastIndexOf("."); return i < 0 ? null : id.slice(0, i); };
    const baseChildCount = (id) => {
      const lvl = levelOf(id);
      if (lvl >= 5) return 0;
      const [mn, mx] = FANOUT[lvl];
      if (mn === mx) return mn;
      return mn + (hashStr("fan:" + id) % (mx - mn + 1));
    };

    const FIRST = ["Aarav","Diya","Kabir","Ishaan","Ananya","Riya","Aditya","Rohan","Saanvi","Arjun",
      "Priya","Myra","Vivaan","Kiara","Reyansh","Anvi","Tara","Dev","Ira","Yuvan","Sara","Krish",
      "Anil","Meena","Vikram","Sita","Deepak","Asha","Ravi","Neha","Manish","Geeta","Pooja","Rahul",
      "Sunil","Kavita","Pramod","Rajesh","Om","Nisha","Sanjay","Rekha","Amit","Sunita","Vijay","Lata",
      "Mohan","Usha","Suresh","Gita"];
    const LAST = ["Sharma","Gupta","Singh","Yadav","Joshi","Verma","Pal","Rao","Lal","Bose","Kumar",
      "Prakash","Devi","Mishra","Tiwari","Pandey","Chauhan","Saxena","Nair","Reddy"];

    const parentOf = (id, ov) => (ov.moved.get(id) ?? baseParentOf(id));

    function genUser(id, ov) {
      const lvl = levelOf(id);
      const type = lvl === 5 ? "student" : "educator";
      const h = hashStr("u:" + id);
      const first = FIRST[h % FIRST.length];
      return {
        id,
        name: type === "student" ? first : first + " " + LAST[(h >>> 9) % LAST.length],
        phone: "+9198" + String(1000000 + (h % 9000000)),
        designation: LEVELS[lvl],
        type,
        parentId: parentOf(id, ov),
        perf: (h % 1000) / 1000,
      };
    }

    function childIdsOf(id, ov) {
      const ids = [];
      const n = baseChildCount(id);
      for (let k = 0; k < n; k++) {
        const c = id + "." + k;
        if (ov.deleted.has(c)) continue;
        if ((ov.moved.get(c) ?? baseParentOf(c)) !== id) continue; // moved away
        ids.push(c);
      }
      const movedIn = ov.movedInto.get(id);
      if (movedIn) movedIn.forEach((c) => { if (!ov.deleted.has(c)) ids.push(c); });
      return ids;
    }

    const isAncestorOf = (anc, id, ov) => {
      let c = parentOf(id, ov);
      while (c) { if (c === anc) return true; c = parentOf(c, ov); }
      return false;
    };
    const depthFromRoot = (id, viewRootId, ov) => {
      let d = 0, c = id;
      while (c && c !== viewRootId) { c = parentOf(c, ov); d++; if (d > 24) break; }
      return d;
    };

    // =====================================================================
    //  Presentation helpers
    // =====================================================================
    const TIER = {
      "DGSE":         { ring: "bg-fuchsia-100 text-fuchsia-700", pill: "bg-fuchsia-50 text-fuchsia-700 ring-fuchsia-200" },
      "BSA":          { ring: "bg-rose-100 text-rose-700",     pill: "bg-rose-50 text-rose-700 ring-rose-200" },
      "BEO":          { ring: "bg-indigo-100 text-indigo-700", pill: "bg-indigo-50 text-indigo-700 ring-indigo-200" },
      "Head Teacher": { ring: "bg-sky-100 text-sky-700",       pill: "bg-sky-50 text-sky-700 ring-sky-200" },
      "Teacher":      { ring: "bg-violet-100 text-violet-700", pill: "bg-violet-50 text-violet-700 ring-violet-200" },
      "Student":      { ring: "bg-amber-100 text-amber-700",   pill: "bg-amber-50 text-amber-700 ring-amber-200" },
    };
    const SHORT = { "DGSE": "DGSE", "BSA": "BSA", "BEO": "BEO", "Head Teacher": "HT", "Teacher": "Tchr", "Student": "Std" };
    const perfColor = (p) =>
      p >= 0.75 ? { chip: "bg-emerald-50 text-emerald-700 ring-emerald-200", dot: "#10b981" }
      : p >= 0.5 ? { chip: "bg-amber-50 text-amber-700 ring-amber-200",      dot: "#f59e0b" }
      :            { chip: "bg-red-50 text-red-700 ring-red-200",            dot: "#ef4444" };
    function initials(name) {
      const parts = name.replace(/\(.*\)/, "").trim().split(/\s+/);
      return ((parts[0]?.[0] || "") + (parts[1]?.[0] || "")).toUpperCase();
    }

    function metricsFor(u) {
      const p = u.perf;
      if (u.type === "student") {
        const letters = ["क","ख","ग","अ","आ","इ","म","प","र","स","ल","न"];
        const voice = Array.from({ length: 6 }, (_, i) => ({
          word: letters[(i * 5 + Math.round(p * 10)) % letters.length],
          dur: (1 + ((i * 7 + Math.round(p * 9)) % 2)) + "s",
          when: ["just now","2h ago","yesterday","2d ago","3d ago","5d ago"][i],
        }));
        return { kind: "student", stats: [
          ["Letters learnt", Math.round(p * 46) + " / 46"],
          ["Lessons done", Math.round(p * 120)],
          ["Active (7d)", Math.round(p * 100) + "%"],
          ["Last active", ["today","yesterday","2d ago","4d ago"][Math.round(p * 3)]],
        ], voice };
      }
      return { kind: "educator", stats: [
        ["Students reached", Math.round(40 + p * 160)],
        ["Active (7d)", Math.round(p * 100) + "%"],
        ["Lessons", Math.round(200 + p * 1400)],
        ["Avg score", Math.round(p * 100)],
        ["Letters taught", Math.round(10 + p * 36)],
        ["Reports below", u.designation === "BEO" ? "100s" : u.designation === "Head Teacher" ? "10s" : "few"],

    // =====================================================================
    //  Layout: LEFT -> RIGHT. depth = column (x). children block is centered
    //  on the parent it expands from. Only VISIBLE nodes are placed/generated.
    // =====================================================================
    const CARD_W = 272, COL_GAP = 104, ROW_GAP = 0;
    const H_COLLAPSED = 24, H_EXP_ED = 300, H_EXP_STU = 344;
    const heightOf = (u, selected) => !selected ? H_COLLAPSED : (u.type === "student" ? H_EXP_STU : H_EXP_ED);

    function computeView(ov, selected, viewRootId) {
      const sortedKids = (id) =>
        childIdsOf(id, ov)
          .map((cid) => ({ cid, perf: genUser(cid, ov).perf }))
          .sort((a, b) => b.perf - a.perf)
          .map((x) => x.cid);

      const order = [];
      const walk = (id, depth) => {
        order.push({ id, depth });
        if (id === viewRootId || selected.has(id)) sortedKids(id).forEach((c) => walk(c, depth + 1));
      };
      walk(viewRootId, 0);

      const node = {};
      order.forEach(({ id }) => { node[id] = genUser(id, ov); });
      const hOf = (id) => heightOf(node[id], selected.has(id));

      // group by depth (accordion => one revealing parent per depth)
      const byDepth = {};
      order.forEach((o) => { (byDepth[o.depth] = byDepth[o.depth] || []).push(o.id); });
      const maxDepth = order.reduce((m, o) => Math.max(m, o.depth), 0);

      const pos = {};
      for (let d = 0; d <= maxDepth; d++) {
        const ids = byDepth[d] || [];
        if (d === 0) { ids.forEach((id) => { pos[id] = { x: 0, y: 0 }; }); continue; }
        const parent = node[ids[0]].parentId;
        const parentCenter = pos[parent].y + hOf(parent) / 2;
        const total = ids.reduce((s, id) => s + hOf(id), 0) + ROW_GAP * (ids.length - 1);
        let cursor = parentCenter - total / 2;
        ids.forEach((id) => { pos[id] = { x: d * (CARD_W + COL_GAP), y: cursor }; cursor += hOf(id) + ROW_GAP; });
      }

      // rank each visible node among its FULL peer set (same referrer, ≤150)
      const rank = {};
      const parents = new Set(order.map((o) => node[o.id].parentId).filter(Boolean));
      parents.forEach((p) => {
        childIdsOf(p, ov)
          .map((cid) => ({ cid, perf: genUser(cid, ov).perf }))
          .sort((a, b) => b.perf - a.perf)
          .forEach((s, i, arr) => { rank[s.cid] = { pos: i + 1, total: arr.length }; });
      });

      const dims = {};
      order.forEach(({ id }) => {
        const isSel = selected.has(id);
        dims[id] = {
          h: hOf(id), selected: isSel,
          hiddenChildren: (id === viewRootId || isSel) ? 0 : childIdsOf(id, ov).length,
        };
      });

      return { order, pos, dims, node, rank };
    }

    // #####################################################################
    // ## VIEW 3 — Uttar Pradesh district map (d3-geo choropleth).         ##
    // ## Each district is its own UI element, coloured by its BSA's       ##

    // #####################################################################
    const MapApp = (function () {

      function hashStr(s) {

        h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
        return (h1 >>> 0);
      }
      const FIRST = ["Aarav","Diya","Kabir","Ishaan","Ananya","Riya","Aditya","Rohan","Saanvi","Arjun",
        "Priya","Myra","Vivaan","Kiara","Reyansh","Anvi","Tara","Dev","Ira","Yuvan","Sara","Krish",
        "Anil","Meena","Vikram","Sita","Deepak","Asha","Ravi","Neha","Manish","Geeta","Pooja","Rahul",
        "Sunil","Kavita","Pramod","Rajesh","Om","Nisha","Sanjay","Rekha","Amit","Sunita","Vijay","Lata",
        "Mohan","Usha","Suresh","Gita"];
      const LAST = ["Sharma","Gupta","Singh","Yadav","Joshi","Verma","Pal","Rao","Lal","Bose","Kumar",
        "Prakash","Devi","Mishra","Tiwari","Pandey","Chauhan","Saxena","Nair","Reddy"];
      const FACE_COUNT = { adult: 300 };

      const lerp = (a, b, t) => a.map((v, i) => v + (b[i] - v) * t);
      function scoreRGB(p) {                              // red(0) -> yellow(.5) -> green(1)
        const red = [239, 68, 68], yellow = [234, 179, 8], green = [34, 197, 94];
        return (p < 0.5 ? lerp(red, yellow, p / 0.5) : lerp(yellow, green, (p - 0.5) / 0.5)).map((v) => v | 0);
      }
      const scoreColor = (p) => `rgb(${scoreRGB(p).join(",")})`;
      const textOn = (p) => { const [r, g, b] = scoreRGB(p); return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.62 ? "#1c1917" : "#ffffff"; };

      // BSA k -> the same person the force-graph / tree views show for node "r.k".
      function bsa(k) {
        const id = "r." + k;
        const h = hashStr("u:" + id);
        const perf = (h % 1000) / 1000;
        return {
          id,
          name: FIRST[h % FIRST.length] + " " + LAST[(h >>> 9) % LAST.length],
          perf, score: Math.round(perf * 100),
          face: "faces/adult/" + (hashStr("face:" + id) % FACE_COUNT.adult) + ".jpg",
          phone: "+9198" + String(1000000 + (h % 9000000)),

      const ZMIN = 0.7, ZMAX = 200;   // all-India projection: deep levels (block/schools) need high zoom
      const clamp = (v, lo, hi) => (v < lo ? lo : v > hi ? hi : v);

      // --- org model: state=DGSE, district=BSA, block=BEO, school=Head Teacher ---
      // The signed-in user is a DGSE; their peer level is every State DGSE (all India).
      const LEVELS = ["India", "DGSE", "BSA", "BEO", "Head Teacher", "Teacher", "Student"];
      // children-per-node range, by level. India/DGSE/BSA fan-out is geographic
      // (states, districts, blocks come from the map data); only BEO->school,
      // Head Teacher->teacher and teacher->student are procedural.
      const FANOUT = [null, null, null, [120, 150], [2, 7], [12, 28]];
      FACE_COUNT.child = 50;
      function node(id) {
        const lvl = id.split(".").length - 1;
        const h = hashStr("u:" + id);
        const perf = (h % 1000) / 1000;
        const student = lvl === LEVELS.length - 1;
        return {
          id, lvl, designation: LEVELS[lvl] || "—",
          name: FIRST[h % FIRST.length] + (student ? "" : " " + LAST[(h >>> 9) % LAST.length]),
          perf, score: Math.round(perf * 100),
          face: "faces/" + (student ? "child" : "adult") + "/" + (hashStr("face:" + id) % (student ? FACE_COUNT.child : FACE_COUNT.adult)) + ".jpg",
          phone: "+9198" + String(1000000 + (h % 9000000)),
        };
      }
      function baseChildCount(id) {
        const lvl = id.split(".").length - 1;
        const f = FANOUT[lvl];
        if (!f) return 0;
        const [mn, mx] = f;
        return mn === mx ? mn : mn + (hashStr("fan:" + id) % (mx - mn + 1));
      }

      // --- geometry helpers (operate in projected screen space) ---
      const stripClose = (r) => (r.length > 1 && r[0][0] === r[r.length - 1][0] && r[0][1] === r[r.length - 1][1] ? r.slice(0, -1) : r);
      const ringArea = (r) => { let s = 0; for (let i = 0, j = r.length - 1; i < r.length; j = i++) s += r[j][0] * r[i][1] - r[i][0] * r[j][1]; return s / 2; };
      function bboxOf(r) { let a = Infinity, b = Infinity, c = -Infinity, d = -Infinity; for (const p of r) { if (p[0] < a) a = p[0]; if (p[1] < b) b = p[1]; if (p[0] > c) c = p[0]; if (p[1] > d) d = p[1]; } return [a, b, c, d]; }
      function largestRing(feature, proj) {
        const g = feature.geometry;
        const polys = g.type === "Polygon" ? [g.coordinates] : g.coordinates;
        let best = null, bestA = -1;
        for (const poly of polys) { const pr = poly[0].map((c) => proj(c)); const a = Math.abs(ringArea(pr)); if (a > bestA) { bestA = a; best = pr; } }
        return best || [];
      }
      const toPath = (poly) => "M" + poly.map((p) => p[0].toFixed(1) + "," + p[1].toFixed(1)).join("L") + "Z";
      function pointInPoly(p, ring) {
        let inside = false;
        for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
          const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
          if (((yi > p[1]) !== (yj > p[1])) && (p[0] < (xj - xi) * (p[1] - yi) / (yj - yi) + xi)) inside = !inside;
        }

      function rng(seed) { let a = seed >>> 0; return () => { a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
      function sampleInside(ring, n, seed) {
        const [minx, miny, maxx, maxy] = bboxOf(ring);
        const r = rng(seed), out = []; let tries = 0; const cap = n * 400 + 3000;
        while (out.length < n && tries++ < cap) { const p = [minx + (maxx - minx) * r(), miny + (maxy - miny) * r()]; if (pointInPoly(p, ring)) out.push(p); }
        return out;
      }
      const segInt = (p1, p2, a, b) => {
        const x1 = p1[0], y1 = p1[1], x2 = p2[0], y2 = p2[1], x3 = a[0], y3 = a[1], x4 = b[0], y4 = b[1];
        const den = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
        if (!den) return p2.slice();
        const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / den;
        return [x1 + t * (x2 - x1), y1 + t * (y2 - y1)];
      };
      // Sutherland–Hodgman: clip 'subject' (any simple polygon) by convex 'clip'.
      function clipPolygon(subject, clip) {
        clip = stripClose(clip);
        if (clip.length < 3) return subject;
        let cx = 0, cy = 0; for (const p of clip) { cx += p[0]; cy += p[1]; } cx /= clip.length; cy /= clip.length;
        let out = subject;
        for (let e = 0; e < clip.length && out.length; e++) {
          const A = clip[e], B = clip[(e + 1) % clip.length];
          const sgn = ((B[0] - A[0]) * (cy - A[1]) - (B[1] - A[1]) * (cx - A[0])) >= 0 ? 1 : -1;
          const inside = (p) => sgn * ((B[0] - A[0]) * (p[1] - A[1]) - (B[1] - A[1]) * (p[0] - A[0])) >= 0;
          const inp = out; out = [];
          for (let i = 0; i < inp.length; i++) {
            const cur = inp[i], prev = inp[(i + inp.length - 1) % inp.length];
            const ci = inside(cur), pi = inside(prev);
            if (ci) { if (!pi) out.push(segInt(prev, cur, A, B)); out.push(cur); }
            else if (pi) out.push(segInt(prev, cur, A, B));
          }
        }
        return out;
      }

      function MapApp() {
        const wrapRef = useRef(null);
        const [size, setSize] = useState({ w: 1000, h: 640 });
        const [geoDist, setGeoDist] = useState(null);         // national districts — null | "error" | FeatureCollection
        const [geoBlk, setGeoBlk] = useState(null);           // national LGD blocks — null | "error" | FeatureCollection
        const [level, setLevel] = useState("states");         // states | districts | blocks | schools | school
        const [sIdx, setSIdx] = useState(null);               // focused state index (a DGSE — peer of the signed-in user)
        const [dIdx, setDIdx] = useState(null);               // focused district index (within the state)
        const [bIdx, setBIdx] = useState(null);               // focused block index
        const [selHt, setSelHt] = useState(null);             // focused Head-Teacher id (force-graph level)
        const [active, setActive] = useState(null);           // { u, title, sub } under the cursor
        const [tf, setTf] = useState({ k: 1, x: 0, y: 0 });    // pan/zoom transform
        const drag = useRef(null);
        const moved = useRef(false);

        useEffect(() => {
          fetch("india-districts.geojson")
            .then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(setGeoDist).catch(() => setGeoDist("error"));
          fetch("india-blocks.geojson")
            .then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(setGeoBlk).catch(() => setGeoBlk("error"));
        }, []);

        useEffect(() => {
          const el = wrapRef.current; if (!el) return;
          const measure = () => { const r = el.getBoundingClientRect(); setSize({ w: Math.max(320, r.width), h: Math.max(320, r.height) }); };
          measure();
          const ro = new ResizeObserver(measure); ro.observe(el);
          return () => ro.disconnect();
        }, []);

        // one projection fitted to all of India; every level lives in this space (drill = zoom)
        const projd = useMemo(() => {
          if (!geoDist || geoDist === "error" || !d3) return null;
          const proj = d3.geoMercator().fitSize([size.w, size.h], geoDist);
          return { proj, path: d3.geoPath(proj) };
        }, [geoDist, size]);

        // every district of India, projected once
        const allDist = useMemo(() => {
          if (!projd || !geoDist || geoDist === "error") return null;
          const { proj, path } = projd;
          return geoDist.features.map((f, gi) => {
            const ring = stripClose(largestRing(f, proj));
            return { gi, st: f.properties.st, dt: f.properties.dt, name: f.properties.district, stateName: f.properties.state,
              d: path(f), c: path.centroid(f), ring, bbox: bboxOf(ring) };
          });
        }, [projd, geoDist]);

        // LEVEL 0 — states (each = a DGSE): districts grouped by state code
        const states = useMemo(() => {
          if (!allDist) return null;
          const groups = new Map();
          for (const d of allDist) { if (!groups.has(d.st)) groups.set(d.st, []); groups.get(d.st).push(d); }
          return [...groups.entries()].sort((a, b) => (+a[0]) - (+b[0])).map(([stc, ds], i) => {
            const id = "r." + i;
            const bb = [Infinity, Infinity, -Infinity, -Infinity]; let cx = 0, cy = 0;
            for (const d of ds) { bb[0] = Math.min(bb[0], d.bbox[0]); bb[1] = Math.min(bb[1], d.bbox[1]); bb[2] = Math.max(bb[2], d.bbox[2]); bb[3] = Math.max(bb[3], d.bbox[3]); cx += d.c[0]; cy += d.c[1]; }
            return { i, id, st: stc, name: ds[0].stateName, districts: ds, u: node(id), c: [cx / ds.length, cy / ds.length], bbox: bb };
          });
        }, [allDist]);

        const stIndex = useMemo(() => { const m = new Map(); if (states) for (const s of states) m.set(s.st, s); return m; }, [states]);

        // LEVEL 1 — districts (each = a BSA) of the focused state, with org id
        const districts = useMemo(() => {
          if (!states || sIdx == null) return null;
          const s = states[sIdx];
          return s.districts.map((d, j) => ({ ...d, j, id: s.id + "." + j, u: node(s.id + "." + j) }));
        }, [states, sIdx]);

        // raw block features grouped by state|district census code (cheap; no projection)
        const blockIndex = useMemo(() => {
          if (!geoBlk || geoBlk === "error") return null;
          const m = new Map();
          for (const f of geoBlk.features) { const k = f.properties.st + "|" + f.properties.dt; if (!m.has(k)) m.set(k, []); m.get(k).push(f); }
          return m;
        }, [geoBlk]);

        // LEVEL 2 — blocks (each = a BEO): the real LGD blocks of the focused district, projected on demand.
        const blocks = useMemo(() => {
          if (!districts || dIdx == null || !blockIndex || !projd) return null;
          const dst = districts[dIdx]; const { proj, path } = projd;
          const feats = blockIndex.get(dst.st + "|" + dst.dt) || [];
          return feats.map((f, k) => {
            const ring = stripClose(largestRing(f, proj)); const id = dst.id + "." + k;
            return { k, id, u: node(id), name: f.properties.block, ring, d: path(f), seed: path.centroid(f), bbox: bboxOf(ring) };
          }).filter((b) => b.ring.length >= 3);
        }, [districts, dIdx, blockIndex, projd]);

        // LEVEL 3 — schools (each = a Head Teacher): random points inside the focused block.
        // Count = the BEO's child count in the org model; positions are illustrative, not real.
        const schools = useMemo(() => {
          if (!blocks || bIdx == null || !blocks[bIdx]) return null;
          const blk = blocks[bIdx];
          const m = baseChildCount(blk.id);
          return sampleInside(blk.ring, m, hashStr("sch:" + blk.id)).map((p, k) => {
            const id = blk.id + "." + k;
            return { k, id, u: node(id), p };
          });
        }, [blocks, bIdx]);

        // LEVEL 3 — one school (force graph): the Head Teacher, its Teachers and their
        // Students, laid out with a settled d3-force simulation. Counts come from the org model.
        const school = useMemo(() => {
          if (!selHt || !d3) return null;
          const htU = node(selHt);
          const nodes = [{ id: selHt, u: htU, group: "ht", r: 15 }];
          const links = [];
          const teachers = baseChildCount(selHt);
          for (let t = 0; t < teachers; t++) {
            const tid = selHt + "." + t;
            nodes.push({ id: tid, u: node(tid), group: "teacher", r: 9 });
            links.push({ source: selHt, target: tid });
            const sc = baseChildCount(tid);
            for (let s = 0; s < sc; s++) {
              const sid = tid + "." + s;
              nodes.push({ id: sid, u: node(sid), group: "student", r: 5 });
              links.push({ source: tid, target: sid });
            }
          }
          const sim = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id((d) => d.id).distance((l) => (l.source.group === "ht" ? 75 : 30)).strength(0.75))
            .force("charge", d3.forceManyBody().strength(-55).distanceMax(280))
            .force("collide", d3.forceCollide().radius((d) => d.r + 2).iterations(2))
            .force("x", d3.forceX(0).strength(0.045)).force("y", d3.forceY(0).strength(0.045))
            .stop();
          for (let i = 0; i < 300; i++) sim.tick();
          let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
          for (const n of nodes) { if (n.x < minx) minx = n.x; if (n.x > maxx) maxx = n.x; if (n.y < miny) miny = n.y; if (n.y > maxy) maxy = n.y; }
          return { nodes, links, htU, bbox: [minx - 24, miny - 24, maxx + 24, maxy + 24],
            counts: { teachers, students: nodes.filter((n) => n.group === "student").length } };
        }, [selHt]);

        const frame = useCallback((bbox, pad) => {
          const [minx, miny, maxx, maxy] = bbox;
          const bw = Math.max(1, maxx - minx), bh = Math.max(1, maxy - miny);
          const k = clamp(Math.min(size.w / bw, size.h / bh) * (pad || 0.82), ZMIN, ZMAX);
          return { k, x: size.w / 2 - ((minx + maxx) / 2) * k, y: size.h / 2 - ((miny + maxy) / 2) * k };
        }, [size]);

        const drillState = useCallback((i) => { if (moved.current) return; setSIdx(i); setDIdx(null); setBIdx(null); setSelHt(null); setActive(null); setLevel("districts"); setTf(frame(states[i].bbox)); }, [states, frame]);
        const drillDistrict = useCallback((j) => { if (moved.current || !districts || !districts[j]) return; setDIdx(j); setBIdx(null); setActive(null); setLevel("blocks"); setTf(frame(districts[j].bbox)); }, [districts, frame]);
        const drillBlock = useCallback((k) => { if (moved.current || !blocks || !blocks[k]) return; setBIdx(k); setActive(null); setLevel("schools"); setTf(frame(blocks[k].bbox)); }, [blocks, frame]);
        const drillSchool = useCallback((sc) => { if (moved.current) return; setSelHt(sc.u.id); setActive(null); setLevel("school"); }, []);
        // jump straight to a level via the breadcrumb
        const goLevel = useCallback((target) => {
          setActive(null);
          if (target === "states") { setLevel("states"); setSIdx(null); setDIdx(null); setBIdx(null); setSelHt(null); setTf({ k: 1, x: 0, y: 0 }); }
          else if (target === "districts") { setLevel("districts"); setDIdx(null); setBIdx(null); setSelHt(null); if (states && states[sIdx]) setTf(frame(states[sIdx].bbox)); }
          else if (target === "blocks") { setLevel("blocks"); setBIdx(null); setSelHt(null); if (districts && districts[dIdx]) setTf(frame(districts[dIdx].bbox)); }
          else if (target === "schools") { setLevel("schools"); setSelHt(null); if (blocks && blocks[bIdx]) setTf(frame(blocks[bIdx].bbox)); }
        }, [states, sIdx, districts, dIdx, blocks, bIdx, frame]);
        const popUp = useCallback(() => {
          if (level === "school") goLevel("schools");
          else if (level === "schools") goLevel("blocks");
          else if (level === "blocks") goLevel("districts");
          else if (level === "districts") goLevel("states");
        }, [level, goLevel]);

        // frame the force graph to the viewport when a school opens
        useEffect(() => { if (level === "school" && school) setTf(frame(school.bbox)); }, [school, level, frame]);

        const onWheel = useCallback((e) => {
          e.preventDefault();
          const rect = e.currentTarget.getBoundingClientRect();
          const px = e.clientX - rect.left, py = e.clientY - rect.top;
          setTf((t) => { const k = clamp(t.k * (e.deltaY < 0 ? 1.12 : 1 / 1.12), ZMIN, ZMAX); const s = k / t.k; return { k, x: px - (px - t.x) * s, y: py - (py - t.y) * s }; });
        }, []);
        const onPointerDown = useCallback((e) => { drag.current = { x: e.clientX, y: e.clientY, tx: tf.x, ty: tf.y }; moved.current = false; }, [tf]);
        const onPointerMove = useCallback((e) => {
          if (!drag.current) return;
          const dx = e.clientX - drag.current.x, dy = e.clientY - drag.current.y;
          if (Math.abs(dx) + Math.abs(dy) > 4) moved.current = true;
          setTf((t) => ({ ...t, x: drag.current.tx + dx, y: drag.current.ty + dy }));
        }, []);
        const onPointerUp = useCallback(() => { drag.current = null; }, []);
        const onBgClick = useCallback(() => { if (!moved.current) popUp(); }, [popUp]);   // empty-space click = up one level

        const gStyle = { transition: drag.current ? "none" : "transform .35s ease" };
        const st = sIdx != null && states ? states[sIdx] : null;
        const dst = dIdx != null && districts ? districts[dIdx] : null;
        const blk = bIdx != null && blocks ? blocks[bIdx] : null;

        return (
          <div className="flex h-full flex-col">
            <header className="flex flex-wrap items-center gap-x-6 gap-y-2 border-b border-zinc-200 bg-white px-6 py-3">
              <div>
                <h1 className="flex flex-wrap items-center gap-1.5 text-lg font-semibold text-zinc-900">
                  <button onClick={() => goLevel("states")} className={level === "states" ? "text-zinc-900" : "text-blue-600 hover:underline"}>All India</button>
                  {st && <span className="text-zinc-300">›</span>}
                  {st && <button onClick={() => goLevel("districts")} className={level === "districts" ? "text-zinc-900" : "text-blue-600 hover:underline"}>{st.name}</button>}
                  {dst && <span className="text-zinc-300">›</span>}
                  {dst && <button onClick={() => goLevel("blocks")} className={level === "blocks" ? "text-zinc-900" : "text-blue-600 hover:underline"}>{dst.name}</button>}
                  {blk && <span className="text-zinc-300">›</span>}
                  {blk && <button onClick={() => goLevel("schools")} className={level === "schools" ? "text-zinc-900" : "text-blue-600 hover:underline"}>{blk.name}</button>}
                  {level === "school" && <span className="text-zinc-300">›</span>}
                  {level === "school" && <span className="text-zinc-900">School</span>}
                </h1>
                <p className="text-xs text-zinc-500">
                  {level === "states" && "Signed in as a DGSE · viewing every State DGSE — your peers across India · click a state to drill in"}
                  {level === "districts" && `${st ? st.name : ""} · ${districts ? districts.length : 0} districts (BSAs) · click a district · click empty space to go up`}
                  {level === "blocks" && `${blocks ? blocks.length : 0} blocks (BEOs) · real LGD boundaries · click a block · click empty space to go up`}
                  {level === "schools" && `≈${blk ? baseChildCount(blk.id) : 0} schools · markers are illustrative — randomly placed within the block, not real locations · click a school · click empty space to go up`}
                  {level === "school" && `${school ? school.htU.name : ""} (Head Teacher) · ${school ? school.counts.teachers : 0} teachers · ${school ? school.counts.students : 0} students · click empty space to go up`}
                </p>
              </div>
              <div className="ml-auto flex items-center gap-2 text-xs text-zinc-500">
                <span>score</span><span>0</span>
                <span className="h-2 w-28 rounded" style={{ background: "linear-gradient(to right,#ef4444,#eab308,#22c55e)" }} />
                <span>100</span>
                <button onClick={() => setTf(level === "school" && school ? frame(school.bbox) : level === "schools" && blk ? frame(blk.bbox) : level === "blocks" && dst ? frame(dst.bbox) : level === "districts" && st ? frame(st.bbox) : { k: 1, x: 0, y: 0 })}
                  className="ml-2 rounded-md border border-zinc-200 px-2 py-1 font-semibold text-zinc-600 hover:bg-zinc-50">Reset</button>
              </div>
            </header>

            <div ref={wrapRef} className="relative min-h-0 flex-1 overflow-hidden bg-[#f6f7f9]">
              {!allDist ? (
                <div className="flex h-full items-center justify-center text-sm text-zinc-400">
                  {geoDist === "error" ? "Could not load india-districts.geojson — serve the folder over http (npx serve .)." : "Loading map…"}
                </div>
              ) : (
                <svg width={size.w} height={size.h} className="block touch-none select-none"
                  onWheel={onWheel} onPointerDown={onPointerDown} onPointerMove={onPointerMove}
                  onPointerUp={onPointerUp} onPointerLeave={onPointerUp} onClick={onBgClick}
                  style={{ cursor: drag.current ? "grabbing" : "grab" }}>
                  <g transform={`translate(${tf.x},${tf.y}) scale(${tf.k})`} style={gStyle}>

                    {/* LEVEL: states — every district coloured by its state's DGSE score */}
                    {level === "states" && allDist.map((d0) => {
                      const s = stIndex.get(d0.st); if (!s) return null;
                      const on = active && active.u.id === s.id;
                      return (
                        <path key={d0.gi} d={d0.d} fill={scoreColor(s.u.perf)}
                          stroke={on ? "#0f172a" : scoreColor(s.u.perf)} strokeWidth={(on ? 1.4 : 0.4) / tf.k}
                          style={{ cursor: "pointer" }}
                          onMouseEnter={() => setActive({ u: s.u, title: s.name, sub: "DGSE · " + s.u.name })}
                          onClick={(e) => { e.stopPropagation(); drillState(s.i); }} />
                      );
                    })}

                    {/* LEVEL: districts (of the focused state) */}
                    {level === "districts" && districts && districts.map((d0) => (
                      <path key={d0.id} d={d0.d} fill={scoreColor(d0.u.perf)}
                        stroke={active && active.u.id === d0.id ? "#0f172a" : "#ffffff"} strokeWidth={(active && active.u.id === d0.id ? 1.6 : 0.6) / tf.k}
                        style={{ cursor: "pointer" }}
                        onMouseEnter={() => setActive({ u: d0.u, title: d0.name, sub: "BSA · " + d0.u.name })}
                        onClick={(e) => { e.stopPropagation(); drillDistrict(d0.j); }} />
                    ))}

                    {/* LEVEL: blocks (real LGD blocks of focused district) */}
                    {level === "blocks" && blocks && blocks.map((b) => (
                      <path key={b.id} d={b.d} fill={scoreColor(b.u.perf)}
                        stroke={active && active.u.id === b.id ? "#0f172a" : "#ffffff"} strokeWidth={(active && active.u.id === b.id ? 2 : 1) / tf.k}
                        style={{ cursor: "pointer" }}
                        onMouseEnter={() => setActive({ u: b.u, title: b.name + " · " + dst.name, sub: "BEO · " + b.u.name })}
                        onClick={(e) => { e.stopPropagation(); drillBlock(b.k); }} />
                    ))}

                    {/* LEVEL: schools (dots inside focused block) */}
                    {level === "schools" && blk && (
                      <path d={blk.d} fill="#ffffff" fillOpacity="0.5" stroke="#0f172a" strokeWidth={1.4 / tf.k} style={{ pointerEvents: "none" }} />
                    )}
                    {level === "schools" && schools && schools.map((sc) => (
                      <circle key={sc.id} cx={sc.p[0]} cy={sc.p[1]} r={(active && active.u.id === sc.id ? 5 : 3) / tf.k}
                        fill={scoreColor(sc.u.perf)} stroke="#ffffff" strokeWidth={0.8 / tf.k} style={{ cursor: "pointer" }}
                        onMouseEnter={() => setActive({ u: sc.u, title: "School " + (sc.k + 1), sub: "Head Teacher · " + sc.u.name })}
                        onClick={(e) => { e.stopPropagation(); drillSchool(sc); }} />
                    ))}

                    {/* LEVEL: school (force graph — Head Teacher › Teachers › Students) */}
                    {level === "school" && school && (
                      <g>
                        {school.links.map((l, idx) => (
                          <line key={"l" + idx} x1={l.source.x} y1={l.source.y} x2={l.target.x} y2={l.target.y}
                            stroke="#cbd5e1" strokeWidth={(l.source.group === "ht" ? 1.6 : 0.8) / tf.k} />
                        ))}
                        {school.nodes.map((n) => {
                          const on = active && active.u.id === n.id;
                          return (
                            <circle key={n.id} cx={n.x} cy={n.y} r={n.r}
                              fill={scoreColor(n.u.perf)} stroke={on || n.group === "ht" ? "#0f172a" : "#ffffff"}
                              strokeWidth={(n.group === "ht" ? 2.5 : on ? 2 : 0.8) / tf.k} style={{ cursor: "pointer" }}
                              onMouseEnter={() => setActive({ u: n.u, title: n.group === "ht" ? "Head Teacher" : n.group === "teacher" ? "Teacher" : "Student", sub: n.u.name })}
                              onClick={(e) => e.stopPropagation()} />
                          );
                        })}
                      </g>
                    )}

                    {/* chips (states, districts & blocks): face + name + score, click to drill */}
                    {(level === "states" || level === "districts" || level === "blocks") && (() => {
                      const items = level === "states"
                        ? (states || []).map((s) => ({ id: s.id, u: s.u, name: s.name, c: s.c, go: () => drillState(s.i), set: () => setActive({ u: s.u, title: s.name, sub: "DGSE · " + s.u.name }) }))
                        : level === "districts"
                        ? (districts || []).map((d0) => ({ id: d0.id, u: d0.u, name: d0.name, c: d0.c, go: () => drillDistrict(d0.j), set: () => setActive({ u: d0.u, title: d0.name, sub: "BSA · " + d0.u.name }) }))
                        : (blocks || []).map((b) => ({ id: b.id, u: b.u, name: b.name, c: b.seed, go: () => drillBlock(b.k), set: () => setActive({ u: b.u, title: b.name + " · " + (dst ? dst.name : ""), sub: "BEO · " + b.u.name }) }));
                      return items.sort((a, b) => ((active && a.id === active.u.id) ? 1 : 0) - ((active && b.id === active.u.id) ? 1 : 0)).map((it) => {
                        const on = active && active.u.id === it.id;
                        const BW = 92, BH = 40, s = (on ? 1.7 : 1) / tf.k, w = BW * s, h = BH * s;
                        return (
                          <foreignObject key={"c" + it.id} x={it.c[0] - w / 2} y={it.c[1] - h / 2} width={w} height={h} style={{ overflow: "visible", pointerEvents: "none" }}>
                            <div onMouseEnter={it.set} onClick={(e) => { e.stopPropagation(); it.go(); }}
                              className="flex cursor-pointer items-center gap-1.5 rounded-md border border-black/10 bg-white/85 px-1.5 py-1 shadow-sm backdrop-blur-[1px]"
                              style={{ width: BW, height: BH, transform: `scale(${s})`, transformOrigin: "top left", pointerEvents: "auto", outline: on ? "2px solid #0f172a" : "none" }}>
                              <img src={it.u.face} alt="" loading="lazy" className="h-6 w-6 flex-shrink-0 rounded-full object-cover brightness-110" style={{ boxShadow: "0 0 0 2px " + scoreColor(it.u.perf) }} />
                              <div className="min-w-0 leading-tight">
                                <div className="truncate text-[9px] font-semibold text-zinc-900" style={{ maxWidth: 58 }}>{it.name}</div>
                                <div className="truncate text-[8px] text-zinc-500" style={{ maxWidth: 58 }}>{it.u.name}</div>
                              </div>
                              <span className="ml-auto rounded px-1 py-0.5 text-[9px] font-bold" style={{ background: scoreColor(it.u.perf), color: textOn(it.u.perf) }}>{it.u.score}</span>
                            </div>
                          </foreignObject>
                        );
                      });
                    })()}
                  </g>
                </svg>
              )}

              {/* readout panel for the active element */}
              {active && (
                <div className="pointer-events-none absolute left-4 top-4 w-64 rounded-xl border border-zinc-200 bg-white/95 p-3 shadow-lg">
                  <div className="flex items-center gap-3">
                    <img src={active.u.face} alt="" className="h-12 w-12 rounded-full object-cover brightness-110" style={{ boxShadow: "0 0 0 3px " + scoreColor(active.u.perf) }} />
                    <div className="min-w-0">
                      <div className="truncate text-sm font-semibold text-zinc-900">{active.title}</div>
                      <div className="truncate text-xs text-zinc-500">{active.sub}</div>
                      <div className="text-[11px] text-zinc-400">{active.u.phone}</div>
                    </div>
                    <span className="ml-auto self-start rounded-md px-2 py-1 text-xs font-bold" style={{ background: scoreColor(active.u.perf), color: textOn(active.u.perf) }}>{active.u.score}</span>
                  </div>
                  <div className="mt-2 grid grid-cols-2 gap-1 text-[11px] text-zinc-600">
                    <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Students</span><span className="font-semibold">{Math.round(40 + active.u.perf * 160)}</span></div>
                    <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Active 7d</span><span className="font-semibold">{Math.round(active.u.perf * 100)}%</span></div>
                    <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Lessons</span><span className="font-semibold">{Math.round(200 + active.u.perf * 1400)}</span></div>
                    <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Avg score</span><span className="font-semibold">{active.u.score}</span></div>
                  </div>
                </div>
              )}

              {level !== "states" && (
                <div className="pointer-events-none absolute bottom-3 left-1/2 -translate-x-1/2 rounded-full bg-zinc-900/80 px-3 py-1 text-[11px] font-medium text-white">
                  click empty space to go up one level
                </div>
              )}

              {/* school markers are not real locations — make that explicit */}
              {level === "schools" && (
                <div className="pointer-events-none absolute left-4 bottom-4 max-w-xs rounded-lg border border-amber-200 bg-amber-50/95 px-3 py-2 text-[11px] leading-snug text-amber-800 shadow-sm">
                  <span className="font-semibold">Illustrative positions.</span> School markers are scattered at random within the block to show density — they are <span className="font-semibold">not</span> the schools' real geographic locations.
                </div>
              )}

              {(level === "blocks" || level === "schools") && !blocks && geoBlk !== "error" && (
                <div className="pointer-events-none absolute inset-0 flex items-center justify-center text-sm text-zinc-400">Loading blocks…</div>
              )}
              {level === "blocks" && blocks && blocks.length === 0 && (
                <div className="pointer-events-none absolute inset-0 flex items-center justify-center text-sm text-zinc-400">No LGD block data for {dst ? dst.name : "this district"} · click empty space to go back</div>
              )}
            </div>
          </div>
        );
      }

      return MapApp;
    })();

    // #####################################################################
    // ## Top-level shell: a toggle that switches between the two views.   ##
    // ## The two graphs above stay fully independent (separate IIFEs).    ##
    // #####################################################################
    function Root() {
      const TABS = ["force", "tree", "map"];
      const [view, setView] = useState(() => {
        const h = (window.location.hash || "").replace("#", "");
        return TABS.includes(h) ? h : "force";
      });
      useEffect(() => { window.location.hash = view; }, [view]);
      const tab = (id, label) => (
        <button key={id} onClick={() => setView(id)}
          className={"rounded-md px-3 py-1 text-xs font-semibold transition " +
            (view === id ? "bg-white text-zinc-900 shadow" : "text-zinc-300 hover:text-white")}>
          {label}
        </button>
      );
      return (
        <div className="flex h-full flex-col">
          <div className="flex items-center gap-3 border-b border-zinc-800 bg-zinc-900 px-4 py-2">
            <span className="text-xs font-semibold text-white">PadhaiPal · Educator Network</span>
            <div className="ml-auto flex rounded-lg bg-zinc-800 p-0.5">
              {tab("force", "Force graph")}
              {tab("tree", "Tree")}
              {tab("map", "Map")}
            </div>
          </div>
          <div className="relative min-h-0 flex-1">
            {view === "force" ? <ForceGraphApp /> : view === "tree" ? <TreeFlowApp /> : <MapApp />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>

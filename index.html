          "Figures on this page are illustrative demo data. PadhaiPal is a registered non-profit · child data is processed under our privacy & safeguarding policy.": "इस पृष्ठ के आँकड़े उदाहरणस्वरूप डेमो डेटा हैं। पधाईपाल एक पंजीकृत गैर-लाभकारी संस्था है · बच्चों का डेटा हमारी गोपनीयता व सुरक्षा नीति के अंतर्गत संसाधित होता है।",

      const translate = (lang, s) => (lang && I18N[lang] && I18N[lang][s]) || s;

      // --- helpers (mirror the other views; IIFEs stay independent) ---
      function hashStr(s) {
        let h1 = 0xdeadbeef ^ s.length, h2 = 0x41c6ce57 ^ s.length;
        for (let i = 0; i < s.length; i++) {
          const ch = s.charCodeAt(i);
          h1 = Math.imul(h1 ^ ch, 2654435761); h2 = Math.imul(h2 ^ ch, 1597334677);
        }
        h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
        h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
        return (h1 >>> 0);
      }
      const FIRST = ["Aarav","Diya","Kabir","Ishaan","Ananya","Riya","Aditya","Rohan","Saanvi","Arjun",
        "Priya","Myra","Vivaan","Kiara","Reyansh","Anvi","Tara","Dev","Ira","Yuvan","Sara","Krish",
        "Anil","Meena","Vikram","Sita","Deepak","Asha","Ravi","Neha","Manish","Geeta","Pooja","Rahul",
        "Sunil","Kavita","Pramod","Rajesh","Om","Nisha","Sanjay","Rekha","Amit","Sunita","Vijay","Lata",
        "Mohan","Usha","Suresh","Gita"];
      const LAST = ["Sharma","Gupta","Singh","Yadav","Joshi","Verma","Pal","Rao","Lal","Bose","Kumar",
        "Prakash","Devi","Mishra","Tiwari","Pandey","Chauhan","Saxena","Nair","Reddy"];
      const FACE_COUNT = { adult: 300, child: 50 };

      const lerp = (a, b, t) => a.map((v, i) => v + (b[i] - v) * t);
      function scoreRGB(p) {
        const red = [239, 68, 68], yellow = [234, 179, 8], green = [34, 197, 94];
        return (p < 0.5 ? lerp(red, yellow, p / 0.5) : lerp(yellow, green, (p - 0.5) / 0.5)).map((v) => v | 0);
      }
      const scoreColor = (p) => `rgb(${scoreRGB(p).join(",")})`;
      const textOn = (p) => { const [r, g, b] = scoreRGB(p); return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.62 ? "#1c1917" : "#ffffff"; };

      // --- org model: country=National Director, ADM1=DGSE, ADM2=BSA, ADM3=BEO, school=Head Teacher ---

      const SUB = { Country: "National Director", DGSE: "DGSE", BSA: "BSA", BEO: "BEO" };

      const FANOUT = [null, null, null, null, null, [2, 7], [12, 28]];

      const META_GENDERS = ["Female", "Male"];
      const META_SETTINGS = ["Urban", "Rural"];

      const META_LANGS = ["Hindi", "English", "Bengali", "Tamil", "Telugu", "Marathi", "Urdu", "Gujarati", "Kannada", "Punjabi"];

      const SCHOOL_CARD_W = 76;
      const SIDEBAR_W = 360;   // left accordion sidebar width (keep in sync with the aside's w-[360px])
      const schoolFaceR = (g) => (g === "ht" ? 22 : g === "teacher" ? 15 : 10);
      const schoolUiR = (g) => (g === "ht" ? 48 : g === "teacher" ? 42 : 40);

      // a student never closer than this to its teacher (floors the score-driven distance below).
      const MIN_HT_TCHR = 500, MIN_TCHR_STD = 150;
      function node(id) {
        const lvl = id.split(".").length - 1;
        const h = hashStr("u:" + id);
        const perf = (h % 1000) / 1000;
        const student = lvl === LEVELS.length - 1;

              : parts.filter((p) => p.value > 0).map((p, i) => { const a1 = a + 2 * Math.PI * (p.value / sum); const d = (p.value / sum) >= 0.9995 ? null : wedgePath(r, r, r, a, a1); a = a1; return d ? <path key={i} d={d} fill={p.color} /> : <circle key={i} cx={r} cy={r} r={r} fill={p.color} />; })}

      function osmKind(t) {

        if (/private|religious|community|ngo|charit|faith/.test(ot)) return "private";

      async function fetchOSMSchools(s, w, n, e) {
        const q = `[out:json][timeout:25];(node["amenity"="school"](${s},${w},${n},${e});way["amenity"="school"](${s},${w},${n},${e}););out center 1200 tags;`;
        for (const ep of OVERPASS) {
          try {
            const res = await fetch(ep, { method: "POST", body: q });
            if (!res.ok) continue;
            const j = await res.json();
            return (j.elements || []).map((el) => {
              const t = el.tags || {};
              const lat = el.lat != null ? el.lat : (el.center && el.center.lat);
              const lon = el.lon != null ? el.lon : (el.center && el.center.lon);
              if (lat == null || lon == null) return null;
              return { lat, lon, name: t.name || t["name:en"] || "School", kind: osmKind(t) };
            }).filter(Boolean);
          } catch (err) { /* try next mirror */ }
        }
        return "error";

          .replace(/<name>/g, r.uname || r.name || "there")
          .replace(/<area>/g, r.area || r.name || "your area")
          .replace(/<location>/g, r.location || "")

      // =====================================================================
      //  Bottom bar graph — every entity ranked by score
      // =====================================================================
      function BarGraph({ entities, selectedIds, hoverId, onHover, onToggle, onAddRange }) {
        const bars = useMemo(() => [...entities].sort((a, b) => b.score - a.score), [entities]);
        const [drag, setDrag] = useState(null);
        const dragging = useRef(false);
        useEffect(() => {
          const up = () => {
            if (!dragging.current) return;
            dragging.current = false;
            setDrag((d) => {
              if (d) { const lo = Math.min(d.a, d.b), hi = Math.max(d.a, d.b); if (lo === hi) onToggle(bars[lo]); else onAddRange(bars.slice(lo, hi + 1)); }
              return null;
            });
          };
          window.addEventListener("mouseup", up);
          return () => window.removeEventListener("mouseup", up);
        }, [bars, onToggle, onAddRange]);

        const hovIdx = hoverId != null ? bars.findIndex((b) => b.id === hoverId) : -1;
        const hov = hovIdx >= 0 ? bars[hovIdx] : null;
        return (
          <div className="relative shrink-0 select-none border-t border-zinc-200 bg-white" style={{ height: 150 }} onMouseLeave={() => onHover(null)}>
            <div className="flex items-center justify-between px-3 py-1 text-[11px] text-zinc-500">
              <span>{bars.length} entities · ranked by score · click a bar to add to the send list · drag across bars to multi-select</span>
              <span className="text-zinc-400">hover a bar for details</span>
            </div>
            <div className="absolute inset-x-0 bottom-0 flex items-end gap-px px-2" style={{ top: 26 }}>
              {bars.map((e, i) => {
                const sel = selectedIds.has(e.id);
                const inDrag = drag && i >= Math.min(drag.a, drag.b) && i <= Math.max(drag.a, drag.b);
                return (
                  <div key={e.id} title={e.u.name}
                    onMouseEnter={() => { onHover(e.id); if (dragging.current) setDrag((d) => ({ a: d ? d.a : i, b: i })); }}
                    onMouseDown={(ev) => { ev.preventDefault(); dragging.current = true; setDrag({ a: i, b: i }); }}
                    className={"min-w-0 flex-1 cursor-pointer rounded-t-sm " + (sel ? "bar-sel" : "")}
                    style={{ height: Math.max(2, e.score) + "%", background: scoreColor(e.u.perf),
                      outline: sel || inDrag ? "2px solid #2563eb" : "none", outlineOffset: "-1px",
                      opacity: hovIdx >= 0 && i !== hovIdx ? 0.5 : 1 }} />

            {hov && (
              <div className="pointer-events-none absolute z-10 w-48 -translate-x-1/2 rounded-lg border border-zinc-200 bg-white p-2 shadow-xl"

                    <div className="truncate text-xs font-semibold text-zinc-900">{hov.name}</div>

        );

      // ===================================================================
      // Student detail card (demo) — mirrors a subset of the pp-dashboard
      // user/{id} page: summary metrics, letter scores over time, and a
      // recent-audio table (timestamp · audio · Sarvam transcript · answer).
      // All data is deterministic per student id (illustrative; no backend).
      // ===================================================================
      const DEVA = ["क","ख","ग","घ","च","ज","ट","ठ","त","थ","द","न","प","फ","ब","म","य","र","ल","व","स","ह","आ","इ","उ","ए","ओ"];
      const LETTER_PALETTE = ["#2563eb","#dc2626","#059669","#d97706","#7c3aed","#db2777","#0891b2","#65a30d","#ea580c","#4f46e5"];
      const NOW_MS = Date.now();   // fixed at load so the demo rows stay stable across re-renders
      // one short silent WAV reused by every row's <audio> player (demo — there is no real audio)
      const SILENT_WAV = (() => {
        const sr = 8000, secs = 3, n = sr * secs, buf = new Uint8Array(44 + n), dv = new DataView(buf.buffer);
        let p = 0; const ws = (s) => { for (let i = 0; i < s.length; i++) buf[p++] = s.charCodeAt(i); };
        const u32 = (v) => { dv.setUint32(p, v, true); p += 4; }, u16 = (v) => { dv.setUint16(p, v, true); p += 2; };
        ws("RIFF"); u32(36 + n); ws("WAVE"); ws("fmt "); u32(16); u16(1); u16(1); u32(sr); u32(sr); u16(1); u16(8); ws("data"); u32(n);
        for (let i = 0; i < n; i++) buf[p++] = 128;   // 8-bit PCM silence
        let bin = ""; for (let i = 0; i < buf.length; i++) bin += String.fromCharCode(buf[i]);
        return "data:audio/wav;base64," + btoa(bin);
      })();
      function studentSummary(id) {
        const h = hashStr("sum:" + id);
        const daysSinceSignup = 20 + (h % 280);
        const daysOver5 = Math.min(daysSinceSignup, 4 + ((h >>> 5) % Math.max(1, Math.floor(daysSinceSignup * 0.6))));
        const activeMin = 45 + (h % 60) + daysOver5 * (6 + ((h >>> 9) % 10));
        return { daysSinceSignup, daysOver5, activeMin };
      }
      // letter score series: a handful of letters, each a run of interaction scores trending up
      function studentLetterSeries(id) {
        const k = 4 + (hashStr("let:" + id) % 3);            // 4–6 letters
        const series = [];
        for (let i = 0; i < k; i++) {
          const g = DEVA[hashStr("g:" + id + ":" + i) % DEVA.length];
          const len = 6 + (hashStr("ln:" + id + ":" + i) % 9);     // 6–14 points
          const start = 20 + (hashStr("st:" + id + ":" + i) % 30);
          const ceil = 60 + (hashStr("cl:" + id + ":" + i) % 40);
          const values = [];
          for (let j = 0; j < len; j++) {
            const tt = len <= 1 ? 1 : j / (len - 1);
            const noise = (hashStr("nz:" + id + ":" + i + ":" + j) % 21) - 10;
            values.push(Math.max(0, Math.min(100, Math.round(start + (ceil - start) * (1 - Math.exp(-2.4 * tt)) + noise))));
          }
          series.push({ grapheme: g, color: LETTER_PALETTE[i % LETTER_PALETTE.length], values });
        }
        return series;
      }

      function ValueStatement() {
        const scribble = { fontFamily: "'Caveat', cursive" };
        // a prettier inline link (no underline), rendered in the hand-scribbled font of its caption
        const Link = ({ href, children }) => (

        // small hand-scribbled caption under a word, always one line — hidden until the word is hovered.

        const note = "absolute left-1/2 top-full hidden w-max -translate-x-1/2 whitespace-nowrap pt-2 text-center text-2xl font-medium leading-tight text-zinc-500 group-hover:block";
        // Rotating headline: the bracketed parts (subject / verb / percentage) cycle together.
        const VARIATIONS = [
          { subject: "$200T of economic value",                       verb: "unlocked", pct: "47%" },
          { subject: "$21 trillion additional tax revenue",           verb: "unlocked", pct: "46%" },
          { subject: "46 million more people employed",               verb: "unlocked", pct: "51%" },
          { subject: "368 million more primary school completions",   verb: "unlocked", pct: "49%" },
          { subject: "368 million more secondary school starts",      verb: "unlocked", pct: "50%" },
          { subject: "12 million child deaths",                       verb: "averted",  pct: "47%" },
          { subject: "12 million child marriages",                    verb: "averted",  pct: "49%" },
        ];
        const [vIdx, setVIdx] = useState(0);
        const [paused, setPaused] = useState(false);          // auto-advance pauses while the user scrubs
        // Auto-advance, unless the user is dragging the subject card.
        useEffect(() => {
          if (paused) return;
          const t = setTimeout(() => setVIdx((i) => (i + 1) % VARIATIONS.length), 5200);
          return () => clearTimeout(t);
        }, [vIdx, paused]);
        const v = VARIATIONS[vIdx];
        // Odometer roll: each fragment is keyed so React REMOUNTS it on change, replaying the @keyframes
        // exactly once — reliable every time. (The earlier transition-toggle never repainted the "from"
        // frame, so the new text never animated in.) subject + pct are keyed by index (they always change);
        // the verb is keyed by its text, so it only rolls when "unlocked"/"averted" actually flips.
        const rollStyle = { display: "inline-block", transformOrigin: "center", animation: "ppRoll 780ms cubic-bezier(.2,.8,.25,1) both" };
        const stage = { perspective: "520px" };               // 3D depth for the roll
        // --- drag-to-scrub: ONLY the subject card; dragging vertically steps through the variations ---

          if (e.target.closest("a")) return;                  // let the "reference here" link click through

          if (e.currentTarget.setPointerCapture) e.currentTarget.setPointerCapture(e.pointerId);
          drag.current = { y0: e.clientY, idx0: vIdx, last: vIdx };
          setPaused(true);
        };
        const onDragMove = (e) => {
          const d = drag.current; if (!d) return;
          const n = VARIATIONS.length;
          const ni = ((((d.idx0 + Math.round((e.clientY - d.y0) / STEP_PY)) % n) + n) % n);
          if (ni !== d.last) { d.last = ni; setVIdx(ni); }    // linked verb + pct follow automatically (all derive from vIdx)
        };
        const onDragEnd = (e) => {
          if (!drag.current) return;
          drag.current = null;
          if (e.currentTarget.releasePointerCapture) e.currentTarget.releasePointerCapture(e.pointerId);
          setPaused(false);

        const dragHandlers = (idx, setIdx) => ({

          onPointerMove: (e) => { const d = drag.current; if (!d) return; const ni = d.idx0 + Math.round((e.clientY - d.y0) / STEP_PY); if (ni !== d.last) { d.last = ni; d.setIdx(ni); } },

      // Zoomable globe for a sponsored child's school: starts zoomed onto the school (red pin,
      // home country highlighted); drag to rotate, scroll / ± to zoom out to the whole globe.
      function ChildGlobe({ worldGeo, lon, lat, place, scale = 1 }) {
        const W = Math.round(360 * scale), H = Math.round(300 * scale), R0 = (Math.min(W, H) - 16) / 2;
        const [rot, setRot] = useState([-lon, -lat]);   // orthographic.rotate centres on the school
        const [zoom, setZoom] = useState(5);            // start zoomed in on the school
        const drag = useRef(null);
        const ref = useRef(null);
        const proj = useMemo(() => {
          if (!worldGeo || worldGeo === "error") return null;
          return d3.geoOrthographic().rotate(rot).clipAngle(90).scale(R0 * zoom).translate([W / 2, H / 2]);
        }, [worldGeo, rot, zoom, R0]);
        const path = useMemo(() => (proj ? d3.geoPath(proj) : null), [proj]);
        const homeFeature = useMemo(() => {
          if (!worldGeo || worldGeo === "error") return null;
          return worldGeo.features.find((f) => d3.geoContains(f, [lon, lat])) || null;
        }, [worldGeo, lon, lat]);
        useEffect(() => {
          const el = ref.current; if (!el) return;
          const onWheel = (e) => { e.preventDefault(); setZoom((z) => clamp(z * (e.deltaY < 0 ? 1.18 : 1 / 1.18), 1, 14)); };
          el.addEventListener("wheel", onWheel, { passive: false });
          return () => el.removeEventListener("wheel", onWheel);
        }, []);
        if (!proj) return <div ref={ref} className="flex items-center justify-center rounded-lg bg-blue-50 text-[10px] text-zinc-400" style={{ width: W, height: H }}>Loading…</div>;
        const onDown = (e) => { drag.current = { x: e.clientX, y: e.clientY, rot }; e.currentTarget.setPointerCapture(e.pointerId); };
        const onMove = (e) => { if (!drag.current) return; const k = 0.35 / zoom; setRot([drag.current.rot[0] + (e.clientX - drag.current.x) * k, clamp(drag.current.rot[1] - (e.clientY - drag.current.y) * k, -89, 89)]); };
        const onUp = () => { drag.current = null; };
        const marker = proj([lon, lat]);
        const onNearSide = d3.geoDistance([lon, lat], [-rot[0], -rot[1]]) < Math.PI / 2;
        return (
          <div ref={ref} className="relative" style={{ width: W }}>
            <svg viewBox={"0 0 " + W + " " + H} style={{ width: "100%", height: "auto", touchAction: "none", cursor: drag.current ? "grabbing" : "grab" }} className="rounded-lg"
              onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp}>
              <path d={path({ type: "Sphere" })} fill="#dbeafe" stroke="#93c5fd" strokeWidth={1} />
              <path d={path(d3.geoGraticule10())} fill="none" stroke="#bfdbfe" strokeWidth={0.5} opacity={0.6} />
              {worldGeo.features.map((f, i) => {
                if (f.properties.ADMIN === "Antarctica") return null;
                const d = path(f); if (!d) return null;
                const here = f === homeFeature;
                return <path key={i} d={d} fill={here ? "#fcd34d" : "#e5e7eb"} fillOpacity={here ? 0.95 : 0.6} stroke="#ffffff" strokeWidth={0.3} />;
              })}
              {onNearSide && marker && (
                <g transform={"translate(" + marker[0] + "," + marker[1] + ")"} pointerEvents="none">
                  <circle r={8} fill="#ef4444" fillOpacity={0.22} />
                  <circle r={3.6} fill="#ef4444" stroke="#ffffff" strokeWidth={1.3} />
                </g>
              )}
            </svg>
            {scale >= 0.5 && (
              <React.Fragment>
                <div className="absolute right-1.5 top-1.5 flex flex-col overflow-hidden rounded-md border border-zinc-300 bg-white/90 shadow-sm">
                  <button onClick={() => setZoom((z) => clamp(z * 1.4, 1, 14))} title="Zoom in" className="flex h-6 w-6 items-center justify-center text-sm font-semibold text-zinc-600 hover:bg-zinc-100">+</button>
                  <div className="h-px bg-zinc-200" />
                  <button onClick={() => setZoom((z) => clamp(z / 1.4, 1, 14))} title="Zoom out" className="flex h-6 w-6 items-center justify-center text-sm font-semibold text-zinc-600 hover:bg-zinc-100">−</button>
                </div>
                <button onClick={() => { setRot([-lon, -lat]); setZoom(5); }} title="Recentre on the school"
                  className="absolute left-1.5 top-1.5 rounded-md border border-zinc-300 bg-white/90 px-1.5 py-0.5 text-[10px] font-semibold text-zinc-600 shadow-sm hover:bg-zinc-100">⌖</button>
              </React.Fragment>
            )}
            {scale >= 1 && <div className="pointer-events-none absolute bottom-1 left-2 right-2 truncate text-[8px] text-zinc-400">{place} · drag to rotate · scroll / ± to zoom out to the globe</div>}
          </div>
        );
      }

      // =====================================================================
      //  Block-school report — oral-literacy NIPUN-proxy dashboard for one block.
      //  Dummy data, deterministic per school id; charts are interactive (hover to
      //  highlight; click a school to drill into it). ~30% of schools not onboarded.
      // =====================================================================
      const NIP_WEEKS = ["02 Apr", "09 Apr", "16 Apr", "23 Apr", "30 Apr", "07 May", "14 May", "21 May", "28 May", "04 Jun", "11 Jun", "18 Jun"];
      const nipColor = (v) => v == null ? "#a1a1aa" : v >= 80 ? "#16a34a" : v >= 50 ? "#f59e0b" : "#dc2626";
      // build the report from the block's schools (each `sc` has { id, u:{perf}, name, p })
      function buildBlockReport(schools) {
        if (!schools || !schools.length) return null;
        const W = NIP_WEEKS.length;
        const items = schools.map((sc) => {
          const h = hashStr("nip:" + sc.id);
          const onboarded = (h % 100) >= 30;                       // ~70% on PadhaiPal, ~30% not
          if (!onboarded) return { id: sc.id, name: sc.name, sc, onboarded: false, series: null, latest: null, delta: 0, startW: null };
          const startW = (h >>> 4) % 6;                            // onboarded somewhere in the first 6 weeks
          const start = 24 + ((h >>> 7) % 18);                     // starting score 24..41
          const target = clamp(Math.round(38 + sc.u.perf * 58), start + 6, 98);  // latest target by perf
          const series = [];
          for (let w = 0; w < W; w++) {
            if (w < startW) { series.push(null); continue; }
            const prog = (w - startW) / Math.max(1, W - 1 - startW);
            const noise = (hashStr(sc.id + ":w" + w) % 7) - 3;
            series.push(clamp(Math.round(start + (target - start) * prog + noise), 6, 99));
          }
          const latest = series[W - 1], prev = series[W - 2];
          return { id: sc.id, name: sc.name, sc, onboarded: true, series, latest, delta: prev == null ? 0 : latest - prev, startW };
        });
        const onb = items.filter((i) => i.onboarded);
        const blockAvg = NIP_WEEKS.map((_, w) => {
          const vals = onb.map((i) => i.series[w]).filter((v) => v != null);
          return vals.length ? Math.round(vals.reduce((a, b) => a + b, 0) / vals.length) : null;
        });
        const blockAvgLatest = onb.length ? Math.round(onb.reduce((a, i) => a + i.latest, 0) / onb.length) : 0;
        const avgGain = onb.length ? onb.reduce((a, i) => a + i.delta, 0) / onb.length : 0;
        const topSchool = onb.slice().sort((a, b) => b.latest - a.latest)[0] || null;
        const mostImproved = onb.slice().sort((a, b) => b.delta - a.delta).slice(0, 15);
        const sortedLatest = items.slice().sort((a, b) => (b.onboarded ? b.latest : -1) - (a.onboarded ? a.latest : -1));
        const defaultMeta = (onb.length ? onb[hashStr("meta:" + items[0].id) % onb.length] : items[0]) || null;
        return { items, blockAvg, blockAvgLatest, avgGain, usingN: onb.length, totalN: items.length, topSchool, mostImproved, sortedLatest, defaultMeta };
      }

      function RepKpis({ report, nounP = "schools", t = (s) => s }) {
        if (!report) return null;
        const gain = (report.avgGain >= 0 ? "+" : "") + report.avgGain.toFixed(1) + " " + t("pts");
        const card = (big, label, color) => (
          <div className="flex-1 rounded-xl bg-zinc-50 px-4 py-6 text-center">
            <div className="text-5xl font-extrabold tracking-tight" style={{ color }}>{big}</div>
            <div className="mt-1.5 text-sm font-medium leading-tight text-zinc-500">{label}</div>
          </div>
        );
        return (
          <div className="flex gap-3">
            {card(report.blockAvgLatest + "%", t("average oral-literacy NIPUN proxy"), nipColor(report.blockAvgLatest))}
            {card(gain, t("avg oral literacy NIPUN proxy gain last week"), "#0891b2")}
            {card(report.usingN + " of " + report.totalN, t(nounP) + " " + t("using PadhaiPal"), "#16a34a")}
          </div>
        );
      }

      function RepTrend({ report, hoverId, setHoverId, onSelect, onPick, selId, mineId, t = (s) => s }) {
        if (!report) return null;
        const W = 900, H = 280, mL = 46, mR = 12, mT = 12, mB = 34, iw = W - mL - mR, ih = H - mT - mB;
        const n = NIP_WEEKS.length;
        const x = (i) => mL + (n <= 1 ? 0 : (i / (n - 1)) * iw), y = (v) => mT + ih - (v / 100) * ih;
        const line = (s) => s.map((v, i) => v == null ? null : ((i === 0 || s[i - 1] == null) ? "M" : "L") + x(i).toFixed(1) + " " + y(v).toFixed(1)).filter(Boolean).join(" ");
        const onb = report.items.filter((i) => i.onboarded);
        return (
          <svg data-rep-chart="trend" viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ maxHeight: 300 }}>
            {[0, 20, 40, 60, 80, 100].map((g) => (
              <g key={g}><line x1={mL} x2={W - mR} y1={y(g)} y2={y(g)} stroke="#f1f5f9" /><text x={mL - 5} y={y(g) + 3} textAnchor="end" fontSize="9" fill="#94a3b8">{g}</text></g>
            ))}
            <text transform={`translate(12 ${mT + ih / 2}) rotate(-90)`} textAnchor="middle" fontSize="8.5" fill="#64748b">{t("Oral Literacy NIPUN Proxy percentage pass rate")}</text>
            {onb.map((it) => {
              const hot = hoverId === it.id || selId === it.id, mine = it.id === mineId;
              return (
                <path key={it.id} d={line(it.series)} fill="none" onMouseEnter={() => setHoverId(it.id)} onMouseLeave={() => setHoverId(null)}
                  onClick={() => onSelect && onSelect(it)} onDoubleClick={() => onPick && onPick(it)}
                  stroke={mine || selId === it.id || hot ? "#2563eb" : "#cbd5e1"} strokeWidth={mine ? 2.6 : hot ? 2.4 : 0.8}
                  opacity={(hoverId || selId) && !hot && !mine ? 0.25 : 0.85} style={{ cursor: "pointer", filter: mine ? "drop-shadow(0 0 3px rgba(37,99,235,0.9))" : "none" }} />
              );
            })}
            {report.topSchool && <path d={line(report.topSchool.series)} fill="none" stroke="#16a34a" strokeWidth="2.2" pointerEvents="none" />}
            <path d={line(report.blockAvg)} fill="none" stroke="#1e3a5f" strokeWidth="2.8" pointerEvents="none" />
            {/* 80% target — drawn on top so it's never hidden, and labelled */}
            <line x1={mL} x2={W - mR} y1={y(80)} y2={y(80)} stroke="#ef4444" strokeWidth="1.3" strokeDasharray="5 3" pointerEvents="none" />
            <text x={mL + 3} y={y(80) - 4} fontSize="9" fill="#ef4444" fontWeight="700" pointerEvents="none">{t("80% NIPUN target")}</text>
            {NIP_WEEKS.map((l, i) => (i % 2 === 0 ? <text key={i} x={x(i)} y={H - 6} textAnchor="middle" fontSize="8" fill="#94a3b8">{l}</text> : null))}
          </svg>
        );
      }

      function RepLatest({ report, hoverId, setHoverId, onSelect, onPick, selId, onSelectRange, dragId, setDragId, mineId, onGreyEnter, onGreyLeave, t = (s) => s }) {
        if (!report) return null;
        const arr = report.sortedLatest, W = 900, H = 232, mT = 8, mB = 14, mL = 46, iw = W - mL - 6, ih = H - mT - mB;
        const bw = iw / Math.max(1, arr.length);
        const inDrag = (i) => dragId && i >= Math.min(dragId.a, dragId.b) && i <= Math.max(dragId.a, dragId.b);
        useEffect(() => {
          if (!dragId || !setDragId) return;
          const up = () => setDragId((d) => {
            if (d) { const lo = Math.min(d.a, d.b), hi = Math.max(d.a, d.b); if (lo !== hi && onSelectRange) onSelectRange(arr.slice(lo, hi + 1)); else if (onSelect) onSelect(arr[lo]); }
            return null;
          });
          window.addEventListener("pointerup", up);
          return () => window.removeEventListener("pointerup", up);

          const measure = () => { const r = el.getBoundingClientRect(); setSize({ w: Math.max(320, r.width), h: Math.max(320, r.height) }); };
          measure();
          const ro = new ResizeObserver(measure); ro.observe(el);
          return () => ro.disconnect();
        }, []);

        async function fetchGB(iso, lvl) {
          const key = iso + "|" + lvl;
          if (gbCache.current.has(key)) return gbCache.current.get(key);
          let fc = null;
          try {
            const meta = await fetch(API + iso + "/" + lvl + "/").then((r) => (r.ok ? r.json() : null));
            let url = meta && (meta.simplifiedGeometryGeoJSON || meta.gjDownloadURL);
            // geoBoundaries geojson is git-LFS; github.com/raw 302-redirects to the LFS host,
            // which fails CORS in the browser. Rewrite straight to the (CORS-clean) media host.
            if (url) {
              url = url.replace("https://github.com/", "https://media.githubusercontent.com/media/").replace("/raw/", "/");
              fc = await fetch(url).then((r) => (r.ok ? r.json() : null));
            }
          } catch (e) { fc = null; }
          gbCache.current.set(key, fc || null);
          return fc || null;
        }

        // world projection (fit to all land except Antarctica), or country projection
        const worldFit = useMemo(() => {
          if (!worldGeo || worldGeo === "error") return null;
          return { type: "FeatureCollection", features: worldGeo.features.filter((f) => f.properties.ADMIN !== "Antarctica") };
        }, [worldGeo]);

        const isWorld = level === "world";
        const projd = useMemo(() => {
          if (!d3 || !size) return null;
          if (isWorld) {
            if (!worldFit) return null;
            const ext = [[6, 6], [size.w - 6, size.h - 6]];
            const proj = d3.geoOrthographic().rotate(globeRot).clipAngle(90).fitExtent(ext, { type: "Sphere" });
            return { proj, path: d3.geoPath(proj), globe: true };
          }
          if (!adm1FC || adm1FC === "error" || !adm1FC.features) return null;
          const proj = fitMercator(adm1FC.features, size.w, size.h, 10); // planar fit — geoBoundaries winding breaks fitExtent
          if (!proj) return null;
          return { proj, path: d3.geoPath(proj) };
        }, [isWorld, worldFit, adm1FC, size, globeRot]);

        // ---- WORLD level: every country, coloured by its national score (grey = no ADM2 data) ----
        const worldPaths = useMemo(() => {
          if (!projd || !isWorld || !worldGeo || worldGeo === "error") return null;
          const { path } = projd;
          return worldGeo.features.map((f, i) => {
            if (f.properties.ADMIN === "Antarctica") return null;
            const iso = iso3Of(f.properties);
            const covered = !!(iso && coverage && coverage.has(iso));
            const u = iso ? node("r." + iso) : null;
            const lf = langFor(iso, f.properties.ADMIN);
            return { i, iso, covered, name: f.properties.ADMIN, feature: f, d: path(f), c: path.centroid(f), bbox: path.bounds(f), phon: lf.phon, teach: lf.teach, pairs: lf.pairs, u };
          }).filter(Boolean);
        }, [projd, isWorld, worldGeo, coverage]);

        // accordion sidebar + roadmap analytics
        const [openSecs, setOpenSecs] = useState(() => new Set(["area", "spacing"]));
        const toggleSec = (id) => setOpenSecs((s) => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
        const [builtLangs, setBuiltLangs] = useState(() => new Set(["Hindi"]));
        const [impactMetric, setImpactMetric] = useState("dalys");
        const roadmapOpen = openSecs.has("roadmap");
        // share of an area's population speaking a language PadhaiPal has built (Roadmap checklist) -> the coloured pie segment
        const teachBuilt = (pairs) => { let tot = 0, t = 0; for (const [l, s] of (pairs || [])) { tot += s; if (builtLangs.has(l)) t += s; } return tot > 0 ? t / tot : 0; };

        // ---- Roadmap flat-colour mode: per-country impact metric across unlocked countries ----
        const flatMetrics = useMemo(() => {
          if (!roadmapOpen || !worldPaths) return null;
          const CHILD_FRAC = 0.12, LIVES_PER_CHILD = 12e6 / 368e6, GDP_PER_CHILD = 196e12 / 368e6;
          const byIso = {};
          let lo = Infinity, hi = -Infinity;
          for (const p of worldPaths) {
            const pairs = langFor(p.iso, p.name).pairs;
            let reach = 0;
            for (const [lang, share] of pairs) if (builtLangs.has(lang)) reach += share;
            if (reach <= 0) { byIso[p.i] = { unlocked: false, v: null }; continue; }
            const pop = (p.iso && COUNTRY_POP[p.iso]) ? COUNTRY_POP[p.iso] : Math.max(1, Math.round(p.bbox ? 5e6 : 1e6) + (hashStr("pop:" + (p.iso || p.name)) % 40) * 1e6);
            const reachPop = pop * reach;
            const children = reachPop * CHILD_FRAC;
            const costPerChild = 40 + (hashStr("cost:" + (p.iso || p.name)) % 120);
            let v;
            if (impactMetric === "dalys") v = children * 0.5;
            else if (impactMetric === "lives") v = children * LIVES_PER_CHILD;
            else if (impactMetric === "gdp") v = children * GDP_PER_CHILD;
            else if (impactMetric === "cost_daly") v = costPerChild / 0.5;
            else v = costPerChild / LIVES_PER_CHILD; // cost_life
            byIso[p.i] = { unlocked: true, v };
            if (v < lo) lo = v; if (v > hi) hi = v;
          }
          const isCost = impactMetric === "cost_daly" || impactMetric === "cost_life";
          return { byIso, lo, hi, isCost };
        }, [worldPaths, builtLangs, impactMetric, roadmapOpen]);

        // colour a country under roadmap flat mode (green = better)
        const flatColorFor = (p) => {
          if (!flatMetrics) return "#d4d4d8";
          const m = flatMetrics.byIso[p.i];
          if (!m || !m.unlocked || m.v == null) return "#d4d4d8";
          const { lo, hi, isCost } = flatMetrics;
          let norm;
          if (hi === lo) norm = 1;
          else if (isCost) norm = 1 - (m.v - lo) / (hi - lo);
          else norm = m.v / hi;
          return scoreColor(clamp(norm, 0, 1));
        };

        // ---- ADM1 (DGSE) of the focused country ----
        const adm1 = useMemo(() => {
          if (isWorld || !projd || !country || !adm1FC || adm1FC === "error") return null;
          const { proj, path } = projd;
          return adm1FC.features.map((f, i) => {
            const rings = exteriorRings(f, proj);
            const ring = stripClose(largestRing(f, proj));
            const id = country.orgId + "." + i;
            const nm = f.properties.shapeName || ("Region " + (i + 1));
            return { i, id, feature: f, name: nm, d: ringsToPath(rings), c: centroidOf(ring), ring, rings, bbox: bboxOf(ring),
              u: node(id), demo: demoFor(f, country.iso, nm) };
          });
        }, [isWorld, projd, country, adm1FC]);

        // ---- ADM2 (BSA): children of the focused ADM1, nested by centroid containment ----
        const adm2 = useMemo(() => {
          if (!adm1 || a1Idx == null || !adm2FC || adm2FC === "error" || !projd) return null;
          const { proj, path } = projd;
          const parent = adm1[a1Idx]; if (!parent || parent.ring.length < 3) return null;
          // Nest by planar centroid-in-parent test (projected ring). NOT d3.geoContains:
          // geoBoundaries clockwise winding makes spherical containment match ~everything.
          const pr = parent.rings && parent.rings.length ? parent.rings : [parent.ring];
          const pbb = parent.bbox;
          const kids = adm2FC.features.map((f) => ({ f, ring: stripClose(largestRing(f, proj)) }))
            .filter((o) => o.ring.length >= 3 && bboxOverlap(bboxOf(o.ring), pbb) && inAnyRing(polyCentroid(o.ring), pr));
          return kids.map((o, j) => {
            const f = o.f, ring = o.ring, rings = exteriorRings(f, proj);
            const id = parent.id + "." + j;
            const nm = f.properties.shapeName || ("District " + (j + 1));
            return { j, id, feature: f, name: nm, d: ringsToPath(rings), c: centroidOf(ring), ring, rings, bbox: bboxOf(ring),
              u: node(id), demo: demoFor(f, country.iso, nm, false, parent.demo) };
          });
        }, [adm1, a1Idx, adm2FC, projd, country]);

        // ---- ADM3 (BEO / "block"): real ADM3 where the layer exists, else a synthesised
        //      Voronoi subdivision of the ADM2 polygon. This is the ADM3 fallback. ----
        const blocks = useMemo(() => {
          if (!adm2 || a2Idx == null || !projd) return null;
          const dst = adm2[a2Idx]; if (!dst) return null;
          const { proj, path } = projd;
          let real = [];
          if (adm3FC && adm3FC !== "error" && adm3FC.features && dst.ring.length >= 3) {
            const dr = dst.rings && dst.rings.length ? dst.rings : [dst.ring];
            const dbb = dst.bbox;
            real = adm3FC.features.map((f) => ({ f, ring: stripClose(largestRing(f, proj)) }))
              .filter((o) => o.ring.length >= 3 && bboxOverlap(bboxOf(o.ring), dbb) && inAnyRing(polyCentroid(o.ring), dr));
          }
          if (real.length) {
            return real.map((o, k) => {
              const f = o.f, ring = o.ring, rings = exteriorRings(f, proj);
              const id = dst.id + "." + k;
              const nm = f.properties.shapeName || ("Block " + (k + 1));
              return { k, id, u: node(id), name: nm, feature: f, ring, d: ringsToPath(rings), seed: centroidOf(ring), bbox: bboxOf(ring), synthetic: false,
                demo: demoFor(f, country.iso, nm, false, dst.demo) };
            });
          }
          // fallback: subdivide the ADM2 polygon into a plausible number of blocks
          if (!dst.ring || dst.ring.length < 3) return [];
          const n = 6 + (hashStr("nblk:" + dst.id) % 9);
          const seeds = sampleInside(dst.ring, n, hashStr("seed:" + dst.id));
          if (!seeds.length) return [];
          const [minx, miny, maxx, maxy] = dst.bbox;
          const vor = d3.Delaunay.from(seeds).voronoi([minx - 5, miny - 5, maxx + 5, maxy + 5]);
          return seeds.map((s, k) => {
            const id = dst.id + "." + k; const cell = vor.cellPolygon(k);
            const poly = cell ? clipPolygon(dst.ring, cell) : [];
            return { k, id, u: node(id), name: "Block " + (k + 1), ring: poly, d: poly.length >= 3 ? toPath(poly) : "", seed: s,
              bbox: bboxOf(poly.length ? poly : [s]), synthetic: true, demo: { pop: Math.round(dst.demo.pop / n), areaKm2: dst.demo.areaKm2 / n, langs: dst.demo.langs, pairs: dst.demo.pairs, real: dst.demo.real, phon: dst.demo.phon, teach: dst.demo.teach } };
          }).filter((b) => b.ring.length >= 3);
        }, [adm2, a2Idx, adm3FC, projd, country]);

        // ---- India real schools (UDISE 2021): map the block to its census district via the
        //      block centroid (projection-inverted to lon/lat), fetch schools/<st>-<dt>.json,
        //      then keep the points inside this block. 834k schools vs OSM's ~37k. ----
        useEffect(() => {
          if (level !== "schools" || a3Idx == null || !blocks || !blocks[a3Idx] || !projd || !projd.proj.invert || !country || country.iso !== "IND") return;
          const b = blocks[a3Idx], id = b.id;
          let cancelled = false;
          (async () => {
            if (!udiseRef.current.districts) {
              try {
                const g = await (await fetch("india-districts.geojson")).json();
                udiseRef.current.districts = g.features.map((f) => {
                  const polys = f.geometry.type === "Polygon" ? [f.geometry.coordinates] : f.geometry.coordinates;
                  const rings = polys.map((p) => p[0]);
                  let a = Infinity, bb = Infinity, c = -Infinity, d = -Infinity;
                  for (const r of rings) for (const pt of r) { if (pt[0] < a) a = pt[0]; if (pt[0] > c) c = pt[0]; if (pt[1] < bb) bb = pt[1]; if (pt[1] > d) d = pt[1]; }
                  return { key: f.properties.st + "-" + f.properties.dt, rings, bbox: [a, bb, c, d] };
                });
              } catch (e) { udiseRef.current.districts = []; }
            }
            if (cancelled) return;
            const ll = projd.proj.invert(b.seed);
            if (!ll || isNaN(ll[0])) { setUdise({ blockId: id, status: "error", points: [] }); return; }
            let key = null;
            for (const dst of udiseRef.current.districts) {
              const [a, bb, c, d] = dst.bbox;
              if (ll[0] < a || ll[0] > c || ll[1] < bb || ll[1] > d) continue;
              if (dst.rings.some((r) => pointInPoly(ll, r))) { key = dst.key; break; }
            }
            if (!key) { setUdise({ blockId: id, status: "error", points: [] }); return; }
            let file = udiseCache.current.get(key);
            if (!file) {
              try { file = await (await fetch("schools/" + key + ".json")).json(); udiseCache.current.set(key, file); }
              catch (e) { udiseCache.current.set(key, { n: [], c: [] }); setUdise({ blockId: id, status: "error", points: [] }); return; }
            }
            if (cancelled) return;
            const points = (file.c || []).map((c, i) => ({ lon: c[0], lat: c[1], name: (file.n && file.n[i]) || "School" }));
            setUdise({ blockId: id, status: "ok", points });
          })();
          return () => { cancelled = true; };
        }, [level, a3Idx, blocks, projd, country]);

        // ---- schools (Head Teacher): illustrative points inside the focused block ----
        // lazily fetch real OSM schools for the focused block (bbox via projection invert).
        // India uses the bundled UDISE data above; OSM is for everywhere else (optional overlay).
        useEffect(() => {
          if (level !== "schools" || a3Idx == null || !blocks || !blocks[a3Idx] || !projd || !projd.proj.invert || (country && country.iso === "IND")) return;
          const b = blocks[a3Idx], id = b.id;
          if (osmCache.current.has(id)) { const c = osmCache.current.get(id); setOsm({ id, status: c === "error" ? "error" : "ok", schools: c === "error" ? [] : c }); return; }
          const inv = projd.proj.invert;
          const [minx, miny, maxx, maxy] = b.bbox;
          const cs = [inv([minx, miny]), inv([maxx, miny]), inv([minx, maxy]), inv([maxx, maxy])].filter((p) => p && !isNaN(p[0]));
          if (cs.length < 2) return;
          let w = Infinity, e = -Infinity, s = Infinity, n = -Infinity;
          for (const c of cs) { if (c[0] < w) w = c[0]; if (c[0] > e) e = c[0]; if (c[1] < s) s = c[1]; if (c[1] > n) n = c[1]; }
          let cancelled = false;
          setOsm({ id, status: "loading", schools: [] });
          fetchOSMSchools(s, w, n, e).then((r) => {
            if (cancelled) return;
            if (r === "error") { osmCache.current.set(id, "error"); setOsm({ id, status: "error", schools: [] }); }
            else { osmCache.current.set(id, r); setOsm({ id, status: "ok", schools: r }); }
          });
          return () => { cancelled = true; };
        }, [level, a3Idx, blocks, projd]);

        const schools = useMemo(() => {
          if (!blocks || a3Idx == null || !blocks[a3Idx] || !projd) return null;
          const blk = blocks[a3Idx];
          const { proj } = projd;
          // India: real UDISE schools — project lon/lat, keep those inside this block
          if (udise && udise.blockId === blk.id && udise.status === "ok" && udise.points.length) {
            const real = [];
            for (const sc of udise.points) {
              const p = proj([sc.lon, sc.lat]);
              if (!p || isNaN(p[0]) || !pointInPoly(p, blk.ring)) continue;
              const id = blk.id + ".s" + real.length;
              real.push({ k: real.length, id, u: node(blk.id + "." + (real.length % 7)), p, name: sc.name, kind: "public", real: true });
            }
            if (real.length) return real;
          }
          // real OSM schools: project lon/lat, keep those inside this block (point-in-polygon)
          if (osm && osm.id === blk.id && osm.status === "ok" && osm.schools.length) {
            const real = [];
            for (const sc of osm.schools) {
              const p = proj([sc.lon, sc.lat]);
              if (!p || isNaN(p[0]) || !pointInPoly(p, blk.ring)) continue;
              const id = blk.id + ".s" + real.length;
              real.push({ k: real.length, id, u: node(blk.id + "." + (real.length % 7)), p, name: sc.name, kind: sc.kind, real: true });
            }
            if (real.length) return real;
          }
          // illustrative fallback — no OSM data, still loading, or none fell inside the block
          const m = 80 + (hashStr("sch:" + blk.id) % 70);
          return sampleInside(blk.ring, m, hashStr("schpts:" + blk.id)).map((p, k) => {
            const id = blk.id + ".s" + k;
            return { k, id, u: node(blk.id + "." + (k % 7)), p, name: "School " + (k + 1), kind: "unknown", real: false };
          });
        }, [blocks, a3Idx, projd, osm, udise]);

        // ---- one school (force graph) ----
        const school = useMemo(() => {
          if (!selHt || !d3) return null;
          const htU = node(selHt);
          // representative link lengths (slider floor + half the score range) — used to seed the
          // initial layout and to scale the repulsion so the graph fans out at any slider value.
          const htLen = minHtTchr + 35, stdLen = minTchrStd + 27;
          // pin the head teacher at the centre so the teachers fan symmetrically around it
          // (otherwise the heavy student mass drags the centroid and pushes the HT to the edge)
          const nodes = [{ id: selHt, u: htU, group: "ht", r: 15, x: 0, y: 0, fx: 0, fy: 0 }];
          const links = [];
          const teachers = baseChildCount(selHt);
          for (let t = 0; t < teachers; t++) {
            const tid = selHt + "." + t;
            // seed each teacher evenly around the head teacher on a ring of radius htLen
            const ta = (2 * Math.PI * t) / Math.max(1, teachers);
            const tx = Math.cos(ta) * htLen, ty = Math.sin(ta) * htLen;
            nodes.push({ id: tid, u: node(tid), group: "teacher", r: 9, x: tx, y: ty });
            links.push({ source: selHt, target: tid });
            const sc = baseChildCount(tid);
            for (let s = 0; s < sc; s++) {
              const sid = tid + "." + s;
              // seed students in an arc on the far side of their teacher (away from the head teacher)
              const sa = ta + ((s - (sc - 1) / 2) / Math.max(1, sc)) * Math.PI * 1.1;
              nodes.push({ id: sid, u: node(sid), group: "student", r: 5,
                x: tx + Math.cos(sa) * stdLen, y: ty + Math.sin(sa) * stdLen });
              links.push({ source: tid, target: sid });
            }
          }
          const total = nodes.length;
          [...nodes].sort((a, b) => b.u.score - a.u.score).forEach((n, i) => { n.rank = i + 1; n.total = total; });
          // Grouped repulsion (replaces a global forceManyBody): the head teacher + teachers all
          // repel each other so the teachers fan out around the HT, but each student only repels
          // the siblings under its own teacher — students of different teachers ignore each other.
          // Strengths scale with the link length so the fan-out holds at any slider value.
          const teacherRepel = -Math.max(150, htLen * 0.9);
          const studentRepel = -Math.max(320, stdLen * 2.4);   // strong: the only thing spreading siblings
          const groupedCharge = (() => {
            const force = (alpha) => {
              for (const g of force._groups) {
                const arr = g.n, k = g.k;
                for (let i = 0; i < arr.length; i++) {
                  for (let j = i + 1; j < arr.length; j++) {
                    const A = arr[i], B = arr[j];
                    let dx = B.x - A.x, dy = B.y - A.y, l2 = dx * dx + dy * dy;
                    if (l2 < 1e-6) { dx = (i - j) || 1e-3; dy = (i + j + 1) * 1e-3; l2 = dx * dx + dy * dy; }
                    const w = k * alpha / l2;          // k < 0 → A and B pushed apart
                    A.vx += dx * w; A.vy += dy * w;
                    B.vx -= dx * w; B.vy -= dy * w;
                  }
                }
              }
            };
            force.initialize = (ns) => {
              const top = { k: teacherRepel, n: ns.filter((d) => d.group === "ht" || d.group === "teacher") };
              const byTeacher = new Map();
              for (const d of ns) if (d.group === "student") {
                const pid = d.id.slice(0, d.id.lastIndexOf("."));   // the student's teacher id
                if (!byTeacher.has(pid)) byTeacher.set(pid, { k: studentRepel, n: [] });
                byTeacher.get(pid).n.push(d);
              }
              force._groups = [top, ...byTeacher.values()];
            };
            return force;
          })();
          const sim = d3.forceSimulation(nodes)
            // Connection length encodes the child's score: higher score → shorter link (sits closer
            // to its parent), lower score → longer link. Base ≥ parent+child collide radii so the
            // collide force never fights the link force.
            .force("link", d3.forceLink(links).id((d) => d.id).distance((l) => {
              const norm = (l.target.u.score || 0) / 100;
              // floor by both the collide footprint and the explicit (slider-driven) hierarchy minimum
              const collide = schoolUiR(l.source.group) + schoolUiR(l.target.group) + 6;
              const base = Math.max(collide, l.source.group === "ht" ? minHtTchr : minTchrStd);
              const range = l.source.group === "ht" ? 70 : 55;
              return base + (1 - norm) * range;
            }).strength(0.6))
            .force("charge", groupedCharge)
            // collide radius == rendered card footprint → node UI elements can't overlap
            .force("collide", d3.forceCollide().radius((d) => schoolUiR(d.group)).strength(1).iterations(4))
            // centering pulls only teachers toward the middle; students must NOT feel it, otherwise
            // every cluster's students drift toward the centre (looks like cross-class attraction).
            .force("x", d3.forceX(0).strength((d) => d.group === "student" ? 0 : 0.03))
            .force("y", d3.forceY(0).strength((d) => d.group === "student" ? 0 : 0.03))
            .alphaDecay(0.018).stop();
          for (let i = 0; i < 520; i++) sim.tick();
          let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
          for (const n of nodes) { if (n.x < minx) minx = n.x; if (n.x > maxx) maxx = n.x; if (n.y < miny) miny = n.y; if (n.y > maxy) maxy = n.y; }
          // pad by the card footprint so edge cards aren't clipped (face above, label box below)
          return { nodes, links, htU, bbox: [minx - 46, miny - 32, maxx + 46, maxy + 60],
            counts: { teachers, students: nodes.filter((n) => n.group === "student").length } };
        }, [selHt, minHtTchr, minTchrStd]);

        // insetL = left-edge padding to keep the framed content out from under the absolutely-
        // positioned 360px sidebar (centres within the visible area to the right of it). Defaults
        // to the sidebar width so every level — geographic maps and the school graph — is centred.
        const frame = useCallback((bbox, pad, insetL) => {
          const [minx, miny, maxx, maxy] = bbox;
          const bw = Math.max(1, maxx - minx), bh = Math.max(1, maxy - miny);
          const il = insetL || 0, availW = Math.max(1, size.w - il);   // report layout has no sidebar → centre full width
          const k = clamp(Math.min(availW / bw, size.h / bh) * (pad || 0.82), ZMIN, ZMAX);
          return { k, x: il + availW / 2 - ((minx + maxx) / 2) * k, y: size.h / 2 - ((miny + maxy) / 2) * k };
        }, [size]);

        // --- drill handlers ---
        const pickCountry = useCallback(async (item) => {
          if (moved.current || !item.iso || busy) return;
          if (!item.covered) { setActive({ u: item.u || node("r." + (item.iso || "x")), title: item.name, sub: "No district (ADM2) boundary data", demo: demoFor(item.feature, item.iso, item.name) }); return; }
          setBusy(true);
          const a1 = await fetchGB(item.iso, "ADM1");
          if (!a1 || !a1.features || !a1.features.length) { setBusy(false); return; }

        useEffect(() => {

        }, [role, busy, worldPaths, country, adm1, a1Idx, adm2, a2Idx, blocks, a3Idx, schools, selHt]);

        useEffect(() => { if (level === "school" && school) setTf(frame(school.bbox, 0.82, 0)); }, [school, level, frame]);

        // Frame the adm2/adm3 maps to the union bbox of the children actually rendered (districts /
        // blocks) rather than the parent polygon. Block/district geometry can poke past the parent
        // boundary (children are kept by centroid), so framing the parent's bbox clipped the map.
        // Also re-runs when `size` changes (via `frame`), so the map re-centres on resize.
        const unionBbox = (arr) => {
          let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
          for (const o of arr) { const [a, b, c, d] = o.bbox; if (a < minx) minx = a; if (b < miny) miny = b; if (c > maxx) maxx = c; if (d > maxy) maxy = d; }
          return [minx, miny, maxx, maxy];
        };
        useEffect(() => {
          if (moved.current) return;                                   // don't fight a manual pan
          if (level === "adm3" && blocks && blocks.length) setTf(frame(unionBbox(blocks)));
          else if (level === "adm2" && adm2 && adm2.length) setTf(frame(unionBbox(adm2)));
          // schools level lives inside the report (no sidebar) → centre the block with no left inset
          else if (level === "schools" && blocks && a3Idx != null && blocks[a3Idx]) setTf(frame(blocks[a3Idx].bbox, 0.9, 0));
        }, [level, blocks, a3Idx, adm2, frame]);

        // staged reveal: head teacher first, then the teachers, then the students
        useEffect(() => {
          if (level !== "school" || !selHt) return;
          setReveal(0);
          const t1 = setTimeout(() => setReveal(1), 400);
          const t2 = setTimeout(() => setReveal(2), 850);
          return () => { clearTimeout(t1); clearTimeout(t2); };
        }, [selHt, level]);

        // which graph node is the signed-in user (HT role → the head teacher; Teacher role → first teacher)
        const selfId = useMemo(() => {
          if (level !== "school" || !selHt) return null;
          if (role === "ht") return selHt;
          if (role === "teacher") return selHt + ".0";
          return null;
        }, [level, selHt, role]);
        const groupStage = { ht: 0, teacher: 1, student: 2 };

        const globeMode = isWorld;
        const onPointerDown = useCallback((e) => { drag.current = globeMode ? { x: e.clientX, y: e.clientY, rot: globeRot, spin: true } : { x: e.clientX, y: e.clientY, tx: tf.x, ty: tf.y }; moved.current = false; }, [tf, globeMode, globeRot]);
        const onPointerMove = useCallback((e) => {
          if (!drag.current) return;
          const dx = e.clientX - drag.current.x, dy = e.clientY - drag.current.y;
          if (Math.abs(dx) + Math.abs(dy) > 4) moved.current = true;
          if (drag.current.spin) { const [l0, p0] = drag.current.rot; setGlobeRot([l0 + dx * 0.4, clamp(p0 - dy * 0.4, -89, 89)]); }
          else setTf((t) => ({ ...t, x: drag.current.tx + dx, y: drag.current.ty + dy }));
        }, []);
        const onPointerUp = useCallback(() => { drag.current = null; }, []);
        // empty-space click: if a card is pinned, first click just unpins; otherwise go up a level
        const onBgClick = useCallback(() => { if (moved.current) return; if (pinned) { setPinned(false); setPinnedItem(null); setActive(null); return; } if (LEVEL_ORDER.indexOf(level) > capIdx) popUp(); }, [popUp, level, pinned, capIdx]);
        // Esc unpins the area card
        useEffect(() => {
          if (!pinned) return;

          window.addEventListener("keydown", onKey);

        }, [pinned]);
        // any drill (level change) clears the pin so the next level's card is hover-driven again

        const zoomBy = useCallback((factor) => {
          setTf((t) => { const k = clamp(t.k * factor, ZMIN, ZMAX); const s = k / t.k; const cx = size.w / 2, cy = size.h / 2; return { k, x: cx - (cx - t.x) * s, y: cy - (cy - t.y) * s }; });
        }, [size]);

        const gStyle = { transition: drag.current ? "none" : "transform .35s ease" };
        const a1f = a1Idx != null && adm1 ? adm1[a1Idx] : null;
        const a2f = a2Idx != null && adm2 ? adm2[a2Idx] : null;
        const blk = a3Idx != null && blocks ? blocks[a3Idx] : null;
        // The report UI is used at every scale for the educator/minister roles. The children of the
        // current level (countries / regions / districts / blocks / schools / class members) drive
        // the KPIs, charts, detail card & spotlight — built generically from `entities`.
        const usesReport = role !== "transparency" && role !== "measure";
        // noun for the children shown at this level (singular/plural) — drives the generic report labels
        const REP_NOUN = { world: ["Country", "countries"], adm1: ["Region", "regions"], adm2: ["District", "districts"], adm3: ["Block", "blocks"], schools: ["School", "schools"], school: ["Class member", "class members"] };
        // the officer who leads each child unit (drives the "{officer} Spotlight" section title)

        const officer = REP_OFFICER[level] || "Head Teacher";
        const [nounS, nounP] = REP_NOUN[level] || ["Area", "areas"];
        // drill into a child entity (works at every level)
        const drillEntity = (it) => {
          if (!it || moved.current) return;
          moved.current = false;
          if (level === "schools" && it.sc) drillSchool(it.sc);
          else if (level === "adm3") { const i = (blocks || []).findIndex((b) => b.id === it.id); if (i >= 0) drillBlock(i); }

        };
        const pickSchool = (it) => drillEntity(it);
        // single click on a school (map dot / bar / line): select it (School Detail) + add to the send list
        const selectSchool = (it) => {
          if (!it || !it.id) return;

          const ent = repRecipients.find((e) => e.id === it.id);
          if (ent) addEntities([ent]);
        };
        // drag-select: add a whole range of schools (bars) to the send list at once
        const selectSchools = (items) => {
          if (!items || !items.length) return;
          const ids = new Set(items.map((i) => i.id));
          const ents = repRecipients.filter((e) => ids.has(e.id));
          if (ents.length) addEntities(ents);
          setRepSel(items[items.length - 1].id);
        };
        // "send a message to get these schools using PadhaiPal" → inject onboarding template + jump to Messaging
        const onboardUnonboarded = () => {
          const msg = "Namaste! Your school isn't on PadhaiPal yet. PadhaiPal is a WhatsApp-based reading programme that has raised oral-literacy scores across " + (blk ? blk.name : "this block") + ". Reply YES to onboard your school this week — we'll set up your teachers in minutes. 📚";
          setComposeDraft((d) => ({ text: msg, n: d.n + 1 }));

        const synthBlocks = blocks && blocks[0] && blocks[0].synthetic;

        // ===== invite modal (for unregistered / grey-tinted areas) =====
        const [invite, setInvite] = useState(null);   // { id, title, role, link }
        const openInvite = (a) => setInvite({ ...a, link: "https://pp.link/invite/" + encodeURIComponent(a.id) });
        const [pendingInvites, setPendingInvites] = useState(() => new Map());   // nodeId -> { name, phone } (last invite sent)
        const recordInvite = (id, person) => setPendingInvites((m) => { const n = new Map(m); n.set(id, person); return n; });
        const [petition, setPetition] = useState(null);   // { title, count, signups } -> full-screen petition page
        const [fund, setFund] = useState(null);            // { title, id } -> Fund-this-location modal

        // ===== messaging + bar-graph state =====
        const [composeOpen, setComposeOpen] = useState(true);
        const [composeGlow, setComposeGlow] = useState(false);
        const glowTimer = useRef(null);
        const flashCompose = useCallback(() => { setComposeGlow(true); if (glowTimer.current) clearTimeout(glowTimer.current); glowTimer.current = setTimeout(() => setComposeGlow(false), 2000); }, []);
        const [sendList, setSendList] = useState(() => new Map());
        const [hoverId, setHoverId] = useState(null);
        const [savedTemplates, setSavedTemplates] = useState([]);
        const [savedFilters, setSavedFilters] = useState([]);
        const [ai, setAi] = useState({ on: false, window: "48 h" });
        const [toast, setToastState] = useState(null);
        const toastTimer = useRef(null);
        const setToast = useCallback((msg) => { setToastState(msg); if (toastTimer.current) clearTimeout(toastTimer.current); toastTimer.current = setTimeout(() => setToastState(null), 4200); }, []);

        const entities = useMemo(() => {
          let arr = [];
          if (level === "world" && worldPaths) arr = worldPaths.filter((p) => p.covered).map((p) => ({ id: p.u.id, u: p.u, name: p.name, sub: "National Director · " + p.u.name, location: "World", level: "Country", anchor: p.c, pathD: p.d }));
          else if (level === "adm1" && adm1) arr = adm1.map((d) => ({ id: d.id, u: d.u, name: d.name, sub: "DGSE · " + d.u.name, location: country ? country.name : "", level: "DGSE", anchor: d.c, pathD: d.d, demo: d.demo }));
          else if (level === "adm2" && adm2) arr = adm2.map((d) => ({ id: d.id, u: d.u, name: d.name, sub: "BSA · " + d.u.name, location: a1f ? a1f.name : "", level: "BSA", anchor: d.c, pathD: d.d, demo: d.demo }));
          else if (level === "adm3" && blocks) arr = blocks.map((b) => ({ id: b.id, u: b.u, name: b.name, sub: "BEO · " + b.u.name, location: a2f ? a2f.name : "", level: "BEO", anchor: b.seed, pathD: b.d, demo: b.demo }));
          else if (level === "schools" && schools) arr = schools.map((s) => ({ id: s.id, u: s.u, name: s.name, sub: (s.kind && s.kind !== "unknown" ? s.kind[0].toUpperCase() + s.kind.slice(1) + " · " : "") + "Head Teacher · " + s.u.name, location: blk ? blk.name : "", level: "Head Teacher", kind: s.kind, anchor: s.p, dot: true }));
          else if (level === "school" && school) arr = school.nodes.map((n) => ({ id: n.id, u: n.u, name: n.u.designation, sub: n.u.name, location: blk ? blk.name : "", level: n.u.designation, anchor: [n.x, n.y], dot: true }));
          arr = arr.map((e) => ({ ...e, score: e.u.score }));
          const order = [...arr].sort((a, b) => b.score - a.score);
          const rank = new Map(); order.forEach((e, i) => rank.set(e.id, i + 1));
          return arr.map((e) => ({ ...e, rank: rank.get(e.id) }));
        }, [level, worldPaths, adm1, adm2, blocks, schools, school, country, a1f, a2f, blk]);

        // Hierarchy-scoped recipient pool for the block report. Generalizable rule: a user may
        // message (a) anyone BELOW them within their own unit/subtree, (b) PEERS at their level in
        // the same parent unit, and (c) their DIRECT supervisor — never other units or higher up.
        const HR = { dgse: 1, bsa: 2, beo: 3, ht: 4, teacher: 5 };
        const repRecipients = useMemo(() => {
          if (level !== "schools" || !schools) return entities;
          const stateId = a1f ? a1f.id : "st", districtId = a2f ? a2f.id : "dt", blockId = blk ? blk.id : "blk";
          const nipOnb = (id) => (hashStr("nip:" + id) % 100) >= 30;   // a geographical area / school on PadhaiPal?
          const mk = (id, name, lvl, hrank, path) => { const u = node(id); return { id, u, name, sub: lvl, location: blk ? blk.name : "", level: lvl, hrank, path, score: u.score, onboarded: registered(id) }; };
          const list = [];
          list.push(mk("h.dgse." + stateId, (a1f ? a1f.name : "State") + " DGSE", "DGSE", 1, { state: stateId }));
          (adm2 && adm2.length ? adm2 : [a2f]).filter(Boolean).forEach((d) => list.push(mk("h.bsa." + d.id, d.name + " BSA", "BSA", 2, { state: stateId, district: d.id })));
          (blocks && blocks.length ? blocks : [blk]).filter(Boolean).forEach((b) => list.push(mk("h.beo." + b.id, b.name + " BEO", "BEO", 3, { state: stateId, district: districtId, block: b.id })));
          schools.forEach((s) => {
            const sOnb = nipOnb(s.id);
            list.push({ id: s.id, u: s.u, name: s.name, sub: "Head Teacher", location: blk ? blk.name : "", level: "Head Teacher", hrank: 4, path: { state: stateId, district: districtId, block: blockId, school: s.id }, score: s.u.score, onboarded: sOnb });
            for (let ti = 0; ti < 2; ti++) { const id = s.id + ".t" + ti, u = node(id); list.push({ id, u, name: u.name + " · " + s.name, sub: "Teacher", location: blk ? blk.name : "", level: "Teacher", hrank: 5, path: { state: stateId, district: districtId, block: blockId, school: s.id }, score: u.score, onboarded: sOnb }); }
          });
          const ur = HR[role];
          if (ur == null) return list;
          const PKEY = ["state", "district", "block", "school"], uOwn = PKEY[Math.min(ur, 4) - 1];
          const uPath = { state: stateId, district: districtId, block: blockId, school: (role === "ht" || role === "teacher") && schools[0] ? schools[0].id : null };
          const ownIdx = PKEY.indexOf(uOwn), parentKeys = PKEY.slice(0, ownIdx);
          const matches = (rec, keys) => keys.every((k) => uPath[k] == null || rec.path[k] === uPath[k]);
          const allowed = list.filter((rec) =>
            (rec.hrank > ur && matches(rec, PKEY.slice(0, ownIdx + 1))) ||                      // descendants
            (rec.hrank === ur && matches(rec, parentKeys) && rec.path[uOwn] !== uPath[uOwn]) || // peers
            (rec.hrank === ur - 1 && matches(rec, parentKeys))                                  // direct supervisor
          );
          const order = [...allowed].sort((a, b) => b.score - a.score), rk = new Map();
          order.forEach((e, i) => rk.set(e.id, i + 1));
          return allowed.map((e) => ({ ...e, rank: rk.get(e.id) }));
        }, [level, schools, a1f, a2f, blk, blocks, adm2, role, entities]);

        // ---- report (built generically from the current level's children) ----
        const report = useMemo(() => (usesReport && entities && entities.length ? buildBlockReport(entities) : null), [usesReport, entities]);
        const nipById = useMemo(() => { const m = new Map(); if (report) for (const it of report.items) m.set(it.id, it); return m; }, [report]);
        // id of the signed-in user's own area among the current children (gets a blue glow in the charts)
        const mineId = useMemo(() => {
          if (level === "world" && worldPaths) { const p = worldPaths.find((x) => x.u && isMine("world", { iso: x.iso, name: x.name })); return p ? p.u.id : null; }
          if (level === "adm1" && adm1) { const d = adm1.find((x) => isMine("adm1", { name: x.name, index: x.i })); return d ? d.id : null; }
          if (level === "adm2" && adm2) { const d = adm2.find((x) => isMine("adm2", { name: x.name, index: x.j })); return d ? d.id : null; }
          if (level === "adm3" && blocks) { const b = blocks.find((x) => isMine("adm3", { name: x.name, index: x.k })); return b ? b.id : null; }
          if (level === "schools" && schools) { const s = schools.find((x) => isMine("schools", { index: x.k })); return s ? s.id : null; }
          if (level === "school" && school && school.nodes) { const n = school.nodes.find((x, i) => isMine("school", { index: i })); return n ? n.id : null; }
          return null;
        }, [level, worldPaths, adm1, adm2, blocks, schools, school, role]);
        const isReport = usesReport && !!report;
        // overlay stays while still drilling toward home OR while the report isn't ready yet (e.g. the
        // school force graph is still building) — this hides the brief old-layout flash for deep roles.
        const navigating = usesReport && !navStuck && (LEVEL_ORDER.indexOf(level) < capIdx || !report);

        const snap = useCallback((e) => ({ id: e.id, uname: e.u.name, name: e.name, area: e.name, location: e.location, level: e.level, score: e.score, rank: e.rank, face: e.u.face, perf: e.u.perf, phone: e.u.phone, onboarded: e.onboarded !== false }), []);
        const toggleSend = useCallback((e) => setSendList((prev) => { const m = new Map(prev); if (m.has(e.id)) m.delete(e.id); else m.set(e.id, snap(e)); return m; }), [snap]);
        const addEntities = useCallback((es) => setSendList((prev) => { const m = new Map(prev); es.forEach((e) => m.set(e.id, snap(e))); return m; }), [snap]);
        const removeSend = useCallback((id) => setSendList((prev) => { const m = new Map(prev); m.delete(id); return m; }), []);
        const clearSend = useCallback(() => setSendList(new Map()), []);
        const selectedIds = useMemo(() => new Set(sendList.keys()), [sendList]);

        const onSend = useCallback((text, aiCfg) => {
          const n = sendList.size;
          if (!n) { setToast("Add recipients before sending."); return; }
          setToast(`✓ Message sent to ${n} recipient${n > 1 ? "s" : ""}.` + (aiCfg.on ? ` AI will follow up non-responders in ${aiCfg.window}.` : ""));
          if (aiCfg.on) setTimeout(() => setToast(`🤖 AI follow-up sent to ${Math.max(1, Math.round(n * 0.4))} non-responder${n > 1 ? "s" : ""}.`), 3600);
        }, [sendList, setToast]);

        // rasterise an on-page <svg> to a PNG data URL (for embedding in the PDF)
        const svgToPng = (svgEl, bg) => new Promise((resolve) => {
          if (!svgEl) { resolve(null); return; }
          try {
            const vb = svgEl.viewBox && svgEl.viewBox.baseVal;
            let w = svgEl.clientWidth || (vb && vb.width) || 800;
            let h = svgEl.clientHeight || (vb && vb.height) || 400;

                        const curve = yKey === "letters" ? js.letters : yKey === "nat" ? js.nip : js.acer;
                        const color = yKey === "letters" ? "#06b6d4" : yKey === "nat" ? "#8b5cf6" : "#2563eb";
                        const fmtY = yKey === "letters" ? fmtPop : ((v) => String(Math.round(v)));
                        const toggles = [["acer", "ACER"], js.natName && ["nat", js.natName], ["letters", "Letters"]].filter(Boolean);
                        const W = 320;
                        const outSeries = [
                          { name: "Spend", color: "#10b981", values: js.outputs.spend, fmt: fmtMoney },
                          { name: "ACER tests", color: "#2563eb", values: js.outputs.acerTests, fmt: fmtPop },
                          js.outputs.nipTests && { name: js.natName + " tests", color: "#8b5cf6", values: js.outputs.nipTests, fmt: fmtPop },
                          { name: "Students", color: "#f59e0b", values: js.outputs.students, fmt: fmtPop },
                          { name: "Lesson hrs", color: "#f43f5e", values: js.outputs.hours, fmt: fmtPop },
                          { name: "Letters", color: "#06b6d4", values: js.outputs.letters, fmt: fmtPop },
                          // counterfactual 2031–2050 impact (WWHGE paper, scaled to children reached)
                          { name: "GDP ↑ '50", color: "#65a30d", values: js.outputs.gdp, fmt: fmtMoney },
                          { name: "Tax rev ↑ '50", color: "#0d9488", values: js.outputs.tax, fmt: fmtMoney },
                          { name: "Lives saved", color: "#dc2626", values: js.outputs.lives, fmt: fmtPop },
                          { name: "Marriages averted", color: "#db2777", values: js.outputs.marriages, fmt: fmtPop },
                          { name: "→ secondary", color: "#4f46e5", values: js.outputs.secondary, fmt: fmtPop },

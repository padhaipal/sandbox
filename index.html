<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PadhaiPal — Educator Network (global map)</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> <!-- card icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&display=swap" rel="stylesheet"> <!-- hand-scribbled annotations -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/d3@7"></script>                              <!-- global map + school force graph -->
  <script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script> <!-- report PDF export -->
  <!-- pin to Babel 7: its preset-react uses the classic JSX runtime (React.createElement).
       Babel 8 defaults to the automatic runtime, which emits an `import` an inline classic
       <script> can't execute → blank page. -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { font-family: Arial, Helvetica, sans-serif; background: #fafafa; color: #18181b; }
    @keyframes livedot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
    .live-dot { animation: livedot 1.4s ease-in-out infinite; }
    @keyframes glowpulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
    .glowpulse { animation: glowpulse 1s ease-in-out infinite; }
    @keyframes barglow { 0%,100% { box-shadow: 0 0 4px 1px rgba(37,99,235,.55); } 50% { box-shadow: 0 0 9px 2px rgba(37,99,235,.95); } }
    .bar-sel { animation: barglow 1.2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect, useCallback, useRef } = React;

    // Signed-in role (whose dashboard this is). Transparency = philanthropic donor → the whole
    // global picture (a dedicated donor dashboard). Every other role sees only its parent node +
    // peers + peers' descendants, which on the geographic map means navigation is *capped* at the
    // role's home level. Non-donor roles are anchored on India → Uttar Pradesh → Lucknow (the BEO
    // example) and the app auto-navigates there on sign-in.
    // levels:   world  adm1   adm2   adm3   schools  school
    // org node: donor  DGSE   BSA    BEO    Head-T   Teacher/Student
    const LEVEL_ORDER = ["world", "adm1", "adm2", "adm3", "schools", "school"];
    const ROLES = [
      { code: "transparency", label: "Transparency", home: "world",   who: "Global Education Secretary", where: "Global · donor view", nav: {} },
      { code: "dgse",         label: "DGSE",         home: "adm1",    who: "DGSE",         where: "Uttar Pradesh",    nav: { iso: "IND" } },
      { code: "bsa",          label: "BSA",          home: "adm2",    who: "BSA",          where: "Lucknow",          nav: { iso: "IND", a1: "uttar pradesh" } },
      { code: "beo",          label: "BEO",          home: "adm3",    who: "BEO",          where: "Lucknow district", nav: { iso: "IND", a1: "uttar pradesh", a2: "lucknow" } },
      { code: "ht",           label: "Head Teacher", home: "schools", who: "Head Teacher", where: "Lucknow",          nav: { iso: "IND", a1: "uttar pradesh", a2: "lucknow", block: 0 } },
      { code: "teacher",      label: "Teacher",      home: "school",  who: "Teacher",      where: "Lucknow",          nav: { iso: "IND", a1: "uttar pradesh", a2: "lucknow", block: 0, school: 0 } },
    ];
    const ROLE_BY = {}; ROLES.forEach((r) => { ROLE_BY[r.code] = r; });

    // #####################################################################
    // ## VIEW 4 — Global map (geoBoundaries ADM1/2/3, live-loaded).        ##
    // ## World -> Country -> ADM1(DGSE) -> ADM2(BSA) -> ADM3(BEO, w/       ##
    // ## Voronoi fallback) -> school dots -> HT/teacher/student force      ##
    // ## graph. Boundaries fetched on demand from the geoBoundaries CDN;   ##
    // ## countries with no district (ADM2) data are greyed out.            ##
    // #####################################################################
    const WorldMapApp = (function () {
      const d3 = window.d3;
      const API = "https://www.geoboundaries.org/api/current/gbOpen/";
      const WORLD_URL = "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson";

      // ===================================================================
      // i18n: UI text is looked up via t(key). English is the source/default.
      // Add a language = add a { code, label } to UI_LANGS and a dictionary
      // (key -> translation) to I18N. Missing keys fall back to the English key.
      // ===================================================================
      const UI_LANGS = [
        { code: "en", label: "English" },
        { code: "hi", label: "हिन्दी" },
      ];
      const I18N = {
        hi: {
          "World": "विश्व", "School": "विद्यालय",
          "Area": "क्षेत्र", "Roadmap": "रोडमैप", "Compose": "संदेश", "Legend": "संकेत",
          "Reset": "रीसेट", "Report": "रिपोर्ट", "Drill in →": "अंदर जाएँ →",
          "Hover a region on the map to see its details.": "विवरण देखने के लिए मानचित्र पर किसी क्षेत्र पर माउस ले जाएँ।",
          "Click a pinned area’s ✕, press Esc, or click empty space to unpin.": "अनपिन करने के लिए पिन किए गए क्षेत्र का ✕ दबाएँ, Esc दबाएँ, या खाली जगह पर क्लिक करें।",
          "click empty space to go up one level": "एक स्तर ऊपर जाने के लिए खाली जगह पर क्लिक करें",
          "Population": "जनसंख्या", "Adult literacy": "वयस्क साक्षरता",
          "Teaching / building": "पढ़ा रहे / बना रहे", "On the roadmap": "रोडमैप पर",
          "Beyond our method": "हमारी पद्धति से परे", "Reach": "पहुँच",
          "PadhaiPal coverage": "पधाईपाल कवरेज", "Fund this location": "इस स्थान को वित्त दें",
          "Letters learnt": "सीखे गए अक्षर", "Yesterday": "कल", "Week": "सप्ताह", "Month": "महीना", "Year": "वर्ष",
          "Templates": "टेम्पलेट", "Message": "संदेश", "Find recipients": "प्राप्तकर्ता खोजें", "Send list": "भेजने की सूची",
          "Search name…": "नाम खोजें…", "Location…": "स्थान…", "Any level": "कोई भी स्तर",
          "Add all": "सभी जोड़ें", "Clear": "साफ़ करें", "Save filters": "फ़िल्टर सहेजें",
          "Any gender": "कोई भी लिंग", "Female": "महिला", "Male": "पुरुष",
          "Any language": "कोई भी भाषा", "Any setting": "कोई भी क्षेत्र", "Urban": "शहरी", "Rural": "ग्रामीण",
          "Active any time": "कभी भी सक्रिय", "Active ≤ 7 days": "सक्रिय ≤ 7 दिन", "Active ≤ 30 days": "सक्रिय ≤ 30 दिन",
          "Any device": "कोई भी डिवाइस", "Smartphone": "स्मार्टफ़ोन", "Feature phone": "फ़ीचर फ़ोन",
          "Language": "भाषा",
          "Score": "स्कोर", "Days since signup": "साइन-अप से दिन", "Active minutes": "सक्रिय मिनट", "Days > 5 min": "5+ मिनट वाले दिन",
          "Letter scores over time": "समय के साथ अक्षर स्कोर", "Recent audio": "हाल का ऑडियो",
          "Time": "समय", "Audio": "ऑडियो", "Transcript": "प्रतिलेख", "Answer": "उत्तर",
          "Show 10 more": "10 और दिखाएँ", "left": "शेष", "All audio shown": "सारा ऑडियो दिखाया गया", "demo data": "डेमो डेटा",
        },
      };
      const translate = (lang, s) => (lang && I18N[lang] && I18N[lang][s]) || s;

      // --- helpers (mirror the other views; IIFEs stay independent) ---
      function hashStr(s) {
        let h1 = 0xdeadbeef ^ s.length, h2 = 0x41c6ce57 ^ s.length;
        for (let i = 0; i < s.length; i++) {
          const ch = s.charCodeAt(i);
          h1 = Math.imul(h1 ^ ch, 2654435761); h2 = Math.imul(h2 ^ ch, 1597334677);
        }
        h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
        h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
        return (h1 >>> 0);
      }
      const FIRST = ["Aarav","Diya","Kabir","Ishaan","Ananya","Riya","Aditya","Rohan","Saanvi","Arjun",
        "Priya","Myra","Vivaan","Kiara","Reyansh","Anvi","Tara","Dev","Ira","Yuvan","Sara","Krish",
        "Anil","Meena","Vikram","Sita","Deepak","Asha","Ravi","Neha","Manish","Geeta","Pooja","Rahul",
        "Sunil","Kavita","Pramod","Rajesh","Om","Nisha","Sanjay","Rekha","Amit","Sunita","Vijay","Lata",
        "Mohan","Usha","Suresh","Gita"];
      const LAST = ["Sharma","Gupta","Singh","Yadav","Joshi","Verma","Pal","Rao","Lal","Bose","Kumar",
        "Prakash","Devi","Mishra","Tiwari","Pandey","Chauhan","Saxena","Nair","Reddy"];
      const FACE_COUNT = { adult: 300, child: 50 };

      const lerp = (a, b, t) => a.map((v, i) => v + (b[i] - v) * t);
      function scoreRGB(p) {
        const red = [239, 68, 68], yellow = [234, 179, 8], green = [34, 197, 94];
        return (p < 0.5 ? lerp(red, yellow, p / 0.5) : lerp(yellow, green, (p - 0.5) / 0.5)).map((v) => v | 0);
      }
      const scoreColor = (p) => `rgb(${scoreRGB(p).join(",")})`;
      const textOn = (p) => { const [r, g, b] = scoreRGB(p); return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.62 ? "#1c1917" : "#ffffff"; };

      // --- org model: country=National Director, ADM1=DGSE, ADM2=BSA, ADM3=BEO, school=Head Teacher ---
      const LEVELS = ["World", "Country", "DGSE", "BSA", "BEO", "Head Teacher", "Teacher", "Student"];
      const SUB = { Country: "National Director", DGSE: "DGSE", BSA: "BSA", BEO: "BEO" };
      // children-per-node range, by org level. Only school->teacher->student are procedural;
      // country/ADM1/ADM2/ADM3 counts come from the live map data.
      const FANOUT = [null, null, null, null, null, [2, 7], [12, 28]];
      // deterministic per-node metadata (demo) — plausible attributes the recipient search filters on.
      const META_GENDERS = ["Female", "Male"];
      const META_SETTINGS = ["Urban", "Rural"];
      const META_DEVICES = ["Smartphone", "Feature phone"];
      const META_LANGS = ["Hindi", "English", "Bengali", "Tamil", "Telugu", "Marathi", "Urdu", "Gujarati", "Kannada", "Punjabi"];
      // School people-graph card geometry (world units). Cards are world-anchored (they zoom with
      // the map), so the layout collide radius == the rendered card footprint guarantees the node
      // UIs never overlap. uiR ≥ half the card width (CARD_W/2) so neighbours can't touch.
      const SCHOOL_CARD_W = 76;
      const schoolFaceR = (g) => (g === "ht" ? 22 : g === "teacher" ? 15 : 10);
      const schoolUiR = (g) => (g === "ht" ? 48 : g === "teacher" ? 42 : 40);
      function node(id) {
        const lvl = id.split(".").length - 1;
        const h = hashStr("u:" + id);
        const perf = (h % 1000) / 1000;
        const student = lvl === LEVELS.length - 1;
        return {
          id, lvl, designation: LEVELS[lvl] || "—",
          name: FIRST[h % FIRST.length] + (student ? "" : " " + LAST[(h >>> 9) % LAST.length]),
          perf, score: Math.round(perf * 100),
          face: "faces/" + (student ? "child" : "adult") + "/" + (hashStr("face:" + id) % (student ? FACE_COUNT.child : FACE_COUNT.adult)) + ".jpg",
          phone: "+9198" + String(1000000 + (h % 9000000)),
          // --- metadata categories (deterministic; demo) ---
          gender: META_GENDERS[(h >>> 3) % 2],
          setting: META_SETTINGS[(h >>> 5) % 2],
          device: student ? META_DEVICES[(h >>> 7) % 2] : "Smartphone",
          language: META_LANGS[(h >>> 11) % META_LANGS.length],
          experience: student ? 0 : 1 + ((h >>> 13) % 25),   // years in role (educators)
          lastActiveDays: (h >>> 17) % 31,                    // days since last active (0–30)
        };
      }
      function baseChildCount(id) {
        const lvl = id.split(".").length - 1;
        const f = FANOUT[lvl];
        if (!f) return 0;
        const [mn, mx] = f;
        return mn === mx ? mn : mn + (hashStr("fan:" + id) % (mx - mn + 1));
      }

      // --- geometry helpers (projected screen space) ---
      const stripClose = (r) => (r.length > 1 && r[0][0] === r[r.length - 1][0] && r[0][1] === r[r.length - 1][1] ? r.slice(0, -1) : r);
      const ringArea = (r) => { let s = 0; for (let i = 0, j = r.length - 1; i < r.length; j = i++) s += r[j][0] * r[i][1] - r[i][0] * r[j][1]; return s / 2; };
      function bboxOf(r) { let a = Infinity, b = Infinity, c = -Infinity, d = -Infinity; for (const p of r) { if (p[0] < a) a = p[0]; if (p[1] < b) b = p[1]; if (p[0] > c) c = p[0]; if (p[1] > d) d = p[1]; } return [a, b, c, d]; }
      function largestRing(feature, proj) {
        const g = feature.geometry; if (!g) return [];
        const polys = g.type === "Polygon" ? [g.coordinates] : g.type === "MultiPolygon" ? g.coordinates : [];
        let best = null, bestA = -1;
        for (const poly of polys) { const pr = poly[0].map((c) => proj(c)).filter((p) => p && !isNaN(p[0])); if (pr.length < 3) continue; const a = Math.abs(ringArea(pr)); if (a > bestA) { bestA = a; best = pr; } }
        return best || [];
      }
      const toPath = (poly) => "M" + poly.map((p) => p[0].toFixed(1) + "," + p[1].toFixed(1)).join("L") + "Z";

      // dark grey for the non-phonetic pie segment + no-data areas (contrasts the slate border)
      const NONPHON = "#3f3f46";
      // PadhaiPal coverage (demo: randomized). Each node ~50% chance of being registered;
      // light grey = the coverage gap (3rd pie segment + whole-area shade when unregistered).
      const UNCOVERED = "#a1a1aa";
      const registered = (id) => (hashStr("reg:" + id) % 2) === 0;          // ~50% of nodes in network
      const coverShare = (id) => (hashStr("cov:" + id) % 1000) / 1000;      // covered fraction of the phonetic share
      // an area is "dimmed" (grey tint + invite +) when unregistered AND >5% phonetic
      const isDimmed = (id, frac) => !registered(id) && frac > 0.05;
      // Roadmap: ordered list of 10 languages PadhaiPal could build (all phonetic / buildable).
      const ROADMAP_LANGS = ["Hindi", "Spanish", "Bengali", "Indonesian", "Swahili", "Telugu", "Marathi", "Tamil", "Vietnamese", "Turkish"];
      const IMPACT_METRICS = [
        { id: "dalys", label: "DALYs averted", group: "raw" },
        { id: "lives", label: "Child lives saved", group: "raw" },
        { id: "gdp", label: "GDP gain by 2050", group: "raw" },
        { id: "cost_daly", label: "$ / DALY", group: "cost" },
        { id: "cost_life", label: "$ / life saved", group: "cost" },
      ];
      // --- phonetic pie: fill each area with a 2-segment pie (colored=phonetic share,
      //     non-phonetic=dark grey) centered at its centroid, radius > the polygon so the
      //     border clips the circle perimeter. bbox is [a,b,c,d] (flat) or [[x0,y0],[x1,y1]]. ---
      function cornerRadius(c, bbox) {
        if (!c || !bbox) return 0;
        const x0 = Array.isArray(bbox[0]) ? bbox[0][0] : bbox[0], y0 = Array.isArray(bbox[0]) ? bbox[0][1] : bbox[1];
        const x1 = Array.isArray(bbox[0]) ? bbox[1][0] : bbox[2], y1 = Array.isArray(bbox[0]) ? bbox[1][1] : bbox[3];
        let m = 0;
        for (const [x, y] of [[x0, y0], [x1, y0], [x1, y1], [x0, y1]]) { const d = Math.hypot(x - c[0], y - c[1]); if (d > m) m = d; }
        return m * 1.06;
      }
      const wedgePath = (cx, cy, r, a0, a1) => {
        const large = (a1 - a0) > Math.PI ? 1 : 0;
        const x0 = (cx + r * Math.cos(a0)).toFixed(1), y0 = (cy + r * Math.sin(a0)).toFixed(1);
        const x1 = (cx + r * Math.cos(a1)).toFixed(1), y1 = (cy + r * Math.sin(a1)).toFixed(1);
        return `M${cx.toFixed(1)},${cy.toFixed(1)}L${x0},${y0}A${r.toFixed(1)},${r.toFixed(1)} 0 ${large} 1 ${x1},${y1}Z`;
      };
      // clipped pie group (no border / interactions — those stay on the area path).
      // 3 segments by teachability: taught today (colored) | buildable later (grey) | never (dark).
      function pieEls(key, d, c, R, phon, perf, teach) {
        if (!c || !d || !(R > 0)) return null;
        const cid = "pie-" + String(key).replace(/[^\w-]/g, "_");
        const color = scoreColor(perf), cx = c[0], cy = c[1];
        const f = phon < 0 ? 0 : phon > 1 ? 1 : phon;            // phonetic share (teachable today + later)
        const t = teach == null ? 0 : teach < 0 ? 0 : teach > f ? f : teach;  // taught today (<= phonetic)
        const segs = [
          { f: t, fill: color },               // languages we teach today (Hindi)
          { f: f - t, fill: UNCOVERED },        // languages we can build next (phonetic)
          { f: 1 - f, fill: NONPHON },          // languages beyond the method
        ].filter((s) => s.f > 0.0005);
        let wedges;
        if (segs.length <= 1) wedges = <circle cx={cx} cy={cy} r={R} fill={(segs[0] || { fill: NONPHON }).fill} />;
        else {
          let a = -Math.PI / 2;
          wedges = segs.map((s, i) => { const a1 = a + 2 * Math.PI * s.f, p = wedgePath(cx, cy, R, a, a1); a = a1; return <path key={i} d={p} fill={s.fill} />; });
        }
        return (
          <React.Fragment>
            <defs><clipPath id={cid}><path d={d} /></clipPath></defs>
            <g clipPath={`url(#${cid})`} pointerEvents="none">{wedges}</g>
          </React.Fragment>
        );
      }
      // pie for an area; if the node is NOT in the PadhaiPal network, lay a translucent
      // grey filter over it so the underlying pie still shows through.
      function areaPie(clipKey, nodeId, d, c, R, frac, perf, teach) {
        const pie = pieEls(clipKey, d, c, R, frac, perf, teach);
        if (!isDimmed(nodeId, frac)) return pie;
        return (
          <React.Fragment>
            {pie}
            <path d={d} fill={UNCOVERED} fillOpacity={0.62} pointerEvents="none" />
          </React.Fragment>
        );
      }
      // "+" invite button at an area's centroid (greyscale, no border, constant screen size).
      // Hover shows a tooltip explaining the area has no user yet. geo = country/region/district/block.
      function PlusButton({ c, k, geo, pending, onClick }) {
        const [hov, setHov] = useState(false);
        if (!c || isNaN(c[0])) return null;
        const r = 8.8 / k, sw = 1.8 / k, len = 4.4 / k;           // 20% smaller than before, no border
        const s = 1 / k, tw = 176, th = pending ? 64 : 56;
        return (
          <g transform={`translate(${c[0]},${c[1]})`} style={{ cursor: "pointer" }} pointerEvents="auto"
            onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
            onMouseDown={(e) => e.stopPropagation()} onClick={(e) => { e.stopPropagation(); onClick(); }}>
            <circle r={r} fill={pending ? "#d97706" : "#71717a"} />
            <line x1={-len} y1={0} x2={len} y2={0} stroke="#fff" strokeWidth={sw} strokeLinecap="round" />
            <line x1={0} y1={-len} x2={0} y2={len} stroke="#fff" strokeWidth={sw} strokeLinecap="round" />
            {hov && (
              <foreignObject x={-(tw * s) / 2} y={-(th + 8) * s - r} width={tw * s} height={th * s} style={{ overflow: "visible", pointerEvents: "none" }}>
                <div style={{ width: tw, height: th, transform: `scale(${s})`, transformOrigin: "top left" }}
                  className="rounded-lg bg-zinc-900/90 px-2 py-1.5 text-[11px] leading-snug text-white shadow-lg">
                  {pending
                    ? <span>Invitation pending: <span className="font-semibold">{pending.name || "contact"}</span>{pending.phone ? " (" + pending.phone + ")" : ""}. Click to invite again.</span>
                    : <span>This {geo} has no PadhaiPal user yet — click to add one.</span>}
                </div>
              </foreignObject>
            )}
          </g>
        );
      }
      // modal to invite the (missing) lead for an unregistered area via WhatsApp / shareable link
      function InviteModal({ data, initial, onClose, onSent }) {
        const [tab, setTab] = useState("single");
        const [name, setName] = useState(initial ? initial.name : "");
        const [phone, setPhone] = useState(initial ? initial.phone : "");
        const [copied, setCopied] = useState(false);
        const [bulk, setBulk] = useState(null);   // { fileName, count } | null
        const [bulkSent, setBulkSent] = useState(false);
        const digits = phone.replace(/[^\d]/g, "");
        const who = name.trim() ? name.trim() + ", you're" : "Hi! You're";
        const msg = who + " invited to join the PadhaiPal network as the " + data.role + " for " + data.title + ". Tap to get started: " + data.link;
        const waHref = "https://wa.me/" + digits + "?text=" + encodeURIComponent(msg);
        const copy = () => { try { navigator.clipboard.writeText(data.link); } catch (e) {} setCopied(true); };
        const send = (e) => { if (!digits) { e.preventDefault(); return; } onSent({ name: name.trim(), phone: phone.trim() }); onClose(); };
        const onFile = (e) => {
          const f = e.target.files && e.target.files[0]; if (!f) return;
          setBulkSent(false);

        const wrap = (pairs, real) => ({ langs: pairs.map((p) => p[0]), pairs, real, phon: phonFrac(pairs), teach: teachFrac(pairs) });
        if (regionName && REGION_LANGS[regionName]) return wrap(REGION_LANGS[regionName], true);
        if (regionName && REGION_LANG[regionName]) { const ls = REGION_LANG[regionName]; return wrap(ls.map((l) => [l, 1 / ls.length]), true); }
        if (COUNTRY_LANGS[iso]) return wrap(COUNTRY_LANGS[iso], false);
        return { langs: ["—"], pairs: [], real: false, phon: 0, teach: 0 };
      };
      // top-3 languages per teachability group, dropping "Other"/"—":
      // now = taught today; soon = phonetic (buildable later); never = beyond the method.
      function splitLangs(pairs, built) {
        const nowSet = built || TEACHABLE_NOW;
        const now = [], soon = [], never = [];
        (pairs || []).forEach(([l, s]) => { if (l === "Other" || l === "—") return; (nowSet.has(l) ? now : isPhonetic(l) ? soon : never).push([l, s]); });
        const top3 = (a) => a.sort((x, y) => y[1] - x[1]).slice(0, 3).map(([l, s]) => l + " " + Math.round(s * 100) + "%");
        return { now: top3(now), soon: top3(soon), never: top3(never) };
      }
      function demoFor(feature, iso, regionName, isCountry, inherit) {
        const areaKm2 = planarAreaKm2(feature);
        const dens = 12 + (hashStr("dens:" + (regionName || "") + iso) % 1100);
        // country level -> real national population; sub-levels -> area-disaggregated (peers split by area)
        const pop = isCountry && COUNTRY_POP[iso] ? COUNTRY_POP[iso] : Math.max(1, Math.round(areaKm2 * dens));
        // sub-levels inherit the parent's language mix (proportions); only pop/area differ
        const lang = inherit ? { langs: inherit.langs, pairs: inherit.pairs, real: inherit.real, phon: inherit.phon, teach: inherit.teach } : langFor(iso, regionName);
        // adult literacy: national value only — sub-levels copy the nearest ancestor that has one
        const lit = inherit && inherit.lit != null ? inherit.lit : (ADULT_LITERACY[iso] != null ? ADULT_LITERACY[iso] : null);
        return { pop, areaKm2, lit, ...lang };
      }
      const fmtPop = (n) => n >= 1e12 ? (n / 1e12).toFixed(2) + "T" : n >= 1e9 ? (n / 1e9).toFixed(2) + "B" : n >= 1e6 ? (n / 1e6).toFixed(1) + "M" : n >= 1e3 ? Math.round(n / 1e3) + "K" : String(Math.round(n));
      const fmtArea = (n) => n >= 1e6 ? (n / 1e6).toFixed(2) + "M km²" : n >= 1e3 ? Math.round(n).toLocaleString() + " km²" : Math.round(n) + " km²";
      const fmtMoney = (n) => "$" + (n >= 1e12 ? (n / 1e12).toFixed(2) + "T" : n >= 1e9 ? (n / 1e9).toFixed(2) + "B" : n >= 1e6 ? (n / 1e6).toFixed(1) + "M" : n >= 1e3 ? Math.round(n / 1e3) + "K" : String(Math.round(n)));
      const MON = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

      // National foundational-literacy assessment each government prefers (ACER is shown everywhere).
      // India = NIPUN; others use their own; unlisted countries show no second test.
      const NAT_TEST = {
        IND: "NIPUN", USA: "NAEP", GBR: "KS1 phonics", AUS: "NAPLAN", BRA: "SAEB", ZAF: "EGRA",
        KEN: "KPSEA", NGA: "NECO", FRA: "Évaluations", DEU: "VERA", IDN: "AKM", PHL: "NAT",
        PAK: "ASER", BGD: "NSA", NPL: "NASA", LKA: "NEREC", MEX: "PLANEA", COL: "Saber", PER: "ECE",
      };
      // illustrative learning stats (deterministic per node; scales with population & score)
      function learnStats(u, demo, iso, live) {
        const h = hashStr("learn:" + u.id);
        const students = Math.max(50, Math.round(demo.pop * 0.12));     // school-age, rough
        const active = students * (0.35 + u.perf * 0.5);
        const perDay = 2 + (h % 5) + u.perf * 3;                        // letters / active student / day
        const yest = live ? Math.round(active * perDay) : 0;
        const week = live ? Math.round(yest * (5 + (h % 3) * 0.3)) : 0;
        const month = live ? Math.round(week * 4.3) : 0;
        const year = live ? Math.round(month * (10 + (h % 3))) : 0;
        const band = (salt) => live ? Math.max(0, Math.min(100, Math.round(32 + u.perf * 58 + ((hashStr(salt + u.id)) % 13) - 6))) : 0;
        const natName = NAT_TEST[iso] || null;
        return { yest, week, month, year, acer: band("acer:"), nat: natName ? { name: natName, score: band("nat:") } : null };
      }

      // illustrative time-series + cost-effectiveness for a jurisdiction (deterministic per node).
      // months since PadhaiPal reached a parent on x; outcomes/outputs cumulative.
      function jurisStats(u, demo, iso, live) {
        // live=false -> PadhaiPal has no data here (no person/program); show the same metrics, zeroed.
        const h = hashStr("juris:" + u.id);
        const T = 12, months = Array.from({ length: T + 1 }, (_, i) => i);
        const cov = coverShare(u.id);
        const students0 = live ? Math.max(40, Math.round(demo.pop * 0.12 * (0.3 + cov * 0.7))) : 0;   // children in program
        // learning curves: rise with diminishing returns toward a score ceiling (zero when no data)
        const curve = (salt, lo, hi) => { if (!live) return months.map(() => 0); const b = lo + u.perf * 18, c = hi + u.perf * 30, tau = 4 + (hashStr(salt + u.id) % 4); return months.map((t) => Math.round(b + (c - b) * (1 - Math.exp(-t / tau)))); };
        const acer = curve("ac:", 28, 56);
        const natName = NAT_TEST[iso] || null;
        const nip = natName ? curve("nt:", 26, 54) : null;
        // cumulative outputs over time
        const students = months.map((t) => Math.round(students0 * (0.2 + 0.8 * (1 - Math.exp(-t / 3)))));
        const letters = months.map((t) => Math.round(students[t] * (3 + u.perf * 4) * t * (1 + t * 0.04)));
        const hours = months.map((t) => Math.round(students[t] * 1.4 * t));
        const acerTests = months.map((t) => Math.round(students[t] * 0.5 * (1 + Math.floor(t / 6))));
        const nipTests = natName ? months.map((t) => Math.round(students[t] * 0.45 * (1 + Math.floor(t / 6)))) : null;
        const perStuMo = 5 + (h % 5);                                   // $/student/month
        const spend = months.map((t) => Math.round(students[t] * perStuMo * t));   // ~ cumulative spend
        // cost to move a child +1 SD (SD ≈ 15 pts on these scales)
        const SD = 15, total = spend[T];
        const costSD = (arr) => { const g = (arr[T] - arr[0]) / SD; return g > 0 ? Math.round(total / (students[T] * g)) : null; };
        const spendNow = Math.round((spend[T] - spend[T - 1]) * 12);    // annualised run-rate
        const fundEnd = live ? MON[(h >>> 5) % 12] + " " + (2027 + (h % 3)) : "—";
        // counterfactual 2031–2050 impact, scaled from the WWHGE paper's global ratios
        // (per child reaching foundational literacy; base = 368M children → headline totals).
        const PER = { gdp: 196e12 / 368e6, tax: 21e12 / 368e6, lives: 12e6 / 368e6, marriages: 16e6 / 368e6, secondary: 423e6 / 368e6, employed: 49e6 / 368e6 };
        const proj = (k) => months.map((t) => Math.round(students[t] * PER[k]));
        const impact = { gdp: proj("gdp"), tax: proj("tax"), lives: proj("lives"), marriages: proj("marriages"), secondary: proj("secondary"), employed: proj("employed") };
        // budget fully committed & allocated to this location bucket (in the bank, not pledged).
        // 0.2–1.6 years of runway at the current burn -> a real spread of funded vs short.
        const bTot = Math.round(spendNow * (0.2 + (h % 140) / 100));
        const gov = 0.35 + ((h >>> 3) % 30) / 100, fam = 0.05 + ((h >>> 7) % 16) / 100, phil = Math.max(0.05, 1 - gov - fam);
        const budget = { total: bTot, gov: Math.round(bTot * gov), phil: Math.round(bTot * phil), fam: Math.round(bTot * fam) };
        // funding runway at linear usage; learners are only paused when funds fall short (none if 365+ days).
        const dailyBurn = spendNow / 365;
        const daysLeft = live && dailyBurn > 0 ? Math.round(bTot / dailyBurn) : 0;
        const shortfall = live ? Math.max(0, Math.min(1, 1 - daysLeft / 365)) : 0;
        const paused = Math.round(students[T] * (0.05 + (h % 21) / 100) * shortfall);
        const pausedImpact = { gdp: Math.round(paused * PER.gdp), tax: Math.round(paused * PER.tax), lives: Math.round(paused * PER.lives), marriages: Math.round(paused * PER.marriages), secondary: Math.round(paused * PER.secondary), employed: Math.round(paused * PER.employed) };
        // citizens petitioning the government to fund it (cumulative sign-ups over the year)
        const petitionCount = live ? Math.round(paused * (0.3 + (h % 40) / 100)) + 20 : 0;
        const petitionSignups = months.map((t) => Math.round(petitionCount * (1 - Math.exp(-t / 4))));
        return { months, acer, nip, natName, letters,
          outputs: { spend, students, hours, acerTests, nipTests, letters, ...impact },
          costAcerSD: costSD(acer), costNatSD: nip ? costSD(nip) : null, spendNow, total, fundEnd,
          budget, daysLeft, paused, pausedImpact, petitionCount, petitionSignups };
      }

      // tiny SVG charts (no deps). LineChart = one real-valued series; MultiChart = many, each self-normalised.
      function LineChart({ values, w, h, color, fmtY }) {
        const pl = 32, pr = 6, pt = 8, pb = 14, n = values.length;
        const iw = w - pl - pr, ih = h - pt - pb;
        let ymin = Math.min(...values), ymax = Math.max(...values); if (ymin === ymax) ymax = ymin + 1;
        const xOf = (i) => pl + (n <= 1 ? 0 : (i / (n - 1)) * iw);
        const yOf = (v) => pt + ih - ((v - ymin) / (ymax - ymin)) * ih;
        const pts = values.map((v, i) => [xOf(i), yOf(v)]);
        const line = pts.map((p) => p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
        const area = `M${xOf(0).toFixed(1)},${(pt + ih).toFixed(1)} ` + pts.map((p) => `L${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ") + ` L${xOf(n - 1).toFixed(1)},${(pt + ih).toFixed(1)} Z`;
        return (
          <svg width={w} height={h} className="block">
            <text x={2} y={pt + 6} fontSize="8" className="fill-zinc-400">{fmtY(ymax)}</text>
            <text x={2} y={pt + ih} fontSize="8" className="fill-zinc-400">{fmtY(ymin)}</text>
            <line x1={pl} y1={pt} x2={pl} y2={pt + ih} stroke="#e4e4e7" />
            <line x1={pl} y1={pt + ih} x2={pl + iw} y2={pt + ih} stroke="#e4e4e7" />
            <text x={pl} y={h - 3} fontSize="8" className="fill-zinc-400">0</text>
            <text x={pl + iw} y={h - 3} textAnchor="end" fontSize="8" className="fill-zinc-400">{n - 1}mo</text>
            <path d={area} fill={color} fillOpacity="0.12" />
            <polyline points={line} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" />
          </svg>
        );
      }
      function MultiChart({ series, w, h, highlight }) {
        const pl = 4, pr = 4, pt = 5, pb = 5, n = (series[0] && series[0].values.length) || 1;
        const iw = w - pl - pr, ih = h - pt - pb;
        const xOf = (i) => pl + (n <= 1 ? 0 : (i / (n - 1)) * iw);
        const ordered = highlight ? [...series.filter((s) => s.name !== highlight), ...series.filter((s) => s.name === highlight)] : series; // draw highlighted last (on top)
        return (
          <svg width={w} height={h} className="block">

              const mx = Math.max(...s.values, 1);

              return <polyline key={s.name} points={pts} fill="none" stroke={s.color} strokeWidth={on ? 3 : 1.6} strokeLinejoin="round" opacity={dim ? 0.15 : 0.9} />;
            })}
          </svg>
        );
      }
      function MiniPie({ parts, r }) {
        const sum = parts.reduce((s, p) => s + p.value, 0);

        return (
          <svg width={r * 2} height={r * 2} className="block flex-shrink-0">
            {sum <= 0
              ? <circle cx={r} cy={r} r={r} fill="#e4e4e7" />
              : parts.filter((p) => p.value > 0).map((p, i) => { const a1 = a + 2 * Math.PI * (p.value / sum); const d = (p.value / sum) >= 0.9995 ? null : wedgePath(r, r, r, a, a1); a = a1; return d ? <path key={i} d={d} fill={p.color} /> : <circle key={i} cx={r} cy={r} r={r} fill={p.color} />; })}
          </svg>
        );

      // citizen-petition page (voice + transcript per signer; deterministic demo)
      const PETITION_LINES = [

      function petitionSigners(seed, n) {

      const iso3Of = (p) => {
        const a = p.ISO_A3_EH, b = p.ISO_A3;
        if (a && a !== "-99") return a;
        if (b && b !== "-99") return b;
        return null;
      };

      const ZMIN = 0.5, ZMAX = 900;
      const clamp = (v, lo, hi) => (v < lo ? lo : v > hi ? hi : v);

      // =====================================================================
      //  Real schools (live, lazy): OpenStreetMap via Overpass per block bbox.
      //  Real lat/lon + name + public/private from OSM tags. Mirror fallback.
      // =====================================================================
      const OVERPASS = ["https://overpass-api.de/api/interpreter", "https://maps.mail.ru/osm/tools/overpass/api/interpreter"];
      function osmKind(t) {
        const ot = (t["operator:type"] || "").toLowerCase();
        if (/public|government|state|municipal/.test(ot)) return "public";
        if (/private|religious|community|ngo|charit|faith/.test(ot)) return "private";
        if (t.fee === "yes") return "private";
        if (t.fee === "no") return "public";
        return "unknown";
      }
      async function fetchOSMSchools(s, w, n, e) {
        const q = `[out:json][timeout:25];(node["amenity"="school"](${s},${w},${n},${e});way["amenity"="school"](${s},${w},${n},${e}););out center 1200 tags;`;
        for (const ep of OVERPASS) {
          try {
            const res = await fetch(ep, { method: "POST", body: q });
            if (!res.ok) continue;
            const j = await res.json();
            return (j.elements || []).map((el) => {
              const t = el.tags || {};
              const lat = el.lat != null ? el.lat : (el.center && el.center.lat);
              const lon = el.lon != null ? el.lon : (el.center && el.center.lon);
              if (lat == null || lon == null) return null;
              return { lat, lon, name: t.name || t["name:en"] || "School", kind: osmKind(t) };
            }).filter(Boolean);
          } catch (err) { /* try next mirror */ }
        }
        return "error";
      }

      // =====================================================================
      //  Messaging templates + token replacement
      // =====================================================================
      const TEMPLATES = [
        { id: "welcome", title: "Welcome / onboarding", tags: [], body: "Dear <name>,\n\nWelcome to the PadhaiPal network as <level> for <area>. We're glad to have you on board and look forward to supporting your work.\n\nWarm regards,\nOffice of the DGSE" },
        { id: "checkin", title: "Performance check-in", tags: ["report"], body: "Hi <name>,\n\nA quick check-in on <area>. Your current performance score is <score> (rank <rank>). Let's connect this week to discuss priorities.\n\nThanks,\nDGSE Office" },
        { id: "congrats", title: "Top-performer recognition", tags: ["image"], body: "Congratulations, <name>! 🎉\n\n<area> is among our top performers with a score of <score> (rank <rank>). Thank you for the outstanding leadership — keep it up!" },
        { id: "nudge", title: "Engagement nudge", tags: [], body: "Hello <name>,\n\nWe've noticed engagement in <area> has dipped recently. Could you share what support would help? We're here to assist." },
        { id: "monthly", title: "Monthly report summary", tags: ["image", "report"], body: "Dear <name>,\n\nMonthly summary for <area> (<level>):\n• Performance score: <score>\n• Rank: <rank>\n• Status: on track\n\nThe full dashboard is linked below." },
        { id: "escalation", title: "Action required", tags: ["report"], body: "Dear <name>,\n\n<area> needs attention: the current score (<score>, rank <rank>) is below target. Please review the attached report and respond within 3 working days." },
      ];
      function fillTemplate(body, r) {
        if (!r) return body || "";
        return (body || "")
          .replace(/<name>/g, r.uname || r.name || "there")
          .replace(/<area>/g, r.area || r.name || "your area")
          .replace(/<location>/g, r.location || "")
          .replace(/<level>/g, r.level || "")
          .replace(/<score>/g, r.score != null ? String(r.score) : "—")
          .replace(/<rank>/g, r.rank != null ? String(r.rank) : "—");
      }

      // =====================================================================
      //  Bottom bar graph — every entity ranked by score
      // =====================================================================
      function BarGraph({ entities, selectedIds, hoverId, onHover, onToggle, onAddRange }) {
        const bars = useMemo(() => [...entities].sort((a, b) => b.score - a.score), [entities]);
        const [drag, setDrag] = useState(null);
        const dragging = useRef(false);
        useEffect(() => {
          const up = () => {
            if (!dragging.current) return;
            dragging.current = false;
            setDrag((d) => {
              if (d) { const lo = Math.min(d.a, d.b), hi = Math.max(d.a, d.b); if (lo === hi) onToggle(bars[lo]); else onAddRange(bars.slice(lo, hi + 1)); }
              return null;
            });
          };
          window.addEventListener("mouseup", up);
          return () => window.removeEventListener("mouseup", up);
        }, [bars, onToggle, onAddRange]);

        const hovIdx = hoverId != null ? bars.findIndex((b) => b.id === hoverId) : -1;
        const hov = hovIdx >= 0 ? bars[hovIdx] : null;
        return (
          <div className="relative shrink-0 select-none border-t border-zinc-200 bg-white" style={{ height: 150 }} onMouseLeave={() => onHover(null)}>
            <div className="flex items-center justify-between px-3 py-1 text-[11px] text-zinc-500">
              <span>{bars.length} entities · ranked by score · click a bar to add to the send list · drag across bars to multi-select</span>
              <span className="text-zinc-400">hover a bar for details</span>
            </div>
            <div className="absolute inset-x-0 bottom-0 flex items-end gap-px px-2" style={{ top: 26 }}>
              {bars.map((e, i) => {
                const sel = selectedIds.has(e.id);
                const inDrag = drag && i >= Math.min(drag.a, drag.b) && i <= Math.max(drag.a, drag.b);
                return (
                  <div key={e.id} title={e.u.name}
                    onMouseEnter={() => { onHover(e.id); if (dragging.current) setDrag((d) => ({ a: d ? d.a : i, b: i })); }}
                    onMouseDown={(ev) => { ev.preventDefault(); dragging.current = true; setDrag({ a: i, b: i }); }}
                    className={"min-w-0 flex-1 cursor-pointer rounded-t-sm " + (sel ? "bar-sel" : "")}
                    style={{ height: Math.max(2, e.score) + "%", background: scoreColor(e.u.perf),
                      outline: sel || inDrag ? "2px solid #2563eb" : "none", outlineOffset: "-1px",
                      opacity: hovIdx >= 0 && i !== hovIdx ? 0.5 : 1 }} />
                );
              })}
            </div>
            {hov && (
              <div className="pointer-events-none absolute z-10 w-48 -translate-x-1/2 rounded-lg border border-zinc-200 bg-white p-2 shadow-xl"
                style={{ left: "max(96px, min(calc(100% - 96px), " + ((hovIdx + 0.5) / bars.length * 100) + "%))", bottom: 132 }}>
                <div className="flex items-center gap-2">
                  <img src={hov.u.face} alt="" className="h-8 w-8 rounded-full object-cover" />
                  <div className="min-w-0">
                    <div className="truncate text-xs font-semibold text-zinc-900">{hov.name}</div>
                    <div className="truncate text-[10px] text-zinc-500">{hov.sub}</div>
                  </div>
                  <span className="ml-auto rounded px-1 py-0.5 text-[10px] font-bold" style={{ background: scoreColor(hov.u.perf), color: textOn(hov.u.perf) }}>{hov.score}</span>
                </div>
                <div className="mt-1.5 grid grid-cols-2 gap-1 text-[10px] text-zinc-600">
                  <div>Rank <b>#{hov.rank}</b></div>
                  <div className="truncate">{hov.location}</div>
                  <div>{hov.level}</div>
                  <div className={selectedIds.has(hov.id) ? "font-semibold text-blue-600" : "text-zinc-400"}>{selectedIds.has(hov.id) ? "✓ in send list" : "click to add"}</div>

              </div>
            )}
          </div>
        );

      // =====================================================================

      function ComposePanel({ open, onToggle, entities, recipients, onAddMany, onRemove, onClear, savedTemplates, setSavedTemplates, savedFilters, setSavedFilters, ai, setAi, onSend, onGenerateReport, glow, embed, t = (s) => s }) {

        const allTemplates = useMemo(() => [...TEMPLATES, ...savedTemplates], [savedTemplates]);

        const results = useMemo(() => {

          return entities.filter((e) => {
            const m = e.u || {};
            if (q && !((e.u.name || "").toLowerCase().includes(q) || (e.name || "").toLowerCase().includes(q))) return false;
            if (filters.level !== "All" && e.level !== filters.level) return false;
            if (loc && !(e.location || "").toLowerCase().includes(loc)) return false;
            if (e.score < filters.scoreMin || e.score > filters.scoreMax) return false;
            if (filters.rankMax !== "" && e.rank > +filters.rankMax) return false;
            // --- metadata categories ---

                {tpl && tpl.tags && tpl.tags.length > 0 && (

                <button onClick={() => { if (!text.trim()) return; const n = savedTemplates.length + 1; setSavedTemplates([...savedTemplates, { id: "saved-" + n, title: "Saved " + n, tags: [], body: text }]); }}
                  className="mt-1.5 rounded border border-zinc-200 px-2 py-1 text-[11px] text-zinc-600 hover:bg-zinc-50">Save as template</button>
              </section>

              <section>
                <div className="mb-1 text-[11px] font-semibold uppercase tracking-wide text-zinc-400">{t("Find recipients")}</div>

                  <select value={filters.level} onChange={(e) => setFilters({ ...filters, level: e.target.value })} className={inp}>
                    {levels.map((l) => <option key={l} value={l}>{l === "All" ? t("Any level") : l}</option>)}

                    <option value="All">{t("Any language")}</option>

      // ===================================================================
      // Student detail card (demo) — mirrors a subset of the pp-dashboard
      // user/{id} page: summary metrics, letter scores over time, and a
      // recent-audio table (timestamp · audio · Sarvam transcript · answer).
      // All data is deterministic per student id (illustrative; no backend).
      // ===================================================================
      const DEVA = ["क","ख","ग","घ","च","ज","ट","ठ","त","थ","द","न","प","फ","ब","म","य","र","ल","व","स","ह","आ","इ","उ","ए","ओ"];

      // Deterministic demo transactions for the "live bank feed" (newest first)
      function bankTransactions(n) {
        const INC = ["Donation · Stripe", "Donation · UPI", "DAF grant", "Monthly donor", "Bank transfer"];
        const OUT = ["Airtime (WhatsApp BSP)", "Cloud hosting", "NGO field worker", "Team salaries", "ASER materials", "Payment fees"];
        const rows = [];
        for (let i = 0; i < n; i++) {
          const h = hashStr("tx:" + i), inc = h % 3 !== 0;
          const amt = inc ? (50 + (h % 4000)) : -(80 + ((h >> 3) % 6000));
          const desc = inc ? INC[h % INC.length] : OUT[(h >> 4) % OUT.length];
          const ts = NOW_MS - i * (6 * 3600e3 + (h % 60) * 60000);   // ~every 6h, descending
          rows.push({ id: i, desc, amt, ts, inc });
        }
        return rows;
      }

      //      Account Aggregator (Setu / Finvu) consent + FIP data pull, or the bank's
      //      own statement API. Store an encrypted access token server-side only.
      //   2. Backend: a small service polls (or receives Plaid `SYNC_UPDATES_AVAILABLE`

        async function fetchGB(iso, lvl) {
          const key = iso + "|" + lvl;
          if (gbCache.current.has(key)) return gbCache.current.get(key);
          let fc = null;
          try {
            const meta = await fetch(API + iso + "/" + lvl + "/").then((r) => (r.ok ? r.json() : null));
            let url = meta && (meta.simplifiedGeometryGeoJSON || meta.gjDownloadURL);
            // geoBoundaries geojson is git-LFS; github.com/raw 302-redirects to the LFS host,
            // which fails CORS in the browser. Rewrite straight to the (CORS-clean) media host.
            if (url) {
              url = url.replace("https://github.com/", "https://media.githubusercontent.com/media/").replace("/raw/", "/");
              fc = await fetch(url).then((r) => (r.ok ? r.json() : null));
            }
          } catch (e) { fc = null; }
          gbCache.current.set(key, fc || null);
          return fc || null;
        }

        // world projection (fit to all land except Antarctica), or country projection
        const worldFit = useMemo(() => {
          if (!worldGeo || worldGeo === "error") return null;

            if (!worldFit) return null;

            const proj = d3.geoOrthographic().rotate(globeRot).clipAngle(90).fitExtent(ext, { type: "Sphere" });
            return { proj, path: d3.geoPath(proj), globe: true };
          }
          if (!adm1FC || adm1FC === "error" || !adm1FC.features) return null;
          const proj = fitMercator(adm1FC.features, size.w, size.h, 10); // planar fit — geoBoundaries winding breaks fitExtent
          if (!proj) return null;
          return { proj, path: d3.geoPath(proj) };
        }, [isWorld, worldFit, adm1FC, size, globeRot]);

        const worldPaths = useMemo(() => {
          if (!projd || !isWorld || !worldGeo || worldGeo === "error") return null;
          const { path } = projd;
          return worldGeo.features.map((f, i) => {

        const roadmapOpen = openSecs.has("roadmap");
        // share of an area's population speaking a language PadhaiPal has built (Roadmap checklist) -> the coloured pie segment
        const teachBuilt = (pairs) => { let tot = 0, t = 0; for (const [l, s] of (pairs || [])) { tot += s; if (builtLangs.has(l)) t += s; } return tot > 0 ? t / tot : 0; };

        // ---- Roadmap flat-colour mode: per-country impact metric across unlocked countries ----
        const flatMetrics = useMemo(() => {
          if (!roadmapOpen || !worldPaths) return null;
          const CHILD_FRAC = 0.12, LIVES_PER_CHILD = 12e6 / 368e6, GDP_PER_CHILD = 196e12 / 368e6;
          const byIso = {};
          let lo = Infinity, hi = -Infinity;
          for (const p of worldPaths) {
            const pairs = langFor(p.iso, p.name).pairs;
            let reach = 0;
            for (const [lang, share] of pairs) if (builtLangs.has(lang)) reach += share;
            if (reach <= 0) { byIso[p.i] = { unlocked: false, v: null }; continue; }
            const pop = (p.iso && COUNTRY_POP[p.iso]) ? COUNTRY_POP[p.iso] : Math.max(1, Math.round(p.bbox ? 5e6 : 1e6) + (hashStr("pop:" + (p.iso || p.name)) % 40) * 1e6);
            const reachPop = pop * reach;
            const children = reachPop * CHILD_FRAC;
            const costPerChild = 40 + (hashStr("cost:" + (p.iso || p.name)) % 120);
            let v;
            if (impactMetric === "dalys") v = children * 0.5;
            else if (impactMetric === "lives") v = children * LIVES_PER_CHILD;
            else if (impactMetric === "gdp") v = children * GDP_PER_CHILD;
            else if (impactMetric === "cost_daly") v = costPerChild / 0.5;
            else v = costPerChild / LIVES_PER_CHILD; // cost_life
            byIso[p.i] = { unlocked: true, v };
            if (v < lo) lo = v; if (v > hi) hi = v;
          }
          const isCost = impactMetric === "cost_daly" || impactMetric === "cost_life";
          return { byIso, lo, hi, isCost };
        }, [worldPaths, builtLangs, impactMetric, roadmapOpen]);

        // colour a country under roadmap flat mode (green = better)
        const flatColorFor = (p) => {
          if (!flatMetrics) return "#d4d4d8";
          const m = flatMetrics.byIso[p.i];
          if (!m || !m.unlocked || m.v == null) return "#d4d4d8";
          const { lo, hi, isCost } = flatMetrics;
          let norm;
          if (hi === lo) norm = 1;
          else if (isCost) norm = 1 - (m.v - lo) / (hi - lo);
          else norm = m.v / hi;
          return scoreColor(clamp(norm, 0, 1));
        };

        // ---- ADM1 (DGSE) of the focused country ----
        const adm1 = useMemo(() => {
          if (isWorld || !projd || !country || !adm1FC || adm1FC === "error") return null;
          const { proj, path } = projd;
          return adm1FC.features.map((f, i) => {
            const rings = exteriorRings(f, proj);
            const ring = stripClose(largestRing(f, proj));
            const id = country.orgId + "." + i;
            const nm = f.properties.shapeName || ("Region " + (i + 1));
            return { i, id, feature: f, name: nm, d: ringsToPath(rings), c: centroidOf(ring), ring, rings, bbox: bboxOf(ring),
              u: node(id), demo: demoFor(f, country.iso, nm) };
          });
        }, [isWorld, projd, country, adm1FC]);

        // ---- ADM2 (BSA): children of the focused ADM1, nested by centroid containment ----
        const adm2 = useMemo(() => {
          if (!adm1 || a1Idx == null || !adm2FC || adm2FC === "error" || !projd) return null;
          const { proj, path } = projd;
          const parent = adm1[a1Idx]; if (!parent || parent.ring.length < 3) return null;
          // Nest by planar centroid-in-parent test (projected ring). NOT d3.geoContains:
          // geoBoundaries clockwise winding makes spherical containment match ~everything.
          const pr = parent.rings && parent.rings.length ? parent.rings : [parent.ring];
          const pbb = parent.bbox;
          const kids = adm2FC.features.map((f) => ({ f, ring: stripClose(largestRing(f, proj)) }))
            .filter((o) => o.ring.length >= 3 && bboxOverlap(bboxOf(o.ring), pbb) && inAnyRing(polyCentroid(o.ring), pr));
          return kids.map((o, j) => {
            const f = o.f, ring = o.ring, rings = exteriorRings(f, proj);
            const id = parent.id + "." + j;
            const nm = f.properties.shapeName || ("District " + (j + 1));
            return { j, id, feature: f, name: nm, d: ringsToPath(rings), c: centroidOf(ring), ring, rings, bbox: bboxOf(ring),
              u: node(id), demo: demoFor(f, country.iso, nm, false, parent.demo) };
          });
        }, [adm1, a1Idx, adm2FC, projd, country]);

        // ---- ADM3 (BEO / "block"): real ADM3 where the layer exists, else a synthesised
        //      Voronoi subdivision of the ADM2 polygon. This is the ADM3 fallback. ----
        const blocks = useMemo(() => {
          if (!adm2 || a2Idx == null || !projd) return null;
          const dst = adm2[a2Idx]; if (!dst) return null;
          const { proj, path } = projd;
          let real = [];
          if (adm3FC && adm3FC !== "error" && adm3FC.features && dst.ring.length >= 3) {
            const dr = dst.rings && dst.rings.length ? dst.rings : [dst.ring];
            const dbb = dst.bbox;
            real = adm3FC.features.map((f) => ({ f, ring: stripClose(largestRing(f, proj)) }))
              .filter((o) => o.ring.length >= 3 && bboxOverlap(bboxOf(o.ring), dbb) && inAnyRing(polyCentroid(o.ring), dr));
          }
          if (real.length) {
            return real.map((o, k) => {
              const f = o.f, ring = o.ring, rings = exteriorRings(f, proj);
              const id = dst.id + "." + k;
              const nm = f.properties.shapeName || ("Block " + (k + 1));
              return { k, id, u: node(id), name: nm, feature: f, ring, d: ringsToPath(rings), seed: centroidOf(ring), bbox: bboxOf(ring), synthetic: false,
                demo: demoFor(f, country.iso, nm, false, dst.demo) };
            });
          }
          // fallback: subdivide the ADM2 polygon into a plausible number of blocks
          if (!dst.ring || dst.ring.length < 3) return [];
          const n = 6 + (hashStr("nblk:" + dst.id) % 9);
          const seeds = sampleInside(dst.ring, n, hashStr("seed:" + dst.id));
          if (!seeds.length) return [];
          const [minx, miny, maxx, maxy] = dst.bbox;
          const vor = d3.Delaunay.from(seeds).voronoi([minx - 5, miny - 5, maxx + 5, maxy + 5]);
          return seeds.map((s, k) => {
            const id = dst.id + "." + k; const cell = vor.cellPolygon(k);
            const poly = cell ? clipPolygon(dst.ring, cell) : [];
            return { k, id, u: node(id), name: "Block " + (k + 1), ring: poly, d: poly.length >= 3 ? toPath(poly) : "", seed: s,
              bbox: bboxOf(poly.length ? poly : [s]), synthetic: true, demo: { pop: Math.round(dst.demo.pop / n), areaKm2: dst.demo.areaKm2 / n, langs: dst.demo.langs, pairs: dst.demo.pairs, real: dst.demo.real, phon: dst.demo.phon, teach: dst.demo.teach } };
          }).filter((b) => b.ring.length >= 3);
        }, [adm2, a2Idx, adm3FC, projd, country]);

        // ---- India real schools (UDISE 2021): map the block to its census district via the
        //      block centroid (projection-inverted to lon/lat), fetch schools/<st>-<dt>.json,
        //      then keep the points inside this block. 834k schools vs OSM's ~37k. ----
        useEffect(() => {
          if (level !== "schools" || a3Idx == null || !blocks || !blocks[a3Idx] || !projd || !projd.proj.invert || !country || country.iso !== "IND") return;
          const b = blocks[a3Idx], id = b.id;
          let cancelled = false;
          (async () => {
            if (!udiseRef.current.districts) {
              try {
                const g = await (await fetch("india-districts.geojson")).json();
                udiseRef.current.districts = g.features.map((f) => {
                  const polys = f.geometry.type === "Polygon" ? [f.geometry.coordinates] : f.geometry.coordinates;
                  const rings = polys.map((p) => p[0]);
                  let a = Infinity, bb = Infinity, c = -Infinity, d = -Infinity;
                  for (const r of rings) for (const pt of r) { if (pt[0] < a) a = pt[0]; if (pt[0] > c) c = pt[0]; if (pt[1] < bb) bb = pt[1]; if (pt[1] > d) d = pt[1]; }
                  return { key: f.properties.st + "-" + f.properties.dt, rings, bbox: [a, bb, c, d] };
                });
              } catch (e) { udiseRef.current.districts = []; }
            }
            if (cancelled) return;
            const ll = projd.proj.invert(b.seed);
            if (!ll || isNaN(ll[0])) { setUdise({ blockId: id, status: "error", points: [] }); return; }
            let key = null;
            for (const dst of udiseRef.current.districts) {
              const [a, bb, c, d] = dst.bbox;
              if (ll[0] < a || ll[0] > c || ll[1] < bb || ll[1] > d) continue;
              if (dst.rings.some((r) => pointInPoly(ll, r))) { key = dst.key; break; }
            }
            if (!key) { setUdise({ blockId: id, status: "error", points: [] }); return; }
            let file = udiseCache.current.get(key);
            if (!file) {
              try { file = await (await fetch("schools/" + key + ".json")).json(); udiseCache.current.set(key, file); }
              catch (e) { udiseCache.current.set(key, { n: [], c: [] }); setUdise({ blockId: id, status: "error", points: [] }); return; }
            }
            if (cancelled) return;
            const points = (file.c || []).map((c, i) => ({ lon: c[0], lat: c[1], name: (file.n && file.n[i]) || "School" }));
            setUdise({ blockId: id, status: "ok", points });
          })();
          return () => { cancelled = true; };
        }, [level, a3Idx, blocks, projd, country]);

        // ---- schools (Head Teacher): illustrative points inside the focused block ----
        // lazily fetch real OSM schools for the focused block (bbox via projection invert).
        // India uses the bundled UDISE data above; OSM is for everywhere else (optional overlay).
        useEffect(() => {
          if (level !== "schools" || a3Idx == null || !blocks || !blocks[a3Idx] || !projd || !projd.proj.invert || (country && country.iso === "IND")) return;
          const b = blocks[a3Idx], id = b.id;
          if (osmCache.current.has(id)) { const c = osmCache.current.get(id); setOsm({ id, status: c === "error" ? "error" : "ok", schools: c === "error" ? [] : c }); return; }
          const inv = projd.proj.invert;
          const [minx, miny, maxx, maxy] = b.bbox;
          const cs = [inv([minx, miny]), inv([maxx, miny]), inv([minx, maxy]), inv([maxx, maxy])].filter((p) => p && !isNaN(p[0]));
          if (cs.length < 2) return;
          let w = Infinity, e = -Infinity, s = Infinity, n = -Infinity;
          for (const c of cs) { if (c[0] < w) w = c[0]; if (c[0] > e) e = c[0]; if (c[1] < s) s = c[1]; if (c[1] > n) n = c[1]; }
          let cancelled = false;
          setOsm({ id, status: "loading", schools: [] });
          fetchOSMSchools(s, w, n, e).then((r) => {
            if (cancelled) return;
            if (r === "error") { osmCache.current.set(id, "error"); setOsm({ id, status: "error", schools: [] }); }
            else { osmCache.current.set(id, r); setOsm({ id, status: "ok", schools: r }); }
          });
          return () => { cancelled = true; };
        }, [level, a3Idx, blocks, projd]);

        const schools = useMemo(() => {
          if (!blocks || a3Idx == null || !blocks[a3Idx] || !projd) return null;
          const blk = blocks[a3Idx];
          const { proj } = projd;
          // India: real UDISE schools — project lon/lat, keep those inside this block
          if (udise && udise.blockId === blk.id && udise.status === "ok" && udise.points.length) {
            const real = [];
            for (const sc of udise.points) {
              const p = proj([sc.lon, sc.lat]);
              if (!p || isNaN(p[0]) || !pointInPoly(p, blk.ring)) continue;
              const id = blk.id + ".s" + real.length;
              real.push({ k: real.length, id, u: node(blk.id + "." + (real.length % 7)), p, name: sc.name, kind: "public", real: true });
            }
            if (real.length) return real;
          }
          // real OSM schools: project lon/lat, keep those inside this block (point-in-polygon)
          if (osm && osm.id === blk.id && osm.status === "ok" && osm.schools.length) {
            const real = [];
            for (const sc of osm.schools) {
              const p = proj([sc.lon, sc.lat]);
              if (!p || isNaN(p[0]) || !pointInPoly(p, blk.ring)) continue;
              const id = blk.id + ".s" + real.length;
              real.push({ k: real.length, id, u: node(blk.id + "." + (real.length % 7)), p, name: sc.name, kind: sc.kind, real: true });
            }
            if (real.length) return real;
          }
          // illustrative fallback — no OSM data, still loading, or none fell inside the block
          const m = 80 + (hashStr("sch:" + blk.id) % 70);
          return sampleInside(blk.ring, m, hashStr("schpts:" + blk.id)).map((p, k) => {
            const id = blk.id + ".s" + k;
            return { k, id, u: node(blk.id + "." + (k % 7)), p, name: "School " + (k + 1), kind: "unknown", real: false };
          });
        }, [blocks, a3Idx, projd, osm, udise]);

        // ---- one school (force graph) ----
        const school = useMemo(() => {
          if (!selHt || !d3) return null;
          const htU = node(selHt);
          const nodes = [{ id: selHt, u: htU, group: "ht", r: 15 }];
          const links = [];
          const teachers = baseChildCount(selHt);
          for (let t = 0; t < teachers; t++) {
            const tid = selHt + "." + t;
            nodes.push({ id: tid, u: node(tid), group: "teacher", r: 9 });
            links.push({ source: selHt, target: tid });
            const sc = baseChildCount(tid);
            for (let s = 0; s < sc; s++) {
              const sid = tid + "." + s;
              nodes.push({ id: sid, u: node(sid), group: "student", r: 5 });
              links.push({ source: tid, target: sid });
            }
          }
          const total = nodes.length;
          [...nodes].sort((a, b) => b.u.score - a.u.score).forEach((n, i) => { n.rank = i + 1; n.total = total; });
          const sim = d3.forceSimulation(nodes)
            // Connection length encodes the child's score: higher score → shorter link (sits closer
            // to its parent), lower score → longer link. Base ≥ parent+child collide radii so the
            // collide force never fights the link force.
            .force("link", d3.forceLink(links).id((d) => d.id).distance((l) => {
              const norm = (l.target.u.score || 0) / 100;
              const base = schoolUiR(l.source.group) + schoolUiR(l.target.group) + 6;
              const range = l.source.group === "ht" ? 70 : 55;
              return base + (1 - norm) * range;
            }).strength(0.6))
            .force("charge", d3.forceManyBody().strength(-90).distanceMax(500))
            // collide radius == rendered card footprint → node UI elements can't overlap
            .force("collide", d3.forceCollide().radius((d) => schoolUiR(d.group)).strength(1).iterations(4))
            .force("x", d3.forceX(0).strength(0.03)).force("y", d3.forceY(0).strength(0.03))
            .stop();
          for (let i = 0; i < 400; i++) sim.tick();
          let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
          for (const n of nodes) { if (n.x < minx) minx = n.x; if (n.x > maxx) maxx = n.x; if (n.y < miny) miny = n.y; if (n.y > maxy) maxy = n.y; }
          // pad by the card footprint so edge cards aren't clipped (face above, label box below)
          return { nodes, links, htU, bbox: [minx - 46, miny - 32, maxx + 46, maxy + 60],
            counts: { teachers, students: nodes.filter((n) => n.group === "student").length } };
        }, [selHt]);

        const frame = useCallback((bbox, pad) => {
          const [minx, miny, maxx, maxy] = bbox;
          const bw = Math.max(1, maxx - minx), bh = Math.max(1, maxy - miny);
          const k = clamp(Math.min(size.w / bw, size.h / bh) * (pad || 0.82), ZMIN, ZMAX);
          return { k, x: size.w / 2 - ((minx + maxx) / 2) * k, y: size.h / 2 - ((miny + maxy) / 2) * k };
        }, [size]);

        // --- drill handlers ---
        const pickCountry = useCallback(async (item) => {
          if (moved.current || !item.iso || busy) return;
          if (!item.covered) { setActive({ u: item.u || node("r." + (item.iso || "x")), title: item.name, sub: "No district (ADM2) boundary data", demo: demoFor(item.feature, item.iso, item.name) }); return; }
          setBusy(true);
          const a1 = await fetchGB(item.iso, "ADM1");
          if (!a1 || !a1.features || !a1.features.length) { setBusy(false); return; }
          const [a2, a3] = await Promise.all([fetchGB(item.iso, "ADM2"), fetchGB(item.iso, "ADM3")]);
          setCountry({ iso: item.iso, name: item.name, feature: item.feature, orgId: "r." + item.iso });
          setAdm1FC(a1); setAdm2FC(a2); setAdm3FC(a3);
          setA1Idx(null); setA2Idx(null); setA3Idx(null); setSelHt(null); setActive(null);
          setLevel("adm1"); setTf({ k: 1, x: 0, y: 0 });
          setBusy(false);
        }, [busy]);

        const drillA1 = useCallback((i) => { if (moved.current || !adm1 || !adm1[i]) return; setA1Idx(i); setA2Idx(null); setA3Idx(null); setSelHt(null); setActive(null); setLevel("adm2"); setTf(frame(adm1[i].bbox)); }, [adm1, frame]);
        const drillA2 = useCallback((j) => { if (moved.current || !adm2 || !adm2[j]) return; setA2Idx(j); setA3Idx(null); setSelHt(null); setActive(null); setLevel("adm3"); setTf(frame(adm2[j].bbox)); }, [adm2, frame]);
        const drillBlock = useCallback((k) => { if (moved.current || !blocks || !blocks[k]) return; setA3Idx(k); setActive(null); setLevel("schools"); setTf(frame(blocks[k].bbox)); }, [blocks, frame]);
        const drillSchool = useCallback((sc) => { if (moved.current) return; setSelHt(sc.u.id); setActive(null); setLevel("school"); }, []);

        const goLevel = useCallback((target) => {
          if (LEVEL_ORDER.indexOf(target) < LEVEL_ORDER.indexOf((ROLE_BY[role] || ROLE_BY.transparency).home)) return; // capped: can't zoom past the role's parent
          setActive(null);
          if (target === "world") { setLevel("world"); setCountry(null); setAdm1FC(null); setAdm2FC(null); setAdm3FC(null); setA1Idx(null); setA2Idx(null); setA3Idx(null); setSelHt(null); setTf({ k: 1, x: 0, y: 0 }); }
          else if (target === "adm1") { setLevel("adm1"); setA1Idx(null); setA2Idx(null); setA3Idx(null); setSelHt(null); setTf({ k: 1, x: 0, y: 0 }); }
          else if (target === "adm2") { setLevel("adm2"); setA2Idx(null); setA3Idx(null); setSelHt(null); if (adm1 && a1Idx != null && adm1[a1Idx]) setTf(frame(adm1[a1Idx].bbox)); }
          else if (target === "adm3") { setLevel("adm3"); setA3Idx(null); setSelHt(null); if (adm2 && a2Idx != null && adm2[a2Idx]) setTf(frame(adm2[a2Idx].bbox)); }
          else if (target === "schools") { setLevel("schools"); setSelHt(null); if (blocks && a3Idx != null && blocks[a3Idx]) setTf(frame(blocks[a3Idx].bbox)); }
        }, [adm1, a1Idx, adm2, a2Idx, blocks, a3Idx, frame, role]);

        const popUp = useCallback(() => {
          if (LEVEL_ORDER.indexOf(level) <= LEVEL_ORDER.indexOf((ROLE_BY[role] || ROLE_BY.transparency).home)) return; // capped at the role's home level
          if (level === "school") goLevel("schools");
          else if (level === "schools") goLevel("adm3");
          else if (level === "adm3") goLevel("adm2");
          else if (level === "adm2") goLevel("adm1");
          else if (level === "adm1") goLevel("world");
        }, [level, goLevel, role]);

        // on sign-in (role change), hard-reset the map nav; the auto-nav effect then drives to the home
        useEffect(() => {
          setLevel("world"); setCountry(null); setAdm1FC(null); setAdm2FC(null); setAdm3FC(null);
          setA1Idx(null); setA2Idx(null); setA3Idx(null); setSelHt(null); setActive(null); setPinned(false);
          setTf({ k: 1, x: 0, y: 0 });
        }, [role]);

        // auto-navigate toward the signed-in role's home (India → Uttar Pradesh → Lucknow → …).
        // Each step fires one drill; the resulting state change re-runs the effect for the next step.
        useEffect(() => {
          const nav = (ROLE_BY[role] || ROLE_BY.transparency).nav;
          if (!nav || !nav.iso || busy) return;                       // transparency or mid-fetch: nothing to do
          const byName = (arr, q) => { const i = arr.findIndex((x) => (x.name || "").toLowerCase().includes(q)); return i >= 0 ? i : 0; };
          if (!country || country.iso !== nav.iso) {
            if (worldPaths) { const it = worldPaths.find((p) => p.iso === nav.iso); if (it && it.covered) { moved.current = false; pickCountry(it); } }
            return;
          }
          if (nav.a1 == null) return;
          if (a1Idx == null) { if (adm1 && adm1.length) { moved.current = false; drillA1(byName(adm1, nav.a1)); } return; }
          if (nav.a2 == null) return;
          if (a2Idx == null) { if (adm2 && adm2.length) { moved.current = false; drillA2(byName(adm2, nav.a2)); } return; }
          if (nav.block == null) return;
          if (a3Idx == null) { if (blocks && blocks.length) { moved.current = false; drillBlock(Math.min(nav.block, blocks.length - 1)); } return; }
          if (nav.school == null) return;
          if (!selHt) { if (schools && schools.length) { moved.current = false; drillSchool(schools[Math.min(nav.school, schools.length - 1)]); } }
        }, [role, busy, worldPaths, country, adm1, a1Idx, adm2, a2Idx, blocks, a3Idx, schools, selHt]);

        useEffect(() => { if (level === "school" && school) setTf(frame(school.bbox)); }, [school, level, frame]);

        const onWheel = useCallback((e) => {
          e.preventDefault();
          const rect = e.currentTarget.getBoundingClientRect();
          const px = e.clientX - rect.left, py = e.clientY - rect.top;
          setTf((t) => { const k = clamp(t.k * (e.deltaY < 0 ? 1.12 : 1 / 1.12), ZMIN, ZMAX); const s = k / t.k; return { k, x: px - (px - t.x) * s, y: py - (py - t.y) * s }; });
        }, []);
        const globeMode = isWorld;
        const onPointerDown = useCallback((e) => { drag.current = globeMode ? { x: e.clientX, y: e.clientY, rot: globeRot, spin: true } : { x: e.clientX, y: e.clientY, tx: tf.x, ty: tf.y }; moved.current = false; }, [tf, globeMode, globeRot]);
        const onPointerMove = useCallback((e) => {
          if (!drag.current) return;
          const dx = e.clientX - drag.current.x, dy = e.clientY - drag.current.y;
          if (Math.abs(dx) + Math.abs(dy) > 4) moved.current = true;
          if (drag.current.spin) { const [l0, p0] = drag.current.rot; setGlobeRot([l0 + dx * 0.4, clamp(p0 - dy * 0.4, -89, 89)]); }
          else setTf((t) => ({ ...t, x: drag.current.tx + dx, y: drag.current.ty + dy }));
        }, []);
        const onPointerUp = useCallback(() => { drag.current = null; }, []);
        // empty-space click: if a card is pinned, first click just unpins; otherwise go up a level

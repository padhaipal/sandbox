                        const color = yKey === "letters" ? "#06b6d4" : yKey === "nat" ? "#8b5cf6" : "#2563eb";
                        const fmtY = yKey === "letters" ? fmtPop : ((v) => String(Math.round(v)));
                        const toggles = [["acer", "ACER"], js.natName && ["nat", js.natName], ["letters", "Letters"]].filter(Boolean);
                        const W = 320;
                        const outSeries = [
                          { name: "Spend", color: "#10b981", values: js.outputs.spend, fmt: fmtMoney },
                          { name: "ACER tests", color: "#2563eb", values: js.outputs.acerTests, fmt: fmtPop },
                          js.outputs.nipTests && { name: js.natName + " tests", color: "#8b5cf6", values: js.outputs.nipTests, fmt: fmtPop },
                          { name: "Students", color: "#f59e0b", values: js.outputs.students, fmt: fmtPop },
                          { name: "Lesson hrs", color: "#f43f5e", values: js.outputs.hours, fmt: fmtPop },
                          { name: "Letters", color: "#06b6d4", values: js.outputs.letters, fmt: fmtPop },
                          // counterfactual 2031–2050 impact (WWHGE paper, scaled to children reached)
                          { name: "GDP ↑ '50", color: "#65a30d", values: js.outputs.gdp, fmt: fmtMoney },
                          { name: "Tax rev ↑ '50", color: "#0d9488", values: js.outputs.tax, fmt: fmtMoney },
                          { name: "Lives saved", color: "#dc2626", values: js.outputs.lives, fmt: fmtPop },
                          { name: "Marriages averted", color: "#db2777", values: js.outputs.marriages, fmt: fmtPop },
                          { name: "→ secondary", color: "#4f46e5", values: js.outputs.secondary, fmt: fmtPop },
                          { name: "Youth employed", color: "#92400e", values: js.outputs.employed, fmt: fmtPop },
                        ].filter(Boolean);
                        return (
                          <React.Fragment>
                            <div className="rounded bg-zinc-50 px-2 py-1.5">
                              <div className="mb-1 flex items-center justify-between gap-2">
                                <span className="text-[10px] font-semibold text-zinc-500">Outcome vs months since PadhaiPal</span>
                                <span className="flex gap-0.5">
                                  {toggles.map(([k, lbl]) => (
                                    <button key={k} onClick={() => setChartY(k)} className={"rounded px-1.5 py-0.5 text-[9px] font-semibold " + (yKey === k ? "bg-zinc-900 text-white" : "bg-zinc-200 text-zinc-600 hover:bg-zinc-300")}>{lbl}</button>
                                  ))}
                                </span>
                              </div>
                              <LineChart values={curve} w={W} h={86} color={color} fmtY={fmtY} />
                            </div>
                            <div className="rounded bg-zinc-50 px-2 py-1.5">
                              <div className="mb-1 text-[10px] font-semibold text-zinc-500">Spend, outputs & 2050 impact <span className="font-normal text-zinc-400">(each scaled to its own max · hover a row)</span></div>
                              <MultiChart series={outSeries} w={W} h={74} highlight={legendHover} />
                              <div className="mt-1 grid grid-cols-2 gap-x-3 gap-y-0.5">
                                {outSeries.map((s) => (
                                  <div key={s.name} onMouseEnter={() => setLegendHover(s.name)} onMouseLeave={() => setLegendHover(null)}
                                    className={"flex cursor-default items-center gap-1 rounded text-[9px] " + (legendHover === s.name ? "bg-zinc-200" : legendHover ? "opacity-40" : "")}>
                                    <span className="inline-block h-2 w-2 flex-shrink-0 rounded-sm" style={{ background: s.color }} />
                                    <span className="truncate text-zinc-500">{s.name}</span>
                                    <span className="ml-auto font-semibold text-zinc-700">{s.fmt(s.values[s.values.length - 1])}</span>
                                  </div>
                                ))}
                              </div>
                              <div className="mt-1 text-[8px] text-zinc-400">2050 impact: counterfactual 2031–2050, scaled from WWHGE ($196T GDP / 368M children).</div>
                            </div>
                            <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Cost / +1 SD on ACER</span><span className="font-semibold">{js.costAcerSD != null ? fmtMoney(js.costAcerSD) + " / child" : "—"}</span></div>
                            {js.costNatSD != null && <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Cost / +1 SD on {js.natName}</span><span className="font-semibold">{fmtMoney(js.costNatSD)} / child</span></div>}
                            <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Current spend (annual)</span><span className="font-semibold">{fmtMoney(js.spendNow)}</span></div>
                            <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Funding ends</span><span className="font-semibold">{js.fundEnd} <span className="font-normal text-zinc-400">(reallocated)</span></span></div>
                          </React.Fragment>
                        );
                      })()}
                      <div className="text-[9px] text-zinc-400">Population: {active.greyed ? "national (demo)" : "modeled / area-disaggregated (demo)"}. Language: {active.demo.real ? "per-region (census)" : "country-level table — demo"}. Pie: % speaking a phonetic (≥{PHON_MIN}) script. Learning &amp; spend stats: illustrative.</div>
                    </div>
                  )}
                  {!active.demo && active.student && <StudentCard key={active.u.id} u={active.u} t={t} />}
                  {!active.demo && !active.student && (
                    <div className="mt-2 grid grid-cols-2 gap-1 text-[11px] text-zinc-600">
                      <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Students</span><span className="font-semibold">{Math.round(40 + active.u.perf * 160)}</span></div>
                      <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Active 7d</span><span className="font-semibold">{Math.round(active.u.perf * 100)}%</span></div>
                      <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Lessons</span><span className="font-semibold">{Math.round(200 + active.u.perf * 1400)}</span></div>
                      <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>{NAT_TEST[active.iso] || "ACER"} pass</span><span className="font-semibold">{active.u.score}%</span></div>
                    </div>
                  )}
                </div>
              ) : (
                <div className="rounded-lg border border-dashed border-zinc-200 bg-zinc-50 px-3 py-6 text-center text-[11px] text-zinc-400">{t("Hover a region on the map to see its details.")}</div>
        );

        // click-to-pin: hover previews the card (unless one is pinned); a single click on an area
        // pins it (set active + pinned); double-click or the card's "Drill in →" button drills in.
        const showHover = (payload) => { if (!pinned) setActive(payload); };

        // ---------------------------------------------------------------
        //  Donor "where your money goes" map — reuses the exact drill-down
        //  data + handlers as the educator (DGSE) map, but colours ONLY the
        //  funded path: India ▸ Uttar Pradesh ▸ Lucknow ▸ one block ▸ some
        //  of its schools. Everything else is greyed and non-interactive.
        //  Single click = info card; double click = drill into a coloured area.
        // ---------------------------------------------------------------
        const DON_GREY = "#d4d4d8";
        const CG_BAR = 50;          // $/DALY — Coefficient Giving's funding bar (the yellow end of the scale)
        const CHILD_FRAC = 0.12;    // rough school-age share of a population
        const DON_BLOCK = 0;        // the one funded block in Lucknow (Malihabad)
        const DON_SCHOOLS = 8;      // first N schools of that block are funded (coloured)
        const DON_TRIAL = 3;        // first N schools are live pilots currently trialing PadhaiPal
        const TRIAL = "#1d9edf", TRIAL_SEL = "#0b5d8f";   // distinct colour for trialing schools
        const isUP = (n) => /uttar pradesh/i.test(n || "");
        const isLko = (n) => /lucknow/i.test(n || "");
        // deterministic, cost-effective $/DALY for a funded area (deeper targeting => cheaper)
        const cpdOf = (id, bias) => clamp(10 + (hashStr("cpd:" + id) % 30) - bias, 5, CG_BAR);
        // green (most cost-effective) -> yellow ($50/DALY, the Coefficient Giving bar)
        const ceColor = (cpd) => d3.interpolateRgb("#15803d", "#eab308")(clamp(cpd / CG_BAR, 0, 1));
        // selected = a deeper, more saturated version of the area's own cost-effectiveness colour
        const ceColorSel = (cpd) => { const h = d3.hsl(ceColor(cpd)); h.s = Math.min(1, h.s + 0.35); h.l = Math.max(0, h.l - 0.14); return h + ""; };
        // build a tail "… - <a2f> - <a1f> - India" for the current breadcrumb
        const donTail = () => [a2f && a2f.name, a1f && a1f.name, "India"].filter(Boolean).join(" - ");
        const donateTarget = donateSel ? donateSel.label : "most needed";
        const donateMap = (() => {
          // a funded (coloured) area: green→yellow by cost-effectiveness, or brand-blue when selected
          const areaProps = (id, cpd, payload, drill) => {
            const sel = donateSel && donateSel.id === id;
            return {
              fill: sel ? ceColorSel(cpd) : ceColor(cpd), stroke: sel ? "#0f172a" : "#ffffff", strokeWidth: (sel ? 1.6 : 0.8) / tf.k,
              style: { cursor: "pointer" },
              // single click selects; a second click on the same area within 400ms drills in
              // (manual detection — the spinnable globe perturbs the native dblclick event)
              onClick: (e) => {
                e.stopPropagation();
                if (moved.current) return;
                const now = Date.now(), prev = donateClick.current;
                if (drill && prev && prev.id === id && now - prev.t < 400) { donateClick.current = null; moved.current = false; drill(); }
                else { donateClick.current = { id, t: now }; setDonateSel(payload); }
              },
            };
          };
          const greyProps = { fill: DON_GREY, stroke: "#ffffff", strokeWidth: 0.8 / tf.k, style: { cursor: "default" } };
          // spin the globe by dragging — only at the world level (orthographic rotate)
          const onSpinDown = (e) => { if (!isWorld) return; drag.current = { x: e.clientX, y: e.clientY, rot: globeRot }; moved.current = false; };
          const onSpinMove = (e) => { if (!drag.current || !isWorld) return; const dx = e.clientX - drag.current.x, dy = e.clientY - drag.current.y; if (Math.abs(dx) + Math.abs(dy) > 3) moved.current = true; const [l0, p0] = drag.current.rot; setGlobeRot([l0 + dx * 0.4, clamp(p0 - dy * 0.4, -89, 89)]); };
          const onSpinUp = () => { drag.current = null; };
          const spin = isWorld ? { onMouseDown: onSpinDown, onMouseMove: onSpinMove, onMouseUp: onSpinUp, onMouseLeave: onSpinUp } : {};
          // popping up a level re-selects the area you were inside (school → block → district → state → India)
          const donateUpSel = () => {
            if (level === "schools" && blk) return { id: blk.id, title: blk.name, sub: "Block · BEO", label: blk.name + " - " + donTail(), demo: blk.demo, cpd: cpdOf(blk.id, 22) };
            if (level === "adm3" && a2f && a1f) return { id: a2f.id, title: a2f.name, sub: "District · BSA", label: a2f.name + " - " + a1f.name + " - India", demo: a2f.demo, cpd: cpdOf(a2f.id, 16) };
            if (level === "adm2" && a1f) return { id: a1f.id, title: a1f.name, sub: "State · DGSE region", label: a1f.name + " - India", demo: a1f.demo, cpd: cpdOf(a1f.id, 8) };
            if (level === "adm1" && country) return { id: "don.IND", title: country.name, sub: "Country · where PadhaiPal runs today", label: "India", demo: demoFor(country.feature, country.iso, country.name, true), cpd: cpdOf("don.IND", 0) };
            return null;   // world
          };
          const donatePopUp = () => { const s = donateUpSel(); popUp(); setDonateSel(s); };
          return (
            <div className="overflow-hidden rounded-xl border border-zinc-200 bg-[#eaf0f6]">
              <div className="relative h-[440px] w-full">
                {!ready ? (
                  <div className="flex h-full items-center justify-center text-sm text-zinc-400">Loading world map…</div>
                ) : (
                  <svg viewBox={`0 0 ${size.w} ${size.h}`} className="block h-full w-full touch-none select-none"
                    style={{ cursor: isWorld ? "grab" : "default" }} {...spin}
                    onClick={() => { if (LEVEL_ORDER.indexOf(level) > 0 && !moved.current) donatePopUp(); }}>
                    <g transform={`translate(${tf.x},${tf.y}) scale(${tf.k})`} style={{ transition: drag.current ? "none" : "transform .35s ease" }}>
                      {projd && projd.globe && <path d={projd.path({ type: "Sphere" })} fill="#dbeafe" stroke="#93c5fd" strokeWidth={1.2 / tf.k} />}
                      {projd && projd.globe && <path d={projd.path(d3.geoGraticule10())} fill="none" stroke="#93c5fd" strokeWidth={0.5 / tf.k} opacity={0.6} pointerEvents="none" />}

                      {level === "world" && worldPaths && worldPaths.map((p) => {
                        if (p.iso !== "IND") return <path key={p.i} d={p.d} {...greyProps} />;
                        const id = "don.IND", cpd = cpdOf(id, 0);
                        const payload = { id, title: p.name, sub: "Country · where PadhaiPal runs today", label: "India", demo: demoFor(p.feature, p.iso, p.name, true), cpd };
                        return <path key={p.i} d={p.d} {...areaProps(id, cpd, payload, () => pickCountry({ iso: p.iso, name: p.name, feature: p.feature, covered: true }))} />;
                      })}
                      {level === "adm1" && adm1 && adm1.map((d0) => {
                        if (!isUP(d0.name)) return <path key={d0.id} d={d0.d} {...greyProps} />;
                        const cpd = cpdOf(d0.id, 8);
                        const payload = { id: d0.id, title: d0.name, sub: "State · DGSE region", label: d0.name + " - India", demo: d0.demo, cpd };
                        return <path key={d0.id} d={d0.d} {...areaProps(d0.id, cpd, payload, () => drillA1(d0.i))} />;
                      })}
                      {level === "adm2" && adm2 && adm2.map((d0) => {
                        if (!isLko(d0.name)) return <path key={d0.id} d={d0.d} {...greyProps} />;
                        const cpd = cpdOf(d0.id, 16);
                        const payload = { id: d0.id, title: d0.name, sub: "District · BSA", label: d0.name + " - " + donTail(), demo: d0.demo, cpd };
                        return <path key={d0.id} d={d0.d} {...areaProps(d0.id, cpd, payload, () => drillA2(d0.j))} />;
                      })}
                      {level === "adm3" && blocks && blocks.map((b) => {
                        if (b.k !== DON_BLOCK) return <path key={b.id} d={b.d} {...greyProps} />;
                        const cpd = cpdOf(b.id, 22);
                        const payload = { id: b.id, title: b.name, sub: "Block · BEO", label: b.name + " - " + donTail(), demo: b.demo, cpd };
                        return <path key={b.id} d={b.d} {...areaProps(b.id, cpd, payload, () => drillBlock(b.k))} />;
                      })}
                      {level === "schools" && blk && <path d={blk.d} fill="#ffffff" fillOpacity="0.5" stroke="#0f172a" strokeWidth={1.4 / tf.k} pointerEvents="none" />}
                      {level === "schools" && schools && schools.map((sc) => {
                        const trial = sc.k < DON_TRIAL;
                        if (sc.k >= DON_SCHOOLS && !trial) return <circle key={sc.id} cx={sc.p[0]} cy={sc.p[1]} r={5 / tf.k} fill={DON_GREY} stroke="#ffffff" strokeWidth={1 / tf.k} />;
                        const sel = donateSel && donateSel.id === sc.id, cpd = cpdOf(sc.id, 28);
                        const fill = trial ? (sel ? TRIAL_SEL : TRIAL) : (sel ? ceColorSel(cpd) : ceColor(cpd));
                        const payload = { id: sc.id, title: sc.name, sub: trial ? "Currently trialing PadhaiPal" : "Government school", label: sc.name + " - " + blk.name + " - " + donTail(), demo: null, cpd };
                        return (
                          <g key={sc.id}>
                            {trial && <circle cx={sc.p[0]} cy={sc.p[1]} r={(sel ? 13 : 11) / tf.k} fill={TRIAL} opacity="0.25" pointerEvents="none" />}
                            <circle cx={sc.p[0]} cy={sc.p[1]} r={(sel ? 9 : trial ? 7.5 : 6) / tf.k}
                              fill={fill} stroke={sel ? "#0f172a" : "#ffffff"} strokeWidth={(sel ? 1.8 : 1.2) / tf.k}
                              style={{ cursor: "pointer" }} onClick={(e) => { e.stopPropagation(); setDonateSel(payload); }} />
                          </g>
                        );
                      })}
                    </g>
                  </svg>
                )}
                {busy && <div className="pointer-events-none absolute left-1/2 top-3 -translate-x-1/2 rounded-full bg-zinc-900/85 px-4 py-1.5 text-[12px] font-medium text-white shadow-lg">Loading boundaries…</div>}
                {isWorld && ready && <div className="pointer-events-none absolute left-1/2 top-3 -translate-x-1/2 rounded-full bg-white/85 px-3 py-1 text-[11px] font-medium text-zinc-600 shadow">drag to spin the globe · double-click India to drill in</div>}
                {LEVEL_ORDER.indexOf(level) > 0 && (
                  <button onClick={() => donatePopUp()} className="absolute left-3 top-3 rounded-md border border-zinc-300 bg-white px-2.5 py-1 text-[11px] font-semibold text-zinc-700 shadow hover:bg-zinc-50">↑ Up a level</button>
                )}
                {donateSel && (() => {
                  const d = donateSel.demo, cpd = donateSel.cpd, kids = d ? d.pop * CHILD_FRAC : null;
                  return (
                    <div className="absolute right-3 top-3 w-72 rounded-lg border border-zinc-200 bg-white p-3 shadow-lg">
                      <div className="flex items-start justify-between gap-2">
                        <div>
                          <div className="text-sm font-bold text-zinc-900">{donateSel.title}</div>
                          <div className="text-[11px] font-medium text-zinc-500">{donateSel.sub}</div>
                        </div>
                        <button onClick={() => setDonateSel(null)} className="-mt-1 text-zinc-400 hover:text-zinc-700">✕</button>
                      </div>
                      {d && (
                        <dl className="mt-2 grid grid-cols-2 gap-x-3 gap-y-1.5 text-[11px]">
                          <div><dt className="text-zinc-400">Population</dt><dd className="font-semibold text-zinc-800">{fmtPop(d.pop)}</dd></div>
                          <div><dt className="text-zinc-400">School-age kids</dt><dd className="font-semibold text-zinc-800">{fmtPop(kids)}</dd></div>
                          <div><dt className="text-zinc-400">Area</dt><dd className="font-semibold text-zinc-800">{fmtArea(d.areaKm2)}</dd></div>
                          <div><dt className="text-zinc-400">Adult literacy</dt><dd className="font-semibold text-zinc-800">{d.lit != null ? Math.round(d.lit * 100) + "%" : "—"}</dd></div>
                          <div className="col-span-2"><dt className="text-zinc-400">Main languages</dt><dd className="font-semibold text-zinc-800">{(d.langs || []).slice(0, 3).join(", ") || "—"}</dd></div>
                          <div className="col-span-2"><dt className="text-zinc-400">Speaks a script PadhaiPal can teach</dt><dd className="font-semibold text-zinc-800">{Math.round((d.phon || 0) * 100)}%</dd></div>
                        </dl>
                      )}
                      <div className="mt-2 border-t border-zinc-100 pt-2">
                        <div className="flex items-center justify-between text-[11px]">
                          <span className="text-zinc-400">Cost-effectiveness</span>
                          <span className="font-bold" style={{ color: ceColor(cpd) }}>${Math.round(cpd)}/DALY</span>
                        </div>
                        <div className="relative mt-1 h-2 w-full rounded-full" style={{ background: "linear-gradient(90deg,#15803d,#eab308)" }}>
                          <div className="absolute top-1/2 h-3 w-3 -translate-x-1/2 -translate-y-1/2 rounded-full border-2 border-white shadow" style={{ left: clamp(cpd / CG_BAR, 0, 1) * 100 + "%", background: ceColor(cpd) }} />
                        </div>
                        <div className="mt-0.5 flex justify-between text-[9px] text-zinc-400"><span>more cost-effective</span><span>$50/DALY bar</span></div>
                      </div>
                    </div>
                  );
                })()}
                <div className="absolute bottom-3 left-3 rounded-lg border border-zinc-200 bg-white/95 px-2.5 py-1.5 text-[10px] text-zinc-600 shadow">
                  <div className="mb-1 font-semibold text-zinc-700">Cost-effectiveness ($/DALY)</div>
                  <div className="flex items-center gap-1.5">
                    <span className="text-[9px] text-zinc-400">best</span>
                    <span className="h-2.5 w-20 rounded-sm" style={{ background: "linear-gradient(90deg,#15803d,#eab308)" }} />
                    <span className="text-[9px] text-zinc-400">$50 bar</span>
                  </div>
                  <div className="mt-1 flex items-center gap-1.5"><span className="h-2.5 w-2.5 rounded-full ring-2 ring-offset-0" style={{ background: TRIAL, boxShadow: "0 0 0 3px " + TRIAL + "40" }} /> Trialing PadhaiPal now</div>
                  <div className="mt-1 flex items-center gap-1.5"><span className="h-2.5 w-2.5 rounded-sm" style={{ background: DON_GREY }} /> Not funded yet</div>
                </div>
              </div>
            </div>
          );
        })();

        return (
          <div className="relative flex h-full flex-col">
            {role === "transparency" ? (
              <DonorDashboard t={t} worldGeo={worldGeo} donateMap={donateMap} donateTarget={donateTarget}
                onDonate={(earmark) => setFund({ title: earmark ? "PadhaiPal · " + earmark : "PadhaiPal — global programme", id: "donor", earmark: earmark || null })} />
            ) : (
            <React.Fragment>
            <header className="flex flex-wrap items-center gap-x-6 gap-y-2 border-b border-zinc-200 bg-white px-6 py-3">
              <div>
                <h1 className="flex flex-wrap items-center gap-1.5 text-lg font-semibold text-zinc-900">
                  {(() => {
                    const crumbs = [];
                    if (capIdx <= 0) crumbs.push({ k: "world", label: t("World"), lvl: "world" });
                    if (capIdx <= 1 && country) crumbs.push({ k: "c", label: country.name, lvl: "adm1" });
                    if (capIdx <= 2 && a1f) crumbs.push({ k: "a1", label: a1f.name, lvl: "adm2" });
                    if (capIdx <= 3 && a2f) crumbs.push({ k: "a2", label: a2f.name, lvl: "adm3" });
                    if (capIdx <= 4 && blk) crumbs.push({ k: "blk", label: blk.name, lvl: "schools" });
                    if (level === "school") crumbs.push({ k: "school", label: t("School"), lvl: "school" });
                    return crumbs.map((c, i) => (
                      <React.Fragment key={c.k}>
                        {i > 0 && <span className="text-zinc-300">›</span>}
                        {level !== c.lvl
                          ? <button onClick={() => goLevel(c.lvl)} className="text-blue-600 hover:underline">{c.label}</button>
                          : <span className="text-zinc-900">{c.label}</span>}
                      </React.Fragment>
                    ));
                  })()}
                </h1>
                <p className="text-xs text-zinc-500"><span className="font-semibold text-zinc-700">Signed in: {roleCfg.who} · {roleCfg.where}</span> · {bannerText}</p>
              </div>
              <div className="ml-auto flex items-center gap-2 text-xs text-zinc-500">
                <select value={uiLang} onChange={(e) => setUiLang(e.target.value)} title="Language / भाषा"
                  className="rounded-md border border-zinc-200 px-2 py-1 font-semibold text-zinc-700 hover:bg-zinc-50">
                  {UI_LANGS.map((l) => <option key={l.code} value={l.code}>{l.label}</option>)}
                </select>
                <span>score</span><span>0</span>
                <span className="h-2 w-28 rounded" style={{ background: "linear-gradient(to right,#ef4444,#eab308,#22c55e)" }} />
                <span>100</span>
                <button onClick={() => setTf(level === "school" && school ? frame(school.bbox) : level === "schools" && blk ? frame(blk.bbox) : level === "adm3" && a2f ? frame(a2f.bbox) : level === "adm2" && a1f ? frame(a1f.bbox) : { k: 1, x: 0, y: 0 })}
                  className="ml-2 rounded-md border border-zinc-200 px-2 py-1 font-semibold text-zinc-600 hover:bg-zinc-50">{t("Reset")}</button>
                <button onClick={genReport} className="rounded-md border border-zinc-200 px-2 py-1 font-semibold text-zinc-600 hover:bg-zinc-50">⤓ {t("Report")}</button>
                <button onClick={() => toggleSec("compose")} className="rounded-md bg-blue-600 px-2.5 py-1 font-semibold text-white hover:bg-blue-700">
                  ✉ {t("Compose")}{sendList.size ? <span className="ml-1 rounded-full bg-white/25 px-1.5">{sendList.size}</span> : null}
                </button>
              </div>
            </header>

            <div ref={wrapRef} className="relative min-h-0 flex-1 overflow-hidden bg-[#eaf0f6]">
              {!ready ? (
                <div className="flex h-full items-center justify-center text-sm text-zinc-400">
                  {loadFailed ? "Could not load the world map — check your connection (boundaries are fetched live)." : "Loading world map…"}
                </div>
              ) : (
                <svg width={size.w} height={size.h} className="block touch-none select-none"
                  onWheel={onWheel} onPointerDown={onPointerDown} onPointerMove={onPointerMove}
                  onPointerUp={onPointerUp} onPointerLeave={onPointerUp} onClick={onBgClick}
                  style={{ cursor: drag.current ? "grabbing" : "grab" }}>
                  <g transform={`translate(${tf.x},${tf.y}) scale(${tf.k})`} style={gStyle}>

                    {/* globe: ocean sphere + graticule */}
                    {projd && projd.globe && <path d={projd.path({ type: "Sphere" })} fill="#dbeafe" stroke="#93c5fd" strokeWidth={1.2 / tf.k} />}
                    {projd && projd.globe && <path d={projd.path(d3.geoGraticule10())} fill="none" stroke="#93c5fd" strokeWidth={0.5 / tf.k} opacity={0.6} pointerEvents="none" />}

                    {/* WORLD: every country */}
                    {level === "world" && worldPaths && worldPaths.map((p) => {
                      const on = active && p.u && active.u.id === p.u.id;
                      const payload = p.u ? { u: p.u, title: p.name, sub: p.covered ? "National Director · " + p.u.name : "No district (ADM2) data", demo: demoFor(p.feature, p.iso, p.name, true), greyed: !p.covered, iso: p.iso, drill: p.covered ? () => pickCountry(p) : null } : null;
                      const hov = () => payload && showHover(payload);
                      const pin = (e) => { e.stopPropagation(); if (payload) { setActive(payload); setPinned(true); } };
                      const onDbl = (e) => { e.stopPropagation(); pickCountry(p); };
                      if (roadmapOpen) {
                        // flat-colour analytics mode: single fill encoding the selected metric, no pies / no plus buttons
                        return (
                          <path key={p.i} d={p.d} data-iso={p.iso || ""} data-name={p.name} fill={flatColorFor(p)} fillOpacity={1}
                            stroke={on ? "#0f172a" : "#ffffff"} strokeWidth={(on ? 1.1 : 0.3) / tf.k}
                            style={{ cursor: p.covered ? "pointer" : "default" }} onMouseEnter={hov} onClick={pin} onDoubleClick={onDbl} />
                        );
                      }
                      if (!p.covered) {
                        return (
                          <path key={p.i} d={p.d} data-iso={p.iso || ""} data-name={p.name} fill={NONPHON} fillOpacity={1}

                      return (
                        <g key={p.i}>
                          {areaPie(p.iso || p.i, p.u.id, p.d, p.c, cornerRadius(p.c, p.bbox), p.phon, p.u.perf, teachBuilt(p.pairs))}

                            stroke={on ? "#0f172a" : "#ffffff"} strokeWidth={(on ? 1.1 : 0.3) / tf.k}
                            style={{ cursor: "pointer" }} onMouseEnter={hov} onClick={pin} onDoubleClick={onDbl} />
                        </g>

                    {/* ADM1 */}
                    {level === "adm1" && adm1 && adm1.map((d0) => (

                        <path d={d0.d} fill="none" pointerEvents="all"
                          stroke={active && active.u.id === d0.id ? "#0f172a" : "#ffffff"} strokeWidth={(active && active.u.id === d0.id ? 1.6 : 0.6) / tf.k}
                          style={{ cursor: "pointer" }}
                          onMouseEnter={() => showHover({ u: d0.u, title: d0.name, sub: "DGSE · " + d0.u.name, demo: d0.demo, iso: country.iso, drill: () => drillA1(d0.i) })}
                          onClick={(e) => { e.stopPropagation(); setActive({ u: d0.u, title: d0.name, sub: "DGSE · " + d0.u.name, demo: d0.demo, iso: country.iso, drill: () => drillA1(d0.i) }); setPinned(true); }}
                          onDoubleClick={(e) => { e.stopPropagation(); drillA1(d0.i); }} />
                      </g>
                    ))}

                    {/* ADM2 */}
                    {level === "adm2" && adm2 && adm2.map((d0) => (
                      <g key={d0.id}>
                        {areaPie(d0.id, d0.id, d0.d, d0.c, cornerRadius(d0.c, d0.bbox), d0.demo.phon, d0.u.perf, teachBuilt(d0.demo.pairs))}
                        <path d={d0.d} fill="none" pointerEvents="all"
                          stroke={active && active.u.id === d0.id ? "#0f172a" : "#ffffff"} strokeWidth={(active && active.u.id === d0.id ? 1.6 : 0.6) / tf.k}
                          style={{ cursor: "pointer" }}
                          onMouseEnter={() => showHover({ u: d0.u, title: d0.name, sub: "BSA · " + d0.u.name, demo: d0.demo, iso: country.iso, drill: () => drillA2(d0.j) })}
                          onClick={(e) => { e.stopPropagation(); setActive({ u: d0.u, title: d0.name, sub: "BSA · " + d0.u.name, demo: d0.demo, iso: country.iso, drill: () => drillA2(d0.j) }); setPinned(true); }}
                          onDoubleClick={(e) => { e.stopPropagation(); drillA2(d0.j); }} />
                      </g>
                    ))}

                    {/* ADM3 / blocks */}
                    {level === "adm3" && blocks && blocks.map((b) => (

                          stroke={active && active.u.id === b.id ? "#0f172a" : "#ffffff"} strokeWidth={(active && active.u.id === b.id ? 2 : 1) / tf.k}

                          onClick={(e) => { e.stopPropagation(); setActive({ u: b.u, title: b.name + (a2f ? " · " + a2f.name : ""), sub: "BEO · " + b.u.name, demo: b.demo, iso: country.iso, drill: () => drillBlock(b.k) }); setPinned(true); }}
                          onDoubleClick={(e) => { e.stopPropagation(); drillBlock(b.k); }} />
                      </g>
                    ))}

                    {/* invite "+" buttons — rendered last so they sit above every area fill */}
                    {level === "world" && !roadmapOpen && worldPaths && worldPaths.map((p) => (p.covered && isDimmed(p.u.id, p.phon)
                      ? <PlusButton key={"plus" + p.i} c={p.c} k={tf.k} geo="country" pending={pendingInvites.get(p.u.id)} onClick={() => openInvite({ id: p.u.id, title: p.name, role: "National Director", geo: "country" })} /> : null))}

                      ? <PlusButton key={"plus" + d0.id} c={polyCentroid(d0.ring)} k={tf.k} geo="region" pending={pendingInvites.get(d0.id)} onClick={() => openInvite({ id: d0.id, title: d0.name, role: "DGSE", geo: "region" })} /> : null))}
                    {level === "adm2" && adm2 && adm2.map((d0) => (isDimmed(d0.id, d0.demo.phon)
                      ? <PlusButton key={"plus" + d0.id} c={polyCentroid(d0.ring)} k={tf.k} geo="district" pending={pendingInvites.get(d0.id)} onClick={() => openInvite({ id: d0.id, title: d0.name, role: "BSA", geo: "district" })} /> : null))}
                    {level === "adm3" && blocks && blocks.map((b) => (isDimmed(b.id, b.demo.phon)
                      ? <PlusButton key={"plus" + b.id} c={polyCentroid(b.ring)} k={tf.k} geo="block" pending={pendingInvites.get(b.id)} onClick={() => openInvite({ id: b.id, title: b.name, role: "BEO", geo: "block" })} /> : null))}

                    {/* schools */}
                    {level === "schools" && blk && (
                      <path d={blk.d} fill="#ffffff" fillOpacity="0.5" stroke="#0f172a" strokeWidth={1.4 / tf.k}
                        style={{ cursor: "default" }} onClick={(e) => e.stopPropagation()} />
                    )}
                    {level === "schools" && schools && schools.map((sc) => (
                      <circle key={sc.id} cx={sc.p[0]} cy={sc.p[1]} r={(active && active.u.id === sc.id ? 9 : 6) / tf.k}
                        fill={scoreColor(sc.u.perf)} stroke="#ffffff" strokeWidth={1.2 / tf.k} style={{ cursor: "pointer" }}
                        onMouseEnter={() => showHover({ u: sc.u, title: sc.name, sub: (sc.kind && sc.kind !== "unknown" ? sc.kind[0].toUpperCase() + sc.kind.slice(1) + " school · " : "") + "Head Teacher · " + sc.u.name, drill: () => drillSchool(sc) })}
                        onClick={(e) => { e.stopPropagation(); setActive({ u: sc.u, title: sc.name, sub: (sc.kind && sc.kind !== "unknown" ? sc.kind[0].toUpperCase() + sc.kind.slice(1) + " school · " : "") + "Head Teacher · " + sc.u.name, drill: () => drillSchool(sc) }); setPinned(true); }}
                        onDoubleClick={(e) => { e.stopPropagation(); drillSchool(sc); }} />
                    ))}

                    {/* school force graph */}
                    {level === "school" && school && (
                      <g>
                        {school.links.map((l, idx) => (
                          <line key={"l" + idx} x1={l.source.x} y1={l.source.y} x2={l.target.x} y2={l.target.y}
                            stroke="#cbd5e1" strokeWidth={(l.source.group === "ht" ? 1.6 : 0.8) / tf.k} />
                        ))}
                        {school.nodes.map((n) => {
                          const on = active && active.u.id === n.id;
                          const faceR = schoolFaceR(n.group);
                          const ring = n.group === "ht" ? 4 : 3;          // slightly thicker picture border
                          const W = SCHOOL_CARD_W, lbl = n.group === "ht" ? "HT" : n.group === "teacher" ? "Tchr" : "Std";
                          const nm = n.u.name.length > 14 ? n.u.name.slice(0, 13) + "…" : n.u.name;
                          const title = n.group === "ht" ? "Head Teacher" : n.group === "teacher" ? "Teacher" : "Student";
                          const col = scoreColor(n.u.perf);
                          // world-anchored (no 1/tf.k counter-scale): the layout collide radius == this
                          // footprint, so cards can't overlap; they zoom with the map.
                          return (
                            <foreignObject key={n.id} x={n.x - W / 2} y={n.y - faceR - ring} width={W} height={faceR * 2 + 44} style={{ overflow: "visible", pointerEvents: "none" }}>
                              <div style={{ width: W }} className="flex flex-col items-center"
                                onMouseEnter={() => { if (!pinned) setActive({ u: n.u, title, sub: n.u.name, student: n.group === "student" }); }}
                                onClick={(e) => { e.stopPropagation(); setActive({ u: n.u, title, sub: n.u.name, student: n.group === "student" }); setPinned(true); }}>
                                <img src={n.u.face} alt="" loading="lazy" className="relative rounded-full object-cover brightness-110"
                                  style={{ width: faceR * 2, height: faceR * 2, zIndex: 2, boxShadow: "0 0 0 " + ring + "px " + col, outline: on ? "2px solid #0f172a" : "none", cursor: "pointer", pointerEvents: "auto" }} />
                                {/* picture circle overlaps the label box — pull the box up under the face */}
                                <div className="max-w-full rounded px-1.5 pb-0.5 text-center leading-tight shadow-sm"
                                  style={{ position: "relative", zIndex: 1, marginTop: -faceR * 0.42, paddingTop: faceR * 0.42 + 2, background: col, color: textOn(n.u.perf), pointerEvents: "auto" }}>
                                  <div className="truncate font-semibold" style={{ fontSize: 10 }}>{nm}</div>
                                  <div style={{ fontSize: 9, opacity: 0.9 }}>{lbl} · {n.u.score} · #{n.rank}/{n.total}</div>
                                </div>
                              </div>
                            </foreignObject>
                          );
                        })}
                      </g>
                    )}

                    {/* hover glow from the bar graph */}
                    {hoverId && (() => {
                      const e = entities.find((x) => x.id === hoverId);
                      if (!e || !e.anchor) return null;
                      return (
                        <g pointerEvents="none">
                          {e.pathD && <path d={e.pathD} fill="none" stroke="#2563eb" strokeWidth={4 / tf.k} className="glowpulse" />}
                          <circle cx={e.anchor[0]} cy={e.anchor[1]} r={(e.dot ? 13 : 18) / tf.k} fill="none" stroke="#2563eb" strokeWidth={3 / tf.k} className="glowpulse" />
                        </g>
                      );
                    })()}

                  </g>
                </svg>
              )}

              {busy && (
                <div className="pointer-events-none absolute left-1/2 top-4 z-20 -translate-x-1/2 rounded-full bg-zinc-900/85 px-4 py-1.5 text-[12px] font-medium text-white shadow-lg">
                  Loading boundaries from geoBoundaries…
                </div>
              )}

              {/* unified left accordion sidebar: Area · Roadmap · Compose · Legend */}
              <aside className="absolute left-0 top-0 bottom-0 z-30 w-[360px] flex flex-col overflow-y-auto border-r border-zinc-200 bg-white shadow-xl"
                onClick={(e) => e.stopPropagation()} onPointerDown={(e) => e.stopPropagation()} onWheel={(e) => e.stopPropagation()}>
                {(() => {
                  // plain helper (not a component) so hover-driven re-renders don't remount the compose inputs
                  const section = (id, title, badge, children) => {
                    const open = openSecs.has(id);
                    return (
                      <div key={id} className="border-b border-zinc-200">
                        <button onClick={() => toggleSec(id)}
                          className="flex w-full items-center gap-2 px-3 py-2.5 text-left hover:bg-zinc-50">
                          <span className={"text-[11px] text-zinc-400 transition-transform " + (open ? "rotate-90" : "")}>▸</span>
                          <span className="text-sm font-semibold text-zinc-900">{title}</span>
                          {badge != null && <span className="ml-auto rounded-full bg-blue-100 px-2 py-0.5 text-[10px] font-semibold text-blue-700">{badge}</span>}
                        </button>
                        {open && <div className="px-3 pb-3">{children}</div>}
                      </div>
                    );
                  };
                  return (
                    <React.Fragment>
                      {section("area", t("Area"), null, areaBody)}

                      {section("roadmap", t("Roadmap"), builtLangs.size, (
                        <React.Fragment>
                        <p className="mb-2 text-[11px] leading-snug text-zinc-500">Languages PadhaiPal could build. Selecting one unlocks every country with speakers of it.</p>
                        <ol className="space-y-1">
                          {ROADMAP_LANGS.map((lang, idx) => {
                            const on = builtLangs.has(lang);
                            return (
                              <li key={lang}>
                                <label className="flex cursor-pointer items-center gap-2 rounded px-1.5 py-1 text-[12px] hover:bg-zinc-50">
                                  <span className="w-4 flex-shrink-0 text-right text-[10px] font-semibold text-zinc-400">{idx + 1}.</span>
                                  <input type="checkbox" checked={on}
                                    onChange={() => setBuiltLangs((s) => { const n = new Set(s); n.has(lang) ? n.delete(lang) : n.add(lang); if (n.size === 0) n.add("Hindi"); return n; })} />
                                  <span className={on ? "font-semibold text-emerald-700" : "text-zinc-700"}>{lang}</span>
                                  {lang === "Hindi" && <span className="ml-auto rounded bg-emerald-50 px-1.5 py-0.5 text-[9px] font-semibold text-emerald-600">live</span>}
                                </label>
                              </li>
                            );
                          })}
                        </ol>
                        <div className="mt-3 space-y-1.5">
                          <div className="text-[10px] font-semibold uppercase tracking-wide text-zinc-400">Raw impact</div>
                          <div className="flex flex-wrap gap-1">
                            {IMPACT_METRICS.filter((m) => m.group === "raw").map((m) => (
                              <button key={m.id} onClick={() => setImpactMetric(m.id)}
                                className={"rounded-full border px-2 py-1 text-[10px] font-semibold " + (impactMetric === m.id ? "border-blue-500 bg-blue-50 text-blue-700" : "border-zinc-200 text-zinc-600 hover:bg-zinc-50")}>{m.label}</button>
                            ))}
                          </div>
                          <div className="text-[10px] font-semibold uppercase tracking-wide text-zinc-400">Cost-effectiveness</div>
                          <div className="flex flex-wrap gap-1">
                            {IMPACT_METRICS.filter((m) => m.group === "cost").map((m) => (
                              <button key={m.id} onClick={() => setImpactMetric(m.id)}
                                className={"rounded-full border px-2 py-1 text-[10px] font-semibold " + (impactMetric === m.id ? "border-blue-500 bg-blue-50 text-blue-700" : "border-zinc-200 text-zinc-600 hover:bg-zinc-50")}>{m.label}</button>
                            ))}
                          </div>
                        </div>
                        <p className="mt-2 text-[10px] leading-snug text-zinc-400">Map is coloured by this metric across unlocked countries. {flatMetrics && flatMetrics.isCost ? "Lower = greener (more cost-effective)." : "Higher = greener."}</p>
                      </React.Fragment>
                      ))}

                      {section("compose", t("Compose"), sendList.size || null, (
                        <ComposePanel embed open={true} onToggle={() => setComposeOpen((v) => !v)} entities={entities}
                          recipients={[...sendList.values()]} onAddMany={addEntities} onRemove={removeSend} onClear={clearSend}
                          savedTemplates={savedTemplates} setSavedTemplates={setSavedTemplates} savedFilters={savedFilters} setSavedFilters={setSavedFilters}
                          ai={ai} setAi={setAi} onSend={onSend} onGenerateReport={genReport} glow={composeGlow} t={t} />
                      ))}

                    </React.Fragment>
                  );
                })()}
              </aside>

              {LEVEL_ORDER.indexOf(level) > capIdx && (
                <div className="pointer-events-none absolute bottom-3 left-1/2 -translate-x-1/2 rounded-full bg-zinc-900/80 px-3 py-1 text-[11px] font-medium text-white">
                  {t("click empty space to go up one level")}
                </div>
              )}

              {/* bottom-right: zoom buttons immediately to the left of the legend */}
              <div className="pointer-events-none absolute bottom-4 right-4 z-30 flex items-end gap-2">
                <div className="pointer-events-auto flex flex-col overflow-hidden rounded-lg border border-zinc-300 bg-white shadow-md">
                  <button onClick={() => zoomBy(1.5)} title="Zoom in" className="flex h-9 w-9 items-center justify-center text-xl font-semibold text-zinc-700 hover:bg-zinc-100">+</button>
                  <div className="h-px bg-zinc-200" />
                  <button onClick={() => zoomBy(1 / 1.5)} title="Zoom out" className="flex h-9 w-9 items-center justify-center text-xl font-semibold text-zinc-700 hover:bg-zinc-100">−</button>
                </div>
                <div className="w-64 rounded-xl border border-zinc-200 bg-white/95 p-3 text-[11px] leading-tight text-zinc-700 shadow-lg">
                  <div className="mb-1.5 font-semibold text-zinc-900">Each area is a pie of its population</div>
                  <div className="space-y-1">
                    <div className="flex items-center gap-2">
                      <span className="h-3 w-5 flex-shrink-0 rounded-sm" style={{ background: "linear-gradient(90deg,#ef4444,#eab308,#22c55e)" }} />
                      <span>Speaks a language we've built <span className="text-zinc-400">(colour = avg score)</span></span>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="h-3 w-5 flex-shrink-0 rounded-sm" style={{ background: UNCOVERED }} />
                      <span>Speaks a language on our roadmap</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="h-3 w-5 flex-shrink-0 rounded-sm" style={{ background: NONPHON }} />
                      <span>Speaks a language beyond our method (or no data)</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="relative h-3 w-5 flex-shrink-0 overflow-hidden rounded-sm" style={{ background: "#22c55e" }}>
                        <span className="absolute inset-0" style={{ background: UNCOVERED, opacity: 0.62 }} />
                      </span>
                      <span>Dimmed = node not registered in PadhaiPal</span>
                    </div>
                  </div>
                  <div className="mt-1.5 text-[9px] text-zinc-400">Border clips each pie · tick languages in the Roadmap section to colour more countries · demo data</div>
                </div>
              </div>

              {toast && (
                <div className="absolute bottom-4 right-16 z-40 max-w-xs rounded-lg bg-zinc-900 px-4 py-2 text-xs font-medium text-white shadow-xl">{toast}</div>
              )}

              {invite && <InviteModal key={invite.id} data={invite} initial={pendingInvites.get(invite.id) || null} onClose={() => setInvite(null)} onSent={(person) => recordInvite(invite.id, person)} />}
              {petition && <PetitionPage title={petition.title} count={petition.count} signups={petition.signups} onClose={() => setPetition(null)} />}
            </div>

            <BarGraph entities={entities} selectedIds={selectedIds} hoverId={hoverId}
              onHover={setHoverId} onToggle={toggleSend} onAddRange={addEntities} />
            </React.Fragment>
            )}
            {/* Fund / Donate modal — shared by the map's "Fund this location" and the donor's Donate CTA */}
            {fund && <FundModal data={fund} onClose={() => setFund(null)} />}
          </div>
        );
      }

      return WorldMap;
    })();

    // #####################################################################
    // ## Top-level shell: a toggle that switches between the two views.   ##
    // ## The two graphs above stay fully independent (separate IIFEs).    ##
    // #####################################################################
    function Root() {
      const [role, setRole] = useState("transparency");   // signed-in role (lifted so the toggle lives in the top bar)
      return (
        <div className="flex h-full flex-col">
          <div className="flex items-center gap-3 border-b border-zinc-800 bg-zinc-900 px-4 py-2">
            <span className="text-xs font-semibold text-white">PadhaiPal · Educator Network</span>
            <label className="ml-auto flex items-center gap-1.5 text-[11px] font-medium text-zinc-400">
              Signed in as
              <select value={role} onChange={(e) => setRole(e.target.value)} title="Switch dashboard / signed-in role"
                className="rounded-md border border-zinc-700 bg-zinc-800 px-2 py-1 text-[11px] font-semibold text-white hover:bg-zinc-700 focus:outline-none">
                {ROLES.map((r) => <option key={r.code} value={r.code} className="bg-zinc-800 text-white">{r.label}</option>)}
              </select>
            </label>
          </div>
          <div className="relative min-h-0 flex-1">
            <WorldMapApp role={role} setRole={setRole} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>

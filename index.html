      // =====================================================================
      //  The map app
      // =====================================================================
      function WorldMap() {
        const wrapRef = useRef(null);
        const [size, setSize] = useState({ w: 1000, h: 640 });
        const [worldGeo, setWorldGeo] = useState(null);     // null | "error" | FeatureCollection
        const [coverage, setCoverage] = useState(null);     // Set<ISO3> with ADM2 data
        const gbCache = useRef(new Map());                  // "ISO|ADMx" -> FeatureCollection | null
        const [busy, setBusy] = useState(false);

        const [level, setLevel] = useState("world");        // world | adm1 | adm2 | adm3 | schools | school
        const [country, setCountry] = useState(null);       // { iso, name, feature, orgId }
        const [adm1FC, setAdm1FC] = useState(null);
        const [adm2FC, setAdm2FC] = useState(null);
        const [adm3FC, setAdm3FC] = useState(null);         // FeatureCollection | null (no ADM3 layer)
        const [a1Idx, setA1Idx] = useState(null);
        const [a2Idx, setA2Idx] = useState(null);
        const [a3Idx, setA3Idx] = useState(null);
        const [selHt, setSelHt] = useState(null);
        const [active, setActive] = useState(null);         // { u, title, sub, demo }
        const [tf, setTf] = useState({ k: 1, x: 0, y: 0 });
        const drag = useRef(null);
        const moved = useRef(false);
        const [osm, setOsm] = useState(null);        // { id, status:"loading"|"ok"|"error", schools:[{lat,lon,name,kind}] }
        const osmCache = useRef(new Map());          // block id -> array | "error"

        // --- one-time loads: world countries + ADM2 coverage list ---
        useEffect(() => {
          fetch(WORLD_URL).then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(setWorldGeo).catch(() => setWorldGeo("error"));
          fetch(API + "ALL/ADM2/").then((r) => (r.ok ? r.json() : null))
            .then((arr) => { if (Array.isArray(arr)) setCoverage(new Set(arr.map((x) => x.boundaryISO))); })
            .catch(() => setCoverage(new Set()));
        }, []);

        useEffect(() => {
          const el = wrapRef.current; if (!el) return;
          const measure = () => { const r = el.getBoundingClientRect(); setSize({ w: Math.max(320, r.width), h: Math.max(320, r.height) }); };
          measure();
          const ro = new ResizeObserver(measure); ro.observe(el);
          return () => ro.disconnect();
        }, []);

        async function fetchGB(iso, lvl) {
          const key = iso + "|" + lvl;
          if (gbCache.current.has(key)) return gbCache.current.get(key);
          let fc = null;
          try {
            const meta = await fetch(API + iso + "/" + lvl + "/").then((r) => (r.ok ? r.json() : null));
            let url = meta && (meta.simplifiedGeometryGeoJSON || meta.gjDownloadURL);
            // geoBoundaries geojson is git-LFS; github.com/raw 302-redirects to the LFS host,
            // which fails CORS in the browser. Rewrite straight to the (CORS-clean) media host.
            if (url) {
              url = url.replace("https://github.com/", "https://media.githubusercontent.com/media/").replace("/raw/", "/");
              fc = await fetch(url).then((r) => (r.ok ? r.json() : null));
            }
          } catch (e) { fc = null; }
          gbCache.current.set(key, fc || null);
          return fc || null;
        }

        // world projection (fit to all land except Antarctica), or country projection
        const worldFit = useMemo(() => {
          if (!worldGeo || worldGeo === "error") return null;
          return { type: "FeatureCollection", features: worldGeo.features.filter((f) => f.properties.ADMIN !== "Antarctica") };
        }, [worldGeo]);

        const isWorld = level === "world";
        const projd = useMemo(() => {
          if (!d3 || !size) return null;
          if (isWorld) {
            if (!worldFit) return null;
            const proj = d3.geoNaturalEarth1().fitExtent([[6, 6], [size.w - 6, size.h - 6]], worldFit); // Natural Earth data is well-wound
            return { proj, path: d3.geoPath(proj) };
          }
          if (!adm1FC || adm1FC === "error" || !adm1FC.features) return null;
          const proj = fitMercator(adm1FC.features, size.w, size.h, 10); // planar fit — geoBoundaries winding breaks fitExtent
          if (!proj) return null;
          return { proj, path: d3.geoPath(proj) };
        }, [isWorld, worldFit, adm1FC, size]);

        // ---- WORLD level: every country, coloured by its national score (grey = no ADM2 data) ----
        const worldPaths = useMemo(() => {
          if (!projd || !isWorld || !worldGeo || worldGeo === "error") return null;
          const { path } = projd;
          return worldGeo.features.map((f, i) => {
            if (f.properties.ADMIN === "Antarctica") return null;
            const iso = iso3Of(f.properties);
            const covered = !!(iso && coverage && coverage.has(iso));
            const u = iso ? node("r." + iso) : null;
            return { i, iso, covered, name: f.properties.ADMIN, feature: f, d: path(f), c: path.centroid(f), bbox: path.bounds(f), phon: langFor(iso, f.properties.ADMIN).phon, u };
          }).filter(Boolean);
        }, [projd, isWorld, worldGeo, coverage]);

        // ---- ADM1 (DGSE) of the focused country ----
        const adm1 = useMemo(() => {
          if (isWorld || !projd || !country || !adm1FC || adm1FC === "error") return null;
          const { proj, path } = projd;
          return adm1FC.features.map((f, i) => {
            const rings = exteriorRings(f, proj);
            const ring = stripClose(largestRing(f, proj));
            const id = country.orgId + "." + i;
            const nm = f.properties.shapeName || ("Region " + (i + 1));
            return { i, id, feature: f, name: nm, d: ringsToPath(rings), c: centroidOf(ring), ring, rings, bbox: bboxOf(ring),
              u: node(id), demo: demoFor(f, country.iso, nm) };
          });
        }, [isWorld, projd, country, adm1FC]);

        // ---- ADM2 (BSA): children of the focused ADM1, nested by centroid containment ----
        const adm2 = useMemo(() => {
          if (!adm1 || a1Idx == null || !adm2FC || adm2FC === "error" || !projd) return null;
          const { proj, path } = projd;
          const parent = adm1[a1Idx]; if (!parent || parent.ring.length < 3) return null;
          // Nest by planar centroid-in-parent test (projected ring). NOT d3.geoContains:
          // geoBoundaries clockwise winding makes spherical containment match ~everything.
          const pr = parent.rings && parent.rings.length ? parent.rings : [parent.ring];
          const kids = adm2FC.features.map((f) => ({ f, ring: stripClose(largestRing(f, proj)) }))
            .filter((o) => o.ring.length >= 3 && inAnyRing(centroidOf(o.ring), pr));
          return kids.map((o, j) => {
            const f = o.f, ring = o.ring, rings = exteriorRings(f, proj);
            const id = parent.id + "." + j;
            const nm = f.properties.shapeName || ("District " + (j + 1));
            return { j, id, feature: f, name: nm, d: ringsToPath(rings), c: centroidOf(ring), ring, rings, bbox: bboxOf(ring),
              u: node(id), demo: demoFor(f, country.iso, nm) };
          });
        }, [adm1, a1Idx, adm2FC, projd, country]);

        // ---- ADM3 (BEO / "block"): real ADM3 where the layer exists, else a synthesised
        //      Voronoi subdivision of the ADM2 polygon. This is the ADM3 fallback. ----
        const blocks = useMemo(() => {
          if (!adm2 || a2Idx == null || !projd) return null;
          const dst = adm2[a2Idx]; if (!dst) return null;
          const { proj, path } = projd;
          let real = [];
          if (adm3FC && adm3FC !== "error" && adm3FC.features && dst.ring.length >= 3) {
            const dr = dst.rings && dst.rings.length ? dst.rings : [dst.ring];
            real = adm3FC.features.map((f) => ({ f, ring: stripClose(largestRing(f, proj)) }))
              .filter((o) => o.ring.length >= 3 && inAnyRing(centroidOf(o.ring), dr));
          }
          if (real.length) {
            return real.map((o, k) => {
              const f = o.f, ring = o.ring, rings = exteriorRings(f, proj);
              const id = dst.id + "." + k;
              const nm = f.properties.shapeName || ("Block " + (k + 1));
              return { k, id, u: node(id), name: nm, feature: f, ring, d: ringsToPath(rings), seed: centroidOf(ring), bbox: bboxOf(ring), synthetic: false,
                demo: demoFor(f, country.iso, nm) };
            });
          }
          // fallback: subdivide the ADM2 polygon into a plausible number of blocks
          if (!dst.ring || dst.ring.length < 3) return [];
          const n = 6 + (hashStr("nblk:" + dst.id) % 9);
          const seeds = sampleInside(dst.ring, n, hashStr("seed:" + dst.id));
          if (!seeds.length) return [];
          const [minx, miny, maxx, maxy] = dst.bbox;
          const vor = d3.Delaunay.from(seeds).voronoi([minx - 5, miny - 5, maxx + 5, maxy + 5]);
          return seeds.map((s, k) => {
            const id = dst.id + "." + k; const cell = vor.cellPolygon(k);
            const poly = cell ? clipPolygon(dst.ring, cell) : [];
            return { k, id, u: node(id), name: "Block " + (k + 1), ring: poly, d: poly.length >= 3 ? toPath(poly) : "", seed: s,
              bbox: bboxOf(poly.length ? poly : [s]), synthetic: true, demo: { pop: Math.round(dst.demo.pop / n), areaKm2: dst.demo.areaKm2 / n, langs: dst.demo.langs, pairs: dst.demo.pairs, real: dst.demo.real, phon: dst.demo.phon } };
          }).filter((b) => b.ring.length >= 3);
        }, [adm2, a2Idx, adm3FC, projd, country]);

        // ---- schools (Head Teacher): illustrative points inside the focused block ----
        // lazily fetch real OSM schools for the focused block (bbox via projection invert)
        useEffect(() => {
          if (level !== "schools" || a3Idx == null || !blocks || !blocks[a3Idx] || !projd || !projd.proj.invert) return;
          const b = blocks[a3Idx], id = b.id;
          if (osmCache.current.has(id)) { const c = osmCache.current.get(id); setOsm({ id, status: c === "error" ? "error" : "ok", schools: c === "error" ? [] : c }); return; }
          const inv = projd.proj.invert;
          const [minx, miny, maxx, maxy] = b.bbox;
          const cs = [inv([minx, miny]), inv([maxx, miny]), inv([minx, maxy]), inv([maxx, maxy])].filter((p) => p && !isNaN(p[0]));
          if (cs.length < 2) return;
          let w = Infinity, e = -Infinity, s = Infinity, n = -Infinity;
          for (const c of cs) { if (c[0] < w) w = c[0]; if (c[0] > e) e = c[0]; if (c[1] < s) s = c[1]; if (c[1] > n) n = c[1]; }
          let cancelled = false;
          setOsm({ id, status: "loading", schools: [] });
          fetchOSMSchools(s, w, n, e).then((r) => {
            if (cancelled) return;
            if (r === "error") { osmCache.current.set(id, "error"); setOsm({ id, status: "error", schools: [] }); }
            else { osmCache.current.set(id, r); setOsm({ id, status: "ok", schools: r }); }
          });
          return () => { cancelled = true; };
        }, [level, a3Idx, blocks, projd]);

        const schools = useMemo(() => {
          if (!blocks || a3Idx == null || !blocks[a3Idx] || !projd) return null;
          const blk = blocks[a3Idx];
          const { proj } = projd;
          // real OSM schools: project lon/lat, keep those inside this block (point-in-polygon)
          if (osm && osm.id === blk.id && osm.status === "ok" && osm.schools.length) {
            const real = [];
            for (const sc of osm.schools) {
              const p = proj([sc.lon, sc.lat]);
              if (!p || isNaN(p[0]) || !pointInPoly(p, blk.ring)) continue;
              const id = blk.id + ".s" + real.length;
              real.push({ k: real.length, id, u: node(blk.id + "." + (real.length % 7)), p, name: sc.name, kind: sc.kind, real: true });
            }
            if (real.length) return real;
          }
          // illustrative fallback — no OSM data, still loading, or none fell inside the block
          const m = 80 + (hashStr("sch:" + blk.id) % 70);
          return sampleInside(blk.ring, m, hashStr("schpts:" + blk.id)).map((p, k) => {
            const id = blk.id + ".s" + k;
            return { k, id, u: node(blk.id + "." + (k % 7)), p, name: "School " + (k + 1), kind: "unknown", real: false };
          });
        }, [blocks, a3Idx, projd, osm]);

        // ---- one school (force graph) ----
        const school = useMemo(() => {
          if (!selHt || !d3) return null;
          const htU = node(selHt);
          const nodes = [{ id: selHt, u: htU, group: "ht", r: 15 }];
          const links = [];
          const teachers = baseChildCount(selHt);
          for (let t = 0; t < teachers; t++) {
            const tid = selHt + "." + t;
            nodes.push({ id: tid, u: node(tid), group: "teacher", r: 9 });
            links.push({ source: selHt, target: tid });
            const sc = baseChildCount(tid);
            for (let s = 0; s < sc; s++) {
              const sid = tid + "." + s;
              nodes.push({ id: sid, u: node(sid), group: "student", r: 5 });
              links.push({ source: tid, target: sid });
            }
          }
          const sim = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id((d) => d.id).distance((l) => (l.source.group === "ht" ? 75 : 30)).strength(0.75))
            .force("charge", d3.forceManyBody().strength(-55).distanceMax(280))
            .force("collide", d3.forceCollide().radius((d) => d.r + 2).iterations(2))
            .force("x", d3.forceX(0).strength(0.045)).force("y", d3.forceY(0).strength(0.045))
            .stop();
          for (let i = 0; i < 300; i++) sim.tick();
          let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
          for (const n of nodes) { if (n.x < minx) minx = n.x; if (n.x > maxx) maxx = n.x; if (n.y < miny) miny = n.y; if (n.y > maxy) maxy = n.y; }
          return { nodes, links, htU, bbox: [minx - 24, miny - 24, maxx + 24, maxy + 24],
            counts: { teachers, students: nodes.filter((n) => n.group === "student").length } };
        }, [selHt]);

        const frame = useCallback((bbox, pad) => {
          const [minx, miny, maxx, maxy] = bbox;
          const bw = Math.max(1, maxx - minx), bh = Math.max(1, maxy - miny);
          const k = clamp(Math.min(size.w / bw, size.h / bh) * (pad || 0.82), ZMIN, ZMAX);
          return { k, x: size.w / 2 - ((minx + maxx) / 2) * k, y: size.h / 2 - ((miny + maxy) / 2) * k };
        }, [size]);

        // --- drill handlers ---
        const pickCountry = useCallback(async (item) => {
          if (moved.current || !item.iso || busy) return;
          if (!item.covered) { setActive({ u: item.u || node("r." + (item.iso || "x")), title: item.name, sub: "No district (ADM2) boundary data", demo: demoFor(item.feature, item.iso, item.name) }); return; }
          setBusy(true);
          const a1 = await fetchGB(item.iso, "ADM1");
          if (!a1 || !a1.features || !a1.features.length) { setBusy(false); return; }
          const [a2, a3] = await Promise.all([fetchGB(item.iso, "ADM2"), fetchGB(item.iso, "ADM3")]);
          setCountry({ iso: item.iso, name: item.name, feature: item.feature, orgId: "r." + item.iso });
          setAdm1FC(a1); setAdm2FC(a2); setAdm3FC(a3);
          setA1Idx(null); setA2Idx(null); setA3Idx(null); setSelHt(null); setActive(null);
          setLevel("adm1"); setTf({ k: 1, x: 0, y: 0 });
          setBusy(false);
        }, [busy]);

        const drillA1 = useCallback((i) => { if (moved.current || !adm1 || !adm1[i]) return; setA1Idx(i); setA2Idx(null); setA3Idx(null); setSelHt(null); setActive(null); setLevel("adm2"); setTf(frame(adm1[i].bbox)); }, [adm1, frame]);
        const drillA2 = useCallback((j) => { if (moved.current || !adm2 || !adm2[j]) return; setA2Idx(j); setA3Idx(null); setSelHt(null); setActive(null); setLevel("adm3"); setTf(frame(adm2[j].bbox)); }, [adm2, frame]);
        const drillBlock = useCallback((k) => { if (moved.current || !blocks || !blocks[k]) return; setA3Idx(k); setActive(null); setLevel("schools"); setTf(frame(blocks[k].bbox)); }, [blocks, frame]);
        const drillSchool = useCallback((sc) => { if (moved.current) return; setSelHt(sc.u.id); setActive(null); setLevel("school"); }, []);

        const goLevel = useCallback((target) => {
          setActive(null);
          if (target === "world") { setLevel("world"); setCountry(null); setAdm1FC(null); setAdm2FC(null); setAdm3FC(null); setA1Idx(null); setA2Idx(null); setA3Idx(null); setSelHt(null); setTf({ k: 1, x: 0, y: 0 }); }
          else if (target === "adm1") { setLevel("adm1"); setA1Idx(null); setA2Idx(null); setA3Idx(null); setSelHt(null); setTf({ k: 1, x: 0, y: 0 }); }
          else if (target === "adm2") { setLevel("adm2"); setA2Idx(null); setA3Idx(null); setSelHt(null); if (adm1 && a1Idx != null && adm1[a1Idx]) setTf(frame(adm1[a1Idx].bbox)); }
          else if (target === "adm3") { setLevel("adm3"); setA3Idx(null); setSelHt(null); if (adm2 && a2Idx != null && adm2[a2Idx]) setTf(frame(adm2[a2Idx].bbox)); }
          else if (target === "schools") { setLevel("schools"); setSelHt(null); if (blocks && a3Idx != null && blocks[a3Idx]) setTf(frame(blocks[a3Idx].bbox)); }
        }, [adm1, a1Idx, adm2, a2Idx, blocks, a3Idx, frame]);

        const popUp = useCallback(() => {
          if (level === "school") goLevel("schools");
          else if (level === "schools") goLevel("adm3");
          else if (level === "adm3") goLevel("adm2");
          else if (level === "adm2") goLevel("adm1");
          else if (level === "adm1") goLevel("world");
        }, [level, goLevel]);

        useEffect(() => { if (level === "school" && school) setTf(frame(school.bbox)); }, [school, level, frame]);

        const onWheel = useCallback((e) => {
          e.preventDefault();
          const rect = e.currentTarget.getBoundingClientRect();
          const px = e.clientX - rect.left, py = e.clientY - rect.top;
          setTf((t) => { const k = clamp(t.k * (e.deltaY < 0 ? 1.12 : 1 / 1.12), ZMIN, ZMAX); const s = k / t.k; return { k, x: px - (px - t.x) * s, y: py - (py - t.y) * s }; });
        }, []);
        const onPointerDown = useCallback((e) => { drag.current = { x: e.clientX, y: e.clientY, tx: tf.x, ty: tf.y }; moved.current = false; }, [tf]);
        const onPointerMove = useCallback((e) => {
          if (!drag.current) return;
          const dx = e.clientX - drag.current.x, dy = e.clientY - drag.current.y;
          if (Math.abs(dx) + Math.abs(dy) > 4) moved.current = true;
          setTf((t) => ({ ...t, x: drag.current.tx + dx, y: drag.current.ty + dy }));
        }, []);
        const onPointerUp = useCallback(() => { drag.current = null; }, []);
        const onBgClick = useCallback(() => { if (!moved.current && level !== "world") popUp(); }, [popUp, level]);
        const zoomBy = useCallback((factor) => {
          setTf((t) => { const k = clamp(t.k * factor, ZMIN, ZMAX); const s = k / t.k; const cx = size.w / 2, cy = size.h / 2; return { k, x: cx - (cx - t.x) * s, y: cy - (cy - t.y) * s }; });
        }, [size]);

        const gStyle = { transition: drag.current ? "none" : "transform .35s ease" };
        const a1f = a1Idx != null && adm1 ? adm1[a1Idx] : null;
        const a2f = a2Idx != null && adm2 ? adm2[a2Idx] : null;
        const blk = a3Idx != null && blocks ? blocks[a3Idx] : null;
        const synthBlocks = blocks && blocks[0] && blocks[0].synthetic;

        // ===== invite modal (for unregistered / grey-tinted areas) =====
        const [invite, setInvite] = useState(null);   // { id, title, role, link }
        const openInvite = (a) => setInvite({ ...a, link: "https://pp.link/invite/" + encodeURIComponent(a.id) });

        // ===== messaging + bar-graph state =====
        const [composeOpen, setComposeOpen] = useState(true);
        const [sendList, setSendList] = useState(() => new Map());
        const [hoverId, setHoverId] = useState(null);
        const [savedTemplates, setSavedTemplates] = useState([]);
        const [savedFilters, setSavedFilters] = useState([]);
        const [ai, setAi] = useState({ on: true, window: "48 h" });
        const [toast, setToastState] = useState(null);
        const toastTimer = useRef(null);
        const setToast = useCallback((msg) => { setToastState(msg); if (toastTimer.current) clearTimeout(toastTimer.current); toastTimer.current = setTimeout(() => setToastState(null), 4200); }, []);

        const entities = useMemo(() => {
          let arr = [];
          if (level === "world" && worldPaths) arr = worldPaths.filter((p) => p.covered).map((p) => ({ id: p.u.id, u: p.u, name: p.name, sub: "National Director · " + p.u.name, location: "World", level: "Country", anchor: p.c, pathD: p.d }));
          else if (level === "adm1" && adm1) arr = adm1.map((d) => ({ id: d.id, u: d.u, name: d.name, sub: "DGSE · " + d.u.name, location: country ? country.name : "", level: "DGSE", anchor: d.c, pathD: d.d, demo: d.demo }));
          else if (level === "adm2" && adm2) arr = adm2.map((d) => ({ id: d.id, u: d.u, name: d.name, sub: "BSA · " + d.u.name, location: a1f ? a1f.name : "", level: "BSA", anchor: d.c, pathD: d.d, demo: d.demo }));
          else if (level === "adm3" && blocks) arr = blocks.map((b) => ({ id: b.id, u: b.u, name: b.name, sub: "BEO · " + b.u.name, location: a2f ? a2f.name : "", level: "BEO", anchor: b.seed, pathD: b.d, demo: b.demo }));
          else if (level === "schools" && schools) arr = schools.map((s) => ({ id: s.id, u: s.u, name: s.name, sub: (s.kind && s.kind !== "unknown" ? s.kind[0].toUpperCase() + s.kind.slice(1) + " · " : "") + "Head Teacher · " + s.u.name, location: blk ? blk.name : "", level: "Head Teacher", kind: s.kind, anchor: s.p, dot: true }));
          else if (level === "school" && school) arr = school.nodes.map((n) => ({ id: n.id, u: n.u, name: n.u.designation, sub: n.u.name, location: blk ? blk.name : "", level: n.u.designation, anchor: [n.x, n.y], dot: true }));
          arr = arr.map((e) => ({ ...e, score: e.u.score }));
          const order = [...arr].sort((a, b) => b.score - a.score);
          const rank = new Map(); order.forEach((e, i) => rank.set(e.id, i + 1));
          return arr.map((e) => ({ ...e, rank: rank.get(e.id) }));
        }, [level, worldPaths, adm1, adm2, blocks, schools, school, country, a1f, a2f, blk]);

        const snap = useCallback((e) => ({ id: e.id, uname: e.u.name, name: e.name, area: e.name, location: e.location, level: e.level, score: e.score, rank: e.rank, face: e.u.face, perf: e.u.perf, phone: e.u.phone }), []);
        const toggleSend = useCallback((e) => setSendList((prev) => { const m = new Map(prev); if (m.has(e.id)) m.delete(e.id); else m.set(e.id, snap(e)); return m; }), [snap]);
        const addEntities = useCallback((es) => setSendList((prev) => { const m = new Map(prev); es.forEach((e) => m.set(e.id, snap(e))); return m; }), [snap]);
        const removeSend = useCallback((id) => setSendList((prev) => { const m = new Map(prev); m.delete(id); return m; }), []);
        const clearSend = useCallback(() => setSendList(new Map()), []);
        const selectedIds = useMemo(() => new Set(sendList.keys()), [sendList]);

        const onSend = useCallback((text, aiCfg) => {
          const n = sendList.size;
          if (!n) { setToast("Add recipients before sending."); return; }
          setToast(`✓ Message sent to ${n} recipient${n > 1 ? "s" : ""}.` + (aiCfg.on ? ` AI will follow up non-responders in ${aiCfg.window}.` : ""));
          if (aiCfg.on) setTimeout(() => setToast(`🤖 AI follow-up sent to ${Math.max(1, Math.round(n * 0.4))} non-responder${n > 1 ? "s" : ""}.`), 3600);
        }, [sendList, setToast]);

        const genReport = useCallback(() => {
          const JsPDF = window.jspdf && window.jspdf.jsPDF;
          if (!JsPDF) { setToast("PDF library not loaded."); return; }
          const doc = new JsPDF({ unit: "pt", format: "a4" });
          const W = doc.internal.pageSize.getWidth();
          const crumb = ["World", country && country.name, a1f && a1f.name, a2f && a2f.name, blk && blk.name, level === "school" ? "School" : null].filter(Boolean).join("  >  ");
          let y = 56;
          doc.setFont("helvetica", "bold"); doc.setFontSize(20); doc.setTextColor(24); doc.text("PadhaiPal — Global Network Report", 40, y);
          doc.setFont("helvetica", "normal"); doc.setFontSize(10); doc.setTextColor(120);
          y += 18; doc.text(crumb, 40, y);
          y += 14; doc.text(`${entities.length} ${level === "world" ? "countries" : level} | ranked by performance score`, 40, y);
          y += 30; doc.setFont("helvetica", "bold"); doc.setFontSize(13); doc.setTextColor(24); doc.text("Top performers by score", 40, y);
          doc.setFont("helvetica", "normal"); doc.setFontSize(10);
          [...entities].sort((a, b) => b.score - a.score).slice(0, 15).forEach((e, i) => {
            y += 16; doc.setTextColor(90); doc.text(`${i + 1}.  ${e.name} — ${e.u.name} (${e.level}, ${e.location})`, 48, y);
            doc.setTextColor(24); doc.text(String(e.score), W - 56, y, { align: "right" });
          });
          y += 30; doc.setFont("helvetica", "bold"); doc.setFontSize(13); doc.text(`Send list (${sendList.size})`, 40, y);
          doc.setFont("helvetica", "normal"); doc.setFontSize(10); doc.setTextColor(90);
          [...sendList.values()].slice(0, 18).forEach((r) => { y += 15; doc.text(`-  ${r.uname} — ${r.name} (${r.level})`, 48, y); });
          y += 34; doc.setFontSize(11); doc.setTextColor(37, 99, 235);
          const fakeId = (hashStr("rep:" + crumb + sendList.size) % 0xffffff).toString(16).padStart(6, "0");
          doc.textWithLink("> Open the live dashboard for this view", 40, y, { url: "https://dashboard.padhaipal.com/r/" + fakeId });
          y += 22; doc.setFontSize(8); doc.setTextColor(150);
          doc.text("Demo report — boundaries are real (geoBoundaries); scores & demographics are illustrative.", 40, y);
          doc.save("padhaipal-global-report.pdf");
          setToast("Report generated — PDF downloaded.");
        }, [entities, sendList, country, a1f, a2f, blk, level, setToast]);

        const loadFailed = worldGeo === "error";
        const ready = worldGeo && worldGeo !== "error";

        const bannerText = (() => {
          if (level === "world") return "Signed in as Global Education Secretary · every country is a National Director · grey = no district (ADM2) data · click a country to drill in";
          if (level === "adm1") return `${country ? country.name : ""} · ${adm1 ? adm1.length : 0} ADM1 regions (DGSEs) · click a region · click empty space to go up`;
          if (level === "adm2") return `${a1f ? a1f.name : ""} · ${adm2 ? adm2.length : 0} districts (BSAs) · click a district · click empty space to go up`;
          if (level === "adm3") return `${adm2 && a2Idx != null && adm2[a2Idx] ? adm2[a2Idx].name : ""} · ${blocks ? blocks.length : 0} blocks (BEOs) · ${synthBlocks ? "synthesised — no ADM3 layer for this country (ADM3 fallback)" : "real ADM3 boundaries (block proxy)"} · click a block`;
          if (level === "schools") {
            if (osm && blk && osm.id === blk.id && osm.status === "loading") return "Loading real schools from OpenStreetMap…";
            if (schools && schools[0] && schools[0].real) {
              const pub = schools.filter((s) => s.kind === "public").length, pri = schools.filter((s) => s.kind === "private").length;
              return `${schools.length} schools · real locations (OpenStreetMap) · ${pub} public · ${pri} private · ${schools.length - pub - pri} unspecified · click a school`;
            }
            return `≈${schools ? schools.length : 0} schools · illustrative — no OpenStreetMap school data for this block · click a school`;
          }
          if (level === "school") return `${school ? school.htU.name : ""} (Head Teacher) · ${school ? school.counts.teachers : 0} teachers · ${school ? school.counts.students : 0} students · click empty space to go up`;
          return "";
        })();

        return (
          <div className="flex h-full flex-col">
            <header className="flex flex-wrap items-center gap-x-6 gap-y-2 border-b border-zinc-200 bg-white px-6 py-3">
              <div>
                <h1 className="flex flex-wrap items-center gap-1.5 text-lg font-semibold text-zinc-900">
                  <button onClick={() => goLevel("world")} className={level === "world" ? "text-zinc-900" : "text-blue-600 hover:underline"}>World</button>
                  {country && <span className="text-zinc-300">›</span>}
                  {country && <button onClick={() => goLevel("adm1")} className={level === "adm1" ? "text-zinc-900" : "text-blue-600 hover:underline"}>{country.name}</button>}
                  {a1f && <span className="text-zinc-300">›</span>}
                  {a1f && <button onClick={() => goLevel("adm2")} className={level === "adm2" ? "text-zinc-900" : "text-blue-600 hover:underline"}>{a1f.name}</button>}
                  {a2f && <span className="text-zinc-300">›</span>}
                  {a2f && <button onClick={() => goLevel("adm3")} className={level === "adm3" ? "text-zinc-900" : "text-blue-600 hover:underline"}>{a2f.name}</button>}
                  {blk && <span className="text-zinc-300">›</span>}
                  {blk && <button onClick={() => goLevel("schools")} className={level === "schools" ? "text-zinc-900" : "text-blue-600 hover:underline"}>{blk.name}</button>}
                  {level === "school" && <span className="text-zinc-300">›</span>}
                  {level === "school" && <span className="text-zinc-900">School</span>}
                </h1>
                <p className="text-xs text-zinc-500">{bannerText}</p>
              </div>
              <div className="ml-auto flex items-center gap-2 text-xs text-zinc-500">
                <span>score</span><span>0</span>
                <span className="h-2 w-28 rounded" style={{ background: "linear-gradient(to right,#ef4444,#eab308,#22c55e)" }} />
                <span>100</span>
                <button onClick={() => setTf(level === "school" && school ? frame(school.bbox) : level === "schools" && blk ? frame(blk.bbox) : level === "adm3" && a2f ? frame(a2f.bbox) : level === "adm2" && a1f ? frame(a1f.bbox) : { k: 1, x: 0, y: 0 })}
                  className="ml-2 rounded-md border border-zinc-200 px-2 py-1 font-semibold text-zinc-600 hover:bg-zinc-50">Reset</button>
                <button onClick={genReport} className="rounded-md border border-zinc-200 px-2 py-1 font-semibold text-zinc-600 hover:bg-zinc-50">⤓ Report</button>
                <button onClick={() => setComposeOpen((v) => !v)} className="rounded-md bg-blue-600 px-2.5 py-1 font-semibold text-white hover:bg-blue-700">
                  ✉ Compose{sendList.size ? <span className="ml-1 rounded-full bg-white/25 px-1.5">{sendList.size}</span> : null}
                </button>
              </div>
            </header>

            <div ref={wrapRef} className="relative min-h-0 flex-1 overflow-hidden bg-[#eaf0f6]">
              {!ready ? (
                <div className="flex h-full items-center justify-center text-sm text-zinc-400">
                  {loadFailed ? "Could not load the world map — check your connection (boundaries are fetched live)." : "Loading world map…"}
                </div>
              ) : (
                <svg width={size.w} height={size.h} className="block touch-none select-none"
                  onWheel={onWheel} onPointerDown={onPointerDown} onPointerMove={onPointerMove}
                  onPointerUp={onPointerUp} onPointerLeave={onPointerUp} onClick={onBgClick}
                  style={{ cursor: drag.current ? "grabbing" : "grab" }}>
                  <g transform={`translate(${tf.x},${tf.y}) scale(${tf.k})`} style={gStyle}>

                    {/* WORLD: every country */}
                    {level === "world" && worldPaths && worldPaths.map((p) => {
                      const on = active && p.u && active.u.id === p.u.id;
                      const onEnter = () => p.u && setActive({ u: p.u, title: p.name, sub: p.covered ? "National Director · " + p.u.name : "No district (ADM2) data", demo: demoFor(p.feature, p.iso, p.name, true), greyed: !p.covered });
                      const onClick = (e) => { e.stopPropagation(); pickCountry(p); };
                      if (!p.covered) {
                        return (
                          <path key={p.i} d={p.d} data-iso={p.iso || ""} data-name={p.name} fill={NONPHON} fillOpacity={1}
                            stroke={on ? "#0f172a" : "#ffffff"} strokeWidth={(on ? 1.1 : 0.3) / tf.k}
                            style={{ cursor: "not-allowed" }} onMouseEnter={onEnter} onClick={onClick} />
                        );
                      }
                      return (
                        <g key={p.i}>
                          {areaPie(p.iso || p.i, p.u.id, p.d, p.c, cornerRadius(p.c, p.bbox), p.phon, p.u.perf)}
                          <path d={p.d} data-iso={p.iso || ""} data-name={p.name} fill="none" pointerEvents="all"
                            stroke={on ? "#0f172a" : "#ffffff"} strokeWidth={(on ? 1.1 : 0.3) / tf.k}
                            style={{ cursor: "pointer" }} onMouseEnter={onEnter} onClick={onClick} />
                          {isDimmed(p.u.id, p.phon) && <PlusButton c={p.c} k={tf.k} onClick={() => openInvite({ id: p.u.id, title: p.name, role: "National Director" })} />}
                        </g>
                      );
                    })}

                    {/* ADM1 */}
                    {level === "adm1" && adm1 && adm1.map((d0) => (
                      <g key={d0.id}>
                        {areaPie(d0.id, d0.id, d0.d, d0.c, cornerRadius(d0.c, d0.bbox), d0.demo.phon, d0.u.perf)}
                        <path d={d0.d} fill="none" pointerEvents="all"
                          stroke={active && active.u.id === d0.id ? "#0f172a" : "#ffffff"} strokeWidth={(active && active.u.id === d0.id ? 1.6 : 0.6) / tf.k}
                          style={{ cursor: "pointer" }}
                          onMouseEnter={() => setActive({ u: d0.u, title: d0.name, sub: "DGSE · " + d0.u.name, demo: d0.demo })}
                          onClick={(e) => { e.stopPropagation(); drillA1(d0.i); }} />
                        {isDimmed(d0.id, d0.demo.phon) && <PlusButton c={d0.c} k={tf.k} onClick={() => openInvite({ id: d0.id, title: d0.name, role: "DGSE" })} />}
                      </g>
                    ))}

                    {/* ADM2 */}
                    {level === "adm2" && adm2 && adm2.map((d0) => (
                      <g key={d0.id}>
                        {areaPie(d0.id, d0.id, d0.d, d0.c, cornerRadius(d0.c, d0.bbox), d0.demo.phon, d0.u.perf)}
                        <path d={d0.d} fill="none" pointerEvents="all"
                          stroke={active && active.u.id === d0.id ? "#0f172a" : "#ffffff"} strokeWidth={(active && active.u.id === d0.id ? 1.6 : 0.6) / tf.k}
                          style={{ cursor: "pointer" }}
                          onMouseEnter={() => setActive({ u: d0.u, title: d0.name, sub: "BSA · " + d0.u.name, demo: d0.demo })}
                          onClick={(e) => { e.stopPropagation(); drillA2(d0.j); }} />
                        {isDimmed(d0.id, d0.demo.phon) && <PlusButton c={d0.c} k={tf.k} onClick={() => openInvite({ id: d0.id, title: d0.name, role: "BSA" })} />}
                      </g>
                    ))}

                    {/* ADM3 / blocks */}
                    {level === "adm3" && blocks && blocks.map((b) => (
                      <g key={b.id}>
                        {areaPie(b.id, b.id, b.d, b.seed, cornerRadius(b.seed, b.bbox), b.demo.phon, b.u.perf)}
                        <path d={b.d} fill="none" pointerEvents="all"
                          stroke={active && active.u.id === b.id ? "#0f172a" : "#ffffff"} strokeWidth={(active && active.u.id === b.id ? 2 : 1) / tf.k}
                          style={{ cursor: "pointer" }}
                          onMouseEnter={() => setActive({ u: b.u, title: b.name + (a2f ? " · " + a2f.name : ""), sub: "BEO · " + b.u.name, demo: b.demo })}
                          onClick={(e) => { e.stopPropagation(); drillBlock(b.k); }} />
                        {isDimmed(b.id, b.demo.phon) && <PlusButton c={b.seed} k={tf.k} onClick={() => openInvite({ id: b.id, title: b.name, role: "BEO" })} />}
                      </g>
                    ))}

                    {/* schools */}
                    {level === "schools" && blk && (
                      <path d={blk.d} fill="#ffffff" fillOpacity="0.5" stroke="#0f172a" strokeWidth={1.4 / tf.k}
                        style={{ cursor: "default" }} onClick={(e) => e.stopPropagation()} />
                    )}
                    {level === "schools" && schools && schools.map((sc) => (
                      <circle key={sc.id} cx={sc.p[0]} cy={sc.p[1]} r={(active && active.u.id === sc.id ? 9 : 6) / tf.k}
                        fill={scoreColor(sc.u.perf)} stroke="#ffffff" strokeWidth={1.2 / tf.k} style={{ cursor: "pointer" }}
                        onMouseEnter={() => setActive({ u: sc.u, title: sc.name, sub: (sc.kind && sc.kind !== "unknown" ? sc.kind[0].toUpperCase() + sc.kind.slice(1) + " school · " : "") + "Head Teacher · " + sc.u.name })}
                        onClick={(e) => { e.stopPropagation(); drillSchool(sc); }} />
                    ))}

                    {/* school force graph */}
                    {level === "school" && school && (
                      <g>
                        {school.links.map((l, idx) => (
                          <line key={"l" + idx} x1={l.source.x} y1={l.source.y} x2={l.target.x} y2={l.target.y}
                            stroke="#cbd5e1" strokeWidth={(l.source.group === "ht" ? 1.6 : 0.8) / tf.k} />
                        ))}
                        {school.nodes.map((n) => {
                          const on = active && active.u.id === n.id;
                          return (
                            <circle key={n.id} cx={n.x} cy={n.y} r={n.r}
                              fill={scoreColor(n.u.perf)} stroke={on || n.group === "ht" ? "#0f172a" : "#ffffff"}
                              strokeWidth={(n.group === "ht" ? 2.5 : on ? 2 : 0.8) / tf.k} style={{ cursor: "pointer" }}
                              onMouseEnter={() => setActive({ u: n.u, title: n.group === "ht" ? "Head Teacher" : n.group === "teacher" ? "Teacher" : "Student", sub: n.u.name })}
                              onClick={(e) => e.stopPropagation()} />
                          );
                        })}
                      </g>
                    )}

                    {/* hover glow from the bar graph */}
                    {hoverId && (() => {
                      const e = entities.find((x) => x.id === hoverId);
                      if (!e || !e.anchor) return null;
                      return (
                        <g pointerEvents="none">
                          {e.pathD && <path d={e.pathD} fill="none" stroke="#2563eb" strokeWidth={4 / tf.k} className="glowpulse" />}
                          <circle cx={e.anchor[0]} cy={e.anchor[1]} r={(e.dot ? 13 : 18) / tf.k} fill="none" stroke="#2563eb" strokeWidth={3 / tf.k} className="glowpulse" />
                        </g>
                      );
                    })()}

                  </g>
                </svg>
              )}

              {busy && (
                <div className="pointer-events-none absolute left-1/2 top-4 z-20 -translate-x-1/2 rounded-full bg-zinc-900/85 px-4 py-1.5 text-[12px] font-medium text-white shadow-lg">
                  Loading boundaries from geoBoundaries…
                </div>
              )}

              {/* readout panel with demographics */}
              {active && (
                <div className="pointer-events-none absolute right-4 top-4 w-96 max-w-[calc(100%-2rem)] rounded-xl border border-zinc-200 bg-white/95 p-4 shadow-lg">
                  <div className="flex items-center gap-3">
                    {(() => {
                      const hasPerson = !active.greyed && registered(active.u.id);
                      return (
                        <React.Fragment>
                          {hasPerson && <img src={active.u.face} alt="" className="h-12 w-12 rounded-full object-cover brightness-110" style={{ boxShadow: "0 0 0 3px " + scoreColor(active.u.perf) }} />}
                          <div className="min-w-0">
                            <div className="truncate text-sm font-semibold text-zinc-900">{active.title}</div>
                            <div className="truncate text-xs text-zinc-500">{hasPerson ? active.sub : (active.sub || "").split(" · ")[0]}</div>
                            {hasPerson && <div className="text-[11px] text-zinc-400">{active.u.phone}</div>}
                          </div>
                          {hasPerson && <span className="ml-auto self-start rounded-md px-2 py-1 text-xs font-bold" style={{ background: scoreColor(active.u.perf), color: textOn(active.u.perf) }}>{active.u.score}</span>}
                        </React.Fragment>
                      );
                    })()}
                  </div>
                  {active.demo && (
                    <div className="mt-2 space-y-1 text-[11px] text-zinc-600">
                      <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Population</span><span className="font-semibold">{fmtPop(active.demo.pop)}</span></div>
                      <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Area</span><span className="font-semibold">{fmtArea(active.demo.areaKm2)}</span></div>
                      {(() => {
                        const { ph, non } = splitLangs(active.demo.pairs);
                        return (
                          <React.Fragment>
                            <div className="flex justify-between gap-2 rounded bg-zinc-50 px-2 py-1"><span className="flex-shrink-0">Phonetic langs</span><span className="min-w-0 break-words text-right font-semibold">{ph.length ? ph.join(", ") : "—"}</span></div>
                            <div className="flex justify-between gap-2 rounded bg-zinc-50 px-2 py-1"><span className="flex-shrink-0">Non-phonetic langs</span><span className="min-w-0 break-words text-right font-semibold">{non.length ? non.join(", ") : "—"}</span></div>
                          </React.Fragment>
                        );
                      })()}
                      {active.demo.phon != null && (
                        <div className="flex justify-between gap-2 rounded bg-zinc-50 px-2 py-1"><span className="flex-shrink-0">Phonetic script</span><span className="text-right font-semibold">{Math.round(active.demo.phon * 100)}% of pop</span></div>
                      )}
                      {!active.greyed && (
                        <div className="flex justify-between gap-2 rounded bg-zinc-50 px-2 py-1"><span className="flex-shrink-0">PadhaiPal coverage</span><span className="text-right font-semibold">{registered(active.u.id) ? Math.round(coverShare(active.u.id) * 100) + "% of phonetic pop" : <span className="text-zinc-500">Not registered (area dimmed)</span>}</span></div>
                      )}
                      <div className="text-[9px] text-zinc-400">Area: real (geoBoundaries). Population: {active.greyed ? "national (demo)" : "modeled / area-disaggregated (demo)"}. Language: {active.demo.real ? "per-region (census)" : "country-level table — demo"}. Pie: % speaking a phonetic (≥{PHON_MIN}) script.</div>
                    </div>
                  )}
                  {!active.demo && (
                    <div className="mt-2 grid grid-cols-2 gap-1 text-[11px] text-zinc-600">
                      <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Students</span><span className="font-semibold">{Math.round(40 + active.u.perf * 160)}</span></div>
                      <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Active 7d</span><span className="font-semibold">{Math.round(active.u.perf * 100)}%</span></div>
                      <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Lessons</span><span className="font-semibold">{Math.round(200 + active.u.perf * 1400)}</span></div>
                      <div className="flex justify-between rounded bg-zinc-50 px-2 py-1"><span>Avg score</span><span className="font-semibold">{active.u.score}</span></div>
                    </div>
                  )}
                </div>
              )}

              {level !== "world" && (
                <div className="pointer-events-none absolute bottom-3 left-1/2 -translate-x-1/2 rounded-full bg-zinc-900/80 px-3 py-1 text-[11px] font-medium text-white">
                  click empty space to go up one level
                </div>
              )}

              {/* legend */}
              <div className="pointer-events-none absolute bottom-4 left-[412px] z-20 rounded-xl border border-zinc-200 bg-white/95 p-3 text-[11px] leading-tight text-zinc-700 shadow-lg">
                <div className="mb-1.5 font-semibold text-zinc-900">Each area is a pie of its population</div>
                <div className="space-y-1">
                  <div className="flex items-center gap-2">
                    <span className="h-3 w-5 flex-shrink-0 rounded-sm" style={{ background: "linear-gradient(90deg,#ef4444,#eab308,#22c55e)" }} />
                    <span>Speaks a phonetic script <span className="text-zinc-400">(colour = avg score 0–100)</span></span>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="h-3 w-5 flex-shrink-0 rounded-sm" style={{ background: UNCOVERED }} />
                    <span>Phonetic, but outside PadhaiPal coverage</span>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="h-3 w-5 flex-shrink-0 rounded-sm" style={{ background: NONPHON }} />
                    <span>Non-phonetic script (or no district data)</span>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="relative h-3 w-5 flex-shrink-0 overflow-hidden rounded-sm" style={{ background: "#22c55e" }}>
                      <span className="absolute inset-0" style={{ background: UNCOVERED, opacity: 0.62 }} />
                    </span>
                    <span>Dimmed = node not registered in PadhaiPal</span>
                  </div>
                </div>
                <div className="mt-1.5 text-[9px] text-zinc-400">Border clips each pie · phonetic = script ≥{PHON_MIN} transparency · coverage is demo/random</div>
              </div>

              {/* zoom controls */}
              <div className="absolute bottom-4 right-4 z-30 flex flex-col overflow-hidden rounded-lg border border-zinc-300 bg-white shadow-md">
                <button onClick={() => zoomBy(1.5)} title="Zoom in" className="flex h-9 w-9 items-center justify-center text-xl font-semibold text-zinc-700 hover:bg-zinc-100">+</button>
                <div className="h-px bg-zinc-200" />
                <button onClick={() => zoomBy(1 / 1.5)} title="Zoom out" className="flex h-9 w-9 items-center justify-center text-xl font-semibold text-zinc-700 hover:bg-zinc-100">−</button>
              </div>

              {toast && (
                <div className="absolute bottom-4 right-16 z-40 max-w-xs rounded-lg bg-zinc-900 px-4 py-2 text-xs font-medium text-white shadow-xl">{toast}</div>
              )}

              {invite && <InviteModal key={invite.id} data={invite} onClose={() => setInvite(null)} />}

              <ComposePanel open={composeOpen} onToggle={() => setComposeOpen((v) => !v)} entities={entities}
                recipients={[...sendList.values()]} onAddMany={addEntities} onRemove={removeSend} onClear={clearSend}
                savedTemplates={savedTemplates} setSavedTemplates={setSavedTemplates} savedFilters={savedFilters} setSavedFilters={setSavedFilters}
                ai={ai} setAi={setAi} onSend={onSend} onGenerateReport={genReport} />
            </div>

            <BarGraph entities={entities} selectedIds={selectedIds} hoverId={hoverId}
              onHover={setHoverId} onToggle={toggleSend} onAddRange={addEntities} />
          </div>
        );
      }

      return WorldMap;
    })();

    // #####################################################################
    // ## Top-level shell: a toggle that switches between the two views.   ##
    // ## The two graphs above stay fully independent (separate IIFEs).    ##
    // #####################################################################
    function Root() {
      const TABS = ["force", "tree", "map", "world"];
      const [view, setView] = useState(() => {
        const h = (window.location.hash || "").replace("#", "");
        return TABS.includes(h) ? h : "world";
      });
      useEffect(() => { window.location.hash = view; }, [view]);
      const tab = (id, label) => (
        <button key={id} onClick={() => setView(id)}
          className={"rounded-md px-3 py-1 text-xs font-semibold transition " +
            (view === id ? "bg-white text-zinc-900 shadow" : "text-zinc-300 hover:text-white")}>
          {label}
        </button>
      );
      return (
        <div className="flex h-full flex-col">
          <div className="flex items-center gap-3 border-b border-zinc-800 bg-zinc-900 px-4 py-2">
            <span className="text-xs font-semibold text-white">PadhaiPal · Educator Network</span>
            <div className="ml-auto flex rounded-lg bg-zinc-800 p-0.5">
              {tab("force", "Force graph")}
              {tab("tree", "Tree")}
              {tab("map", "Map (India)")}
              {tab("world", "World")}
            </div>
          </div>
          <div className="relative min-h-0 flex-1">
            {view === "force" ? <ForceGraphApp /> : view === "tree" ? <TreeFlowApp /> : view === "map" ? <MapApp /> : <WorldMapApp />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>
